нзии: АД 94/60 мм рт. ст., ЧСС 87 /мин. Живот мягкий, увеличен в объеме за счет асцита, безболезненный. В мочеприемнике 300 мл мочи. На ЭКГ без отрицательной ишемической динамики. КОС: гемоглобин 71 г/л, рН 7,46, рСО2 34 мм рт. ст., раО2 73 мм рт. ст., ВЕ +5 ммоль/л, К+ 2,8 ммоль/л, Na+ 120 ммоль/л.","question":"Какое основное направление терапии при печеночной энцефалопатии в данной ситуации?","correct":"Коррекция водно-электролитных и метаболических расстройств, коррекция анемии","distractors":["Коррекция гипонатриемии","Коррекция гипокалиемии"]},{"id":278,"scenario":"Пациентка 46 лет доставлена в ОРИТ с диагнозом: Цирроз печени, напряженный асцит, гипотония. Из анамнеза: плохая приверженность терапии, диету не соблюдает. На момент осмотра ШКГ 13 баллов, отеки нижних конечностей до нижней трети бедра. ЧД 23/мин, SpO2 96 %, аускультатвино дыхание не проводится в нижних отделах. Гемодинамика со склонностью к гипотензии: АД 94/60 мм рт. ст., ЧСС 87 /мин. Живот умеренно, увеличен в объеме за счет асцита, безболезненный. Катетеризирован мочевой пузырь, 200 мл концентрированной мочи. На ЭКГ без отрицательной ишемической динамики. КОС: гемоглобин 71 г/л, рН 7,46, рСО2 34 мм рт. ст., раО2 73 мм рт. ст., ВЕ +5 ммоль/л, К+ 3,2 ммоль/л, Na+ 112 ммоль/л.","question":"Какой тип водно-электролитных нарушений, характерный для цирроза печени, в данной клинической ситуации?","correct":"Гиперволемическая гипонатриемия","distractors":["Гиповолемическая гипонатриемия","Гиперволемическая гипокалиемия"]},{"id":279,"scenario":"Пациентка 55 лет с внебольничной пневмонией, 2 сутки в стационаре, переведена в ОРИТ ввиду развития пароксизма желудочковой тахикардии, потребовавшей проведения ЭИТ. В терапевтическом отделении до перевода получала терапию левофлоксацином. На момент осмотра ШКГ 15 б, ЧД 22/мин, ингаляция О2 через лицевую маску 10 л/мин, SpO2 96%, гемодинамика со склонностью к гипотензии (АД 98/60 мм рт. ст.), ЧСС 80 уд/мин. Живот мягкий. На ЭКГ без отрицательной ишемической динамики, Qtc 570мс. Лабораторно: лейкоциты 8,8*10^9/л, СРБ в динамике снижается.","question":"Какая тактика антибактериальной терапии наиболее целесообразна у данной пациентки?","correct":"Смена левофлоксацина на защищенный аминопенициллин","distractors":["Отмена антимикробной терапии","Смена левофлоксацина на меропенем"]},{"id":280,"scenario":"Пациент 81 год, доставлен в шоковый зал, по данным ЭКГ полная поперечная AV блокада, на догоспитальном этапе вводился атропин. Во время подключения пациента к монитору развилось кратковременное синкопальное состояние длительностью порядка 10 секунд. В сознании, ЧД 18/мин, SpO2 98%. АД 100/70 мм рт. ст., ЧСС 32 в мин., полная поперечная AV-блокада с замещающим узловым ритмом, без достоверной ишемической динамики. Живот мягкий, безболезненный, не увеличен в объеме. При расспросе пациент указал, что ранее неоднократно отмечал редкий пульс, синкопальные состояния на догоспитальном этапе и боль в грудной клетке отрицает.","question":"Какая тактика ведения пациента наиболее целесообразна в данном случае?","correct":"Постановка временного электрокардиостимулятора","distractors":["Начать инфузию атропина","Начать инфузию норадреналина"]},{"id":281,"scenario":"Пациент 81 года доставлен в шоковый зал бригадой СМП с направительным диагнозом: Полная поперечная АВ блокада, на догоспитальном этапе вводился атропин. Во время подключения пациента к монитору развилось кратковременное синкопальное состояние длительностью порядка 8-10 секунд. При осмотре ШКГ 14 б, кожные покровы бледные, холодные. При аускультации дыхание везикулярное, ЧД 22/мин, SpO2 96%. АД 90/50 мм рт. ст., ЧСС 32 уд/мин, полная поперечная АВ блокада с замещающим узловым ритмом, элевация сегмента ST в отведениях II, III, aVF до 3мм с реципроктными депрессиями ST в отведениях I, aVL. Живот мягкий, безболезненный, не увеличен в объеме. Установлен временный ЭКС.","question":"Какая тактика ведения пациента наиболее целесообразна в данном случае?","correct":"Выполнить экстренную коронароангиографию","distractors":["Начать инфузию атропина, продолжить наблюдение","Начать инфузию норадреналина, продолжить наблюдение"]},{"id":282,"scenario":"Пациент 27 лет доставлен в шоковый зал бригадой СМП, поводом к вызову которой послужила гипотензия, появление одышки в покое. Известно, что за неделю до этого переносил ОРВИ. При объективном осмотре пациент возбужден, беспокоен, активно предъявляет жалобы на чувство нехватки воздуха. ЧД 28, при аускультация легких дыхание везикулярное, SpO2 92%, отмечается набухание вен шеи. АД 78/44 мм рт. ст., ЧСС 96 в мин, тоны сердца глухие. Живот мягкий, не увеличен в объеме. На ЭКГ синусовый ритм, PR в большинстве отведений, в остальном без особенностей. На ЭХО-КГ ФВ 55 %, нижняя полая вена расширена, не коллабирует, \"танцующее сердце\".","question":"Какая начальная тактика ведения пациента наиболее целесообразна в данном случае?","correct":"Проведение перикардиоцентеза","distractors":["Проведение коронароангиографии","Назначение диуретической терапии"]},{"id":283,"scenario":"Пациент 29 лет доставлен в шоковый зал бригадой СМП, поводом к вызову которой послужила гипотензия, появление одышки в покое, отеки нижних конечностей. Известно, что за 2 недели до этого переносил ОРВИ с лихорадкой до 38 °С, однократно принимал парацетамол, иные препараты не принимает. При объективном осмотре пациент возбужден, беспокоен, предъявляет жалобы на чувство нехватки воздуха. Положение ортопноэ. Кожные покровы бледные, прохладные, акроциноз, отеки нижних конечностей до нижней трети голеней. ЧД 28, при аускультация легких множественные влажные хрипы, SpO2 92 %, отмечается набухание вен шеи. АД 92/48 мм рт. ст., ЧСС 116 уд/мин, тоны сердца глухие. Живот мягкий, не увеличен в объеме. На ЭКГ синусовый ритм, без ишемической динамики. На ЭХО-КГ ФВ 20%, нижняя полая вена расширена до 2.2см, коллабирует","question":"Какая начальная тактика диуретической терапии наиболее целесообразна в данном случае?","correct":"Фуросемид 40 мг внутривенно","distractors":["Торасемид 5 мг перорально","Фуросемид 200 мг внутривенно"]},{"id":284,"scenario":"Пациентка 68 лет переведена в стабильном состоянии из операционной после имплантации двухкамерного электрокардиостимулятора. Через 40 минут отмечено появление одышки, снижение АД до 80/46 мм рт. ст., на ЭКГ неэффективная желудочковая стимуляция. Про фокусном ЭХО-КГ: сепарация листков перикарда до 1,7 см, коллабирование стенки правого предсердия.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Перфорация ПЖ электродом ЭКС","distractors":["Спонтанный разрыв миокарда ЛЖ","Острый перикардит"]},{"id":285,"scenario":"Пациент 65 лет переведен в ОРИТ в стабильном состоянии из рентгеноперационной после плановой транслюминальной баллонной ангиопластики со стентированием правой коронарной артерии. Через 2 часа на фоне ранее стабильной гемодинамики у пациента возник эпизод брадикардии до 35 в мин, АД 84/56 мм рт. ст., угнетение уровня сознания до сопора. На ЭКГ желудочковый ритм с ЧСЖ 35/мин.","question":"Какая тактика дальнейшего ведения пациента наиболее целесообразна в данном случае?","correct":"Экстренное проведение КАГ параллельно со стабилизацией гемодинамики и постановкой временного ЭКС","distractors":["Определить уровень тропонина, при его повышении провести КАГ","Выполнить ЭХО-КГ, при наличии новых зон нарушения локальной сократимости провести КАГ"]},{"id":286,"scenario":"Пациент 36 лет находится в ОРИТ 6 сутки с диагнозом: Деструктивный панкреатит, сепсис, СПОН, проводится интенсивная терапия. Объективно сознание ясное, кожные покровы бледные, дыхание самостоятельное, ЧД 20/мин, гемодинамика поддерживается инфузией норадреналина 0,4 мкг/кг/мин, живот болезненный в эпигастрии. На ЭКГ депрессия PR в большинстве отведений. На ЭХО-КГ выявлена сепарация листков перикарда до 1см, камеры сердца не компрометированы, ФВ ЛЖ 60%, НПВ не расширена, коллабирует более 50%.","question":"Какая тактика в плане лечения перикардиального выпота наиболее целесообразна в данном случае?","correct":"Продолжение ранее назначенной терапии, активных действий на настоящий момент не требуется","distractors":["Проведение перикардиоцентеза","Назначение диуретической терапии"]},{"id":287,"scenario":"Пациент 58 лет, госпитализирован в ОРИТ в связи с кровотечением из варикозно расширенных вен пищевода. В анамнезе цирроз печени алкогольного генеза. Сутки назад было выполнено эндоскопическое лигирование. В настоящий момент отмечается снижение уровня сознания, перестал вступать в контакт. ШКГ 9 баллов. При осмотре очаговой неврологической симптоматики не выявлено, живот увеличен в объеме, кровоподтеки на кожных покровах туловища, конечностей, желтушность кожных покровов и склер. По лабораторным данным: Hb 78 г/л, глюкоза крови 4,7 ммоль/л, общий билирубин 79,1 мкмоль/л, АЛТ 58 ЕД/л, АСТ 156 ЕД/л. Помимо прочих лечебных мероприятий пациенту планируется проведение нутритивной поддержки.","question":"Чем должен характеризоваться аминокислотный состав сред для питания при проведении нутритивной поддержки у данного пациента?","correct":"Повышенное содержание разветвленных аминокислот, пониженное содержание ароматических аминокислот","distractors":["Повышенное содержание глутамина, пониженное содержание разветвленных аминокислот","Повышенное содержание метионина, повышенное содержание ароматических жирных кислот"]},{"id":288,"scenario":"Пациент, 62 лет, поступил в ОРИТ после экстренного вмешательства по поводу перфоративной язвы желудка, перитонита. В анамнезе хроническое злоупотребление алкоголем. Масса тела 60 кг, рост 180 см, ИМТ 2. На следующий день после оперативного вмешательства начато проведение парентерального питания в объеме, обеспечивающем количество энергии 25 ккал/кг и белка 1,5 г/кг. На 4-е сутки отмечено ухудшение состояния: спутанность сознания, слабость конечностей, ЧД 26 в минуту, АД 100/54 мм рт. ст., ЧСС 106-112 в минуту, по ЭКГ монитору частые предсердные экстрасистолы. В лабораторных данных: лейкоциты 13,6*10^9/л","question":"Что из минуту, SpО2 96%. Перистальтика ослаблена, выслушивается, живот не вздут.","question":"Какой режим нутритивной поддержки оптимален?","correct":"Определить возможность начала перорального приема пищи на следующее утро","distractors":["Отказ от проведения энтерального питания, проведение парентерального питания","Начать зондовое энтеральное питание до 500 мл"]},{"id":295,"scenario":"Пациенка, 56 лет. Масса тела 63 кг, рост 165 см. Доставлена их операционной после после брюшно-промежностной экстирпации прямой кишки. Выведена сигмостома. Сопутсвующие заболевания: артериальная гипертензия 2 ст, риск 2. Через 6 часов после операции сознание ясное, болевой синдром контролируется, ВАШ 2 балла, АД 130/80 мм рт. ст., ЧСС 86 в минуту, ЧД 17 в минуту, SpО2 96%. Перистальтика ослаблена, выслушивается, живот не вздут.","question":"Какой режим нутритивной поддержки оптимален?","correct":"Возможно начало перорального питания в день операции","distractors":["Отказ от проведения энтерального питания, проведение парентерального питания","Нутритивная поддержка не требуется, зонд на отток"]},{"id":296,"scenario":"Пациент, 65 лет, готовится к проведению оперативного вмешательства по поводу стенозирующей опухоли пилорического отдела желудка. В течение нескольких недель потребление пищи значительно снижено, часто возникает рвота. У пациента отмечаются признаки недостаточности питания. Масса тела 68 кг, рост 183 см. За последние 6 мес масса тела снизилась на 12 кг. В анамнезе длительное злоупотребление алкоголем. Пациенту планируется начать проведение парентерального питания.","question":"Дополнительное введение какого витамина необходимо для предотвращения развития энцефалопатии Гайе-Вернике при начале проведения нутритивной поддержки у данного пациента?","correct":"Витамин В1","distractors":["Никотиновая кислота","Витамин В6"]},{"id":297,"scenario":"Больная 66 лет, находится в ОРИТ 4- е сутки с диагнозом: Перфорация опухоли сигмовидной кишки. Распространенный фибринозно-гнойный перитонит. Операция: лапаротомия, обструктивная резекция сигмовидной кишки. Сепсис. Состояние тяжелое. SOFA 8 баллов. Медикаментозная седация RASS -3 балла. ИВЛ в режиме PC-SIMV c FiO2 0,6, SpO2 94%. р/F 190. На рентгенографии легких двусторонние облаковидные инфильтраты. АД 124/64 мм рт. ст., ЧСС 102 в мин.","question":"Каковы основные критерии протективной ИВЛ при ОРДС?","correct":"Vt 6 мл/кг ИМТ Pplat ≤ 30 мбар Driving pressure ≤ 12-15 мбар подбор PEEP","distractors":["Vt 6-8 мл/кг ИМТ Ppeak ≤ 30 мбар Driving pressure ≤ 15 мбар подбор PEEP","Vt 4-6 мл/кг ИМТ Pplat ≤ 30 мбар Driving pressure ≤ 20 мбар PEEP 5-10 мбар"]},{"id":298,"scenario":"Пациентка 40 лет, ждоставлена с направительным диагнозом \"Острый панкреатит\". Жалобы на тошноту и рвоту, вздутие живота, отсуствие стула, боли в животе и в мышцах. В анамнезе 4 случая перелома костей в течение 18 месяцев, желчекаменная болезнь, мочекаменная болезнь, в анамнезе оперативное вмешательство по поводу гиперплазии щитовидной железы около 5 лет назад. Пациентка дезориентирована, заторможена. На электрокардиограмме у пациентки укорочение интервала QT, AB-блокады. По данным УЗИ органов брюшной полости расширенные петли кишечника, железа не визуализируется.","question":"Какой диагноз наиболее вероятен в данном случае у пациентки?","correct":"гиперпаратиреоз","distractors":["микседематозная кома","тиреотоксический криз"]},{"id":299,"scenario":"Мужчина 62 лет доставлен в многопрофильный стационар. При беседе с сопровождавшей его женой выяснилось, что пациент, выходя из подъезда, поскользнулся и упал, ударившись затылком. Кратковременно терял сознание. При поступлении уровень сознания - 13 баллов по ШКГ. Отмечается анизокория OS > OD и правосторонний гемипарез до 3 баллов. По данным единой электронной истории болезни ЕМИАС, у пациента пароксизмальная форма фибрилляции предсердий, сахарный диабет, гипертоническая болезнь. Перенес ОНМК два года назад с хорошим восстановлением. Со слов жены, регулярно принимает бисопролол 5 мг утром, дабигатран 150 мг утром и вечером, метформин 1000 мг утром и вечером, лозартан 100 мг вечером. На ЭКГ - фибрилляция предсердий с ЧСС 80 - 120 в мин. На КТ головного мозга: субдуральная гематома в левой теменно-затылочной области объемом около 60 мл.","question":"Какая терапия показана перед экстренным хирургическим вмешательством?","correct":"Идаруцизумаб в дозе 5 мг","distractors":["Транексамовая кислота 15-25 мг/кг","Концентрат протромбинового комплекса 15 МЕ/кг"]},{"id":300,"scenario":"Пациентка 48 лет, поступила в приемное отделение с направительным диагнозом \"Острый панкреатит\". Жалобы на тошноту, рвоту, боль в животе, отсуствие аппетита и жажду. В анамнезе желчекаменная болезнь, мочекаменная болезнь, 4 случая перелома костей в течение последних 18 месяцев, удаление узла щитовидной железы 5 лет назад. На электрокардиограмме у пациентки укорочение интервала QT, AB-блокады. При эзофагогастродуоденоскопии язвенные повреждения слизистой желудка. Вас вызвали на консультацию, вы выполнили газовый анализ крови: pH 7,39, pCO2 38 мм рт. ст., pO2 95 мм рт. ст., ВЕ 1 ммоль/л, лактат 1,7 ммоль/л, калий 3,3 ммоль/л, натрий 142 ммоль/л, кальций 4,1 ммоль/л, хлор 94 ммоль/л.","question":"С каким состоянием требуется провести диагностику с учетом анамнеза и полученных лабораторных данных?","correct":"передозировка витамина D","distractors":["отравление этиленгликолем","гиперпаратиреоз"]},{"id":301,"scenario":"Женщина 58 лет доставлена в многопрофильный стационар после ДТП. При поступлении уровень сознания - 13 баллов по ШКГ. Отмечается анизокария OS > OD и правосторонний гемипарез до 3 баллов. Клинически перелом правой бедренной кости. По данным системы ЕМИАС у пациентки в анамнезе протезирование митрального клапана в связи с ревматическим проком сердца, сахарный диабет, и гипертоническая болезнь. На момент осмотра АД 100/60 мм рт. ст. ЭКГ - фибрилляция предсердий, ЧСС 100-140 в мин. Температура тела 36,2 градусов. В лабораторных анализах имеется отклонение Нв до 100 г/л, глюкоза 8 ммоль/л, МНО - 2,4 По данным КГ головного мозга субдуральная гематома в левой теменнозатылочной области объемом около 70 мл. По данным рентгенографии - перелом правой бедренной кости со смещением отломков.","question":"Какой вариант нормализации МНО наиболее оптимален в данной клинической ситуации?","correct":"Трансфузия одногруппной СЗП в дозе 15-20 мл/кг","distractors":["Инфузия фитоменадиона 10 мг в/в капельно","Введение криопреципитата 1-2 ед на каждые 10 кг массы тела"]},{"id":302,"scenario":"Женщина 57 лет поступает в ОРИТ из приемного покоя. Жалобы на интенсивную боль в верхней половине живота, тошноту и рвоту, слабость. Больна на протяжение 3 суток, связывает начало заболевания с употреблением обильной жирной пищи. В анмнезе постоянная форма фибрилляции пресдердий, принимает ривароксабан 20 мг в сутки. За время текущего заболевания в связи с тошнотой и рвотой лекарство не принимала. При осмотре: в сознании, контактна, ориентирована. Артериальное давление 140/55 мм рт. ст., синусовая тахикардия 110/мин. Частота дыханий 24/мин, при аускультации – дыхание жесткое. Сатурация 97 %. Живот вздут, напряженный, болезненный при пальпации в эпигастральной области. Симптомы раздражения брюшины отрицательные. Перистальтика не выслушивается. В приемном покое выполнено ультразвуковое исследование брюшной полости - выявлена картина острого отечного панкреатита. В ОРИТ начата инфузионная терапия. Обезболивание ненаркотическими, наркотическими анальгетиками - без значимого эффекта на протяжении 2 ч. Рассматривается возможность установить эпидуральный катетер для продленной эпидуральной анальгезии.","question":"В какие сроки после прекращения приема ривароксабана может быть выполнена пункция и катетеризация эпидурального пространства?","correct":"72 ч","distractors":["12 ч","24 ч"]},{"id":303,"scenario":"Женщина 57 лет поступает в ОРИТ. Жалобы на интенсивную боль в верхней половине живота, тошноту и рвоту, слабость. Больна на протяжение 1 суток, связывает начало заболевания с употреблением обильной жирной пищи. В анамнезе артериальная гипертнезия 2 ст, риск 2, непереносимость лекарственных препаратов отрицает. При осмотре: в сознании, контактна, ориентирована. Артериальное давление 130/55 мм рт.ст., синусовая тахикардия 116/мин. Дышит самостоятельно, частота дыханий 24/мин, при аускультации – дыхание жесткое. Сатурация 96 %. Живот вздут, напряженный, болезненный при пальпации в эпигастральной области. Симптомы раздражения брюшины отрицательные. Перистальтика не выслушивается. Выполнено ультразвуковое исследование брюшной полости - выявлена картина острого отечного панкреатита. КОС: рН 7,36, рСО2 21 мм рт. ст., рО2 85 мм рт. ст., ВЕ -11,9 ммоль/л. Начата инфузионная терапия. Обезболивание ненаркотическими, наркотическими анальгетиками - без значимого эффекта. Установлен эпидуральный катетер (без технических трудностей, уровень Th 10-11), введена тест-доза 40 мг лидокаина , АД 110/50 мм рт. ст, ЧСС 115 в минуту, через 15 минут от начала эпидуральной анальгезии ропивакаин в стандартной дозе - развилась артериальная гипотензия до 80/40 мм рт. ст., тахикардия до 120/мин, слабость, головокружение.","question":"Какая наиболее вероятная причина артериальной гипотензии?","correct":"Снижение ОПСС и исходная гиповолемия","distractors":["Попадание местного анестетика в спинальное пространство с развитием высокого блока","Токсическое действие местных анестетиков"]},{"id":304,"scenario":"Женщина 58 лет диагноз \"Острый деструктивный панкреатит\", 10-е сутки в стационаре, в хирургическом отделении проводилась антибактериальная терапия ципрофлоксацин+метронидазол, однако отмечено повышение температуры тела до 38,5 С, рост лейкоцитов до 20х10*9/л. Выполнена КТ брюшной полости с контрастным усилением - картина деструктивного панкреатита, жидкостного скопления в сальниковой сумке. Под ультразвуковым наведением выполнена пункция скопления, установлен дренаж. Переведена в ОРИТ. При осмотре в сознании, контактна, вялая. Кожные покровы бледные с землист ентрированной мочи.","question":"Определите оптимальную тактику терапии острой почечной недостаточности?","correct":"Незамедлительное начало продленной вено-венозной гемодиафильтрации с учетом гиперкалиемии","distractors":["Проведение процедуры цитосорбции с последующим решением вопроса о проведении гемодиализа","Плазмаферез"]},{"id":310,"scenario":"Мужчина 68 лет поступил в операционную для экстренной диагностической лапароскопии. Сбит скутеристом на тротуаре. По данным УЗИ: свободная жидкость в брюшной полости. Состояние тяжелое. Сознание ясное. Не принимал пищу в течении 7 часов. Не имеет известных ему аллергических реакций. Страдает ишемической болезнью сердца, постоянной формой фибрилляции предсердий. Постоянно принимает варфарин и конкор. Принято решение применить протромбиновый комплекс для реверсии действия варфарина.","question":"Какие факторы свертывания, с наибольшей вероятностью, входят в протромбиновый комплекс?","correct":"II, VII, IX ,X","distractors":["III, IV, V, VI","I,III, IX,X"]},{"id":311,"scenario":"Мужчина 65 лет находится в ОРИТ с диагнозом \"Повторное ОНМК по ишемическому типу в бассейне ПСМА\" (по данным КТ ГМ). Из анамнеза известно, что одиноко проживающий, злоупотребляет алкоголем. Найден дома без сознания. При поступлении сознание угнетено до сопора, левосторонний гемипарез, сенсомоторная афазия. Пищу не глотает, жидкость выливается изо рта. АД 150/85 мм рт. ст., ЧСС 90/мин, фибрилляция предсердий. Дыхание самостоятельное, SрO2 97% , ЧДД 17/мин. Рост 170 см, масса тела 51 кг, тургор кожи снижен, язык сухой, изо рта запах ацетона. В биохимическом анализе крови: натрий 145 ммоль/л, калий 4, 1 ммоль/л, глюкоза 3, 1 ммоль/л, общий белок 45 г/л, альбумин 17 г/л. В анализе мочи кетоновые тела +++. На вторые сутки в ОРИТ установлен назогастральный зонд, начато энтеральное кормление.","question":"Какая начальная доза питания рекомендована в данном случае?","correct":"Не более 500 ккал/сут","distractors":["600-750 ккал/сут","850-1000 ккал/сут"]},{"id":312,"scenario":"Мужчина 65 лет находится в ОРИТ с диагнозом \"Повторное ОНМК по ишемическому типу в бассейне ПСМА\" (по данным КТ ГМ). Из анамнеза известно, что одиноко проживающий, злоупотребляет алкоголем. Найден дома без сознания. При поступлении сознание угнетено до сопора, левосторонний гемипарез, сенсомоторная афазия. Пищу не глотает, жидкость выливается изо рта. АД 150/85 мм рт.ст., ЧСС 90/мин, фибрилляция предсердий. Дыхание самостоятельное, SрO2 97% , ЧДД 17/мин. Рост 170 см, масса тела 51 кг, тургор кожи снижен, язык сухой, изо рта запах ацетона. В биохимическом анализе крови: натрий 145 ммоль/л, калий 4, 1 ммоль/л, глюкоза 3, 1 ммоль/л, общий белок 45 г/л, альбумин 17 г/л. В анализе мочи кетоновые тела +++. На вторые сутки в ОРИТ установлен назогастральный зонд, начато энтеральное кормление - 1000 мл изокалорической питательной смеси за сутки, дополнительно 500 мл воды в зонд. На третьи сутки ухудшение состояния: снижение сатурации, влажные дистантные хрипы, одышка, тахикардия до 160/мин, снижение уровня сознания. Переведен на ИВЛ. Лабораторно: натрий 165 ммоль/л, глюкоза 17 ммоль/л, калий 2,6 ммоль/л. Уменьшена до 500 ккал/сут в виде капельного введения 25 мл/ч доза питательной смеси. Начата инфузия препаратов калия, магния, контроль и коррекция гипергликемии. К терапии добавлены диуретики.","question":"Какой препарат еще необходимо добавить в лечение?","correct":"Тиамин","distractors":["Цианкобаламин","Альбумин"]},{"id":313,"scenario":"Пациент 33 лет, жалобы на нарастающую одышку, слабость, температуру до 38 С. Болен в течение 3-х суток. В анамнезе: ЗЧМТ, злоупотребление алкоголем, употребление парентеральных наркотических препаратов, хронический вирусный гепатит С. В сознании, ориентирован, критика снижена, ИМТ 19, кожные покровы с землистым оттенком, единичные петехии, ЧД 23 в мин, сатурация 93 % на атмосферном воздухе, АД 98/52 мм рт. ст., ЧСС 102 в мин, синусовая тахикардия. Живот мягкий, увеличен в объеме, стул обычный. Диурез сохранен. При поступлении обследовани: КТ органов грудной клетки: участки легочной инфильтрации с множественными разнокалиберными полостями деструкции от 0,5 до 1,0 см; ЭХО КГ- вегетация на трикуспидальном клапане 1 см, трикуспидальная регургитация 2 ст. Из крови выделен Метициллин - устойчивый S. aureus (MRSA).","question":"Какова минимальная продолжительность антистафилококковой терапии у данного больного?","correct":"14 суток","distractors":["3 суток","7 суток"]},{"id":314,"scenario":"Мужчина 65 лет поступает в ОРИТ из отделения кардиологии в связи с выраженной, стремительно нарастающей одышкой. В отделении кардиологии находится со вчерашнего дня, поступал по поводу пароксизма фибрилляции предсердий неизвестной давности, тахисистолии. Кардиологом принято решение о ритм-урежающей терапии, назначено 5 мг бисопролола 2 р/сут. Сегодня утром в 10-00 получил вторую дозу, через 1 ч после этого пожаловался на резкое нарастание одышки, чувства нехватки воздуха, появились дистантные свистящие хрипы. Объективно – больной в сознании, контактен, ориентирован верно, предъявляет вышеописанные жалобы, сообщает, что с детства страдает бронхиальной астмой, иногда (несколько раз в неделю)пользуется ингалятором (название указать не может), базисной терапии в настоящее время не получает. Артериальное давление 125/60 мм рт.ст., ЧСС 80/мин, на ЭКГ – фибрилляция предсердий. Дышит самостоятельно, одышка 32/мин, в дыхании участвуют мышцы плечевого пояса. Сатурация 85% при дыхании комнатным воздухом. При аускультации – жесткое дыхание, свистящие экспираторные хрипы над всеми легочными полями. Налажена инсуффляция кислорода через носовые канюли 2 л/мин.","question":"С какого лекарственного средства надо начинать терапию в этом случае?","correct":"Ипратропиум","distractors":["Сальбутамол","Глюкокортикостероиды"]},{"id":315,"scenario":"Мужчина 55 лет доставлен в ОРИТ. Диагноз СПМ: Тяжелое обострение бронхиальной астмы. Страдает бронхиальной астмой много лет, постоянно использует ингаляторные формы бета2-адреномиметиков и глюкокортикостероидов. Курит до 2 пачек сигарет в день. Ухудшение состояния в течение недели, на фоне ОРВИ. При осмотре: в ясном сознании, несколько возбужден. Артериальное давление 155/90 мм рт.ст., ЧСС 120/мин, на ЭКГ – синусовая тахикардия, частые наджелудочковые экстрасистолы. Одышка 32/мин, в дыхании участвуют мышцы плечевого пояса. Сатурация 86 %. При аускультации – жесткое дыхание, свистящие экспираторные хрипы над всеми легочными полями. Налажена инсуффляция кислорода через носовые канюли 7 л/мин. Проведена небулайзерная ингаляция сальбутамол, пульмикорт, в/в 120 мг преднизолона - с эффектом, одышка 24/мин, дистантные хрипы исчезли, сатурация 96%. КОС: рН 7,32, рСО2 64 мм рт. ст., раО2 76 мм рт.ст. РТерапия продолжена в прежнем объеме, через 4 часа снижение уровня сознания до оглушения, крайне вял, адинамичен. Частота дыхания 18/мин, сатурация 98%. КОС: рН 7,15, рСО2 109 мм рт. ст., раО2 98 мм рт.ст.","question":"В чем причина ухудшения состояния?","correct":"Кислород-индуцированная гиперкапния","distractors":["Острый инфаркт миокарда","Тромбоэмболия легочной артерии"]},{"id":316,"scenario":"Мужчина 55 лет доставлен в ОРИТ. Диагноз СПМ: Тяжелое обострение бронхиальной астмы. Страдает бронхиальной астмой много лет, постоянно использует ингаляторные формы бета2-адреномиметиков и глюкокортикостероидов. Курит до 2 пачек сигарет в день. Ухудшение состояния в течение недели. При осмотре: в ясном сознании, несколько возбужден. Т тела 36,7 С. Артериальное давление 155/90 мм рт.ст., ЧСС 110/мин, на ЭКГ – синусовая тахикардия. Одышка 32/мин, в дыхании участвуют мышцы плечевого пояса. Сатурация 86%. При аускультации – жесткое дыхание, свистящие экспираторные хрипы над всеми легочными полями. Налажена инсуффляция кислорода через носовые канюли 7 л/мин. Проведена небулайзерная ингаляция сальбутамол, пульмикорт, эффект частичный, одышка 28/мин, сохраняются хрипы, сатурация 91% на 15 л/мин. КОС: рН 7,28, рСО2 74 мм рт. ст., раО2 64 мм рт.ст.","question":"Какова дальнейшая тактика терапии?","correct":"К проводимой терапии добавить преднизолон 120 мг внутривенно","distractors":["Выполнить интубацию трахеи, начать ИВЛ","Добавить диуретическую терапию"]},{"id":317,"scenario":"Мужчина 55 лет доставлен в ОРИТ. Диагноз СПМ: Тяжелое обострение бронхиальной астмы. Страдает бронхиальной астмой много лет, постоянно использует ингаляторные формы бета2-адреномиметиков и глюкокортикостероидов. Курит до 2 пачек сигарет в день. Ухудшение состояния в течение недели, на фоне ОРВИ. При осмотре: в ясном сознании, несколько возбужден. Т тела 37,9 С. Артериальное давление 155/90 мм рт.ст., ЧСС 110/мин, на ЭКГ – синусовая тахикардия. Одышка 32/мин, в дыхании участвуют мышцы плечевого пояса. Сатурация 86%. При аускультации – жесткое дыхание, свистящие экспираторные хрипы и единичные жужжащие хрипы над всеми легочными полями. При кашле небольшое количество трудноотходящей слизисто-гнойной мокроты. Налажена инсуффляция кислорода через носовые канюли 7 л/мин. Проведена небулайзерная ингаляция сальбутамол, пульмикорт, преднизолон 120 мг внутривенно. Эффект частичный, одышка 26/мин, сохраняются хрипы, сатурация 93% на 15 л/мин. Лабораторно: рН 7,3, рСО2 74 мм рт. ст., раО2 64 мм рт.ст. Лейкоциты 12*10^9/л, С-реактивный белок 43 мг/л. По даннвм рентгенографии органов грудной клетки инфильтративных измененийне выявлено, усиление легочного рисунка.","question":"Какова дальнейшая тактика терапии?","correct":"Назначить антибактериальную терапию","distractors":["Выполнить интубацию трахеи, начать ИВЛ","Добавить диуретическую терапию"]},{"id":318,"scenario":"Мужчина 67 лет поступил в плановом порядке для выполнения эндопротезирования тазобедренного сустава в условиях спинально-эпидуральной анестезии. Аллергические ракции отрицает. Хирургических вмешательств в анамнезе не было. Хронические заболевания: ИБС, постоянная форма фибрилляции предсердий. Постоянно принимает метопролол и дабигатран (отменен 72 часа назад). Оперативное вмешательство перенес удовлетворительно.","question":"Какие сроки возобновления терапии дабигатраном наиболее уместны в данном случае после удаления эпидурального катетера?","correct":"Через 6 часов","distractors":["Через 2 часа","Через 4 часа"]},{"id":319,"scenario":"Пациентка 55 лет поступила в экстренную операционную с диагнозом: \"Стеноз гортани\". Из анамнеза известно, что данное заболевание развилось остро. АД 153/76 мм рт. ст., ЧСС 90 в минуту, сатурация 91%. Признаки трудной интубации трахеи. Хронические заболевания - гипертоническая болезнь. Интубации в анамнезе были без особенностей. Во время попытки провести интубацию трахеи в сознании с помощью бронхоскопа вы увидели данную картину:","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Острый эпиглоттит","distractors":["Заглоточный абсцесс","Полипы голосовых связок"]},{"id":320,"scenario":"Мужчина 56 лет, находится в ОРИТ 3 сутки в связи с дыхательной недостаточностью, обусловленной ушибом левого легкого. Травму получил в ДТП. Проводится ИВЛ, гемодинамика стабильная. Пациенту проводится энтеральное питание. С целью седации проводится постоянная инфузия пропофола со скоростью 20 мл/ч.","question":"Какое количество энергии поступает с инфузией пропофола за сутки данному пациенту?","correct":"~450 ккал","distractors":["~60 ккал","~120 ккал"]},{"id":321,"scenario":"Мужчине 45 лет планируется выполнить эндоскопическое удаление злокачественной опухоли голосовых связок. Аллергоанамнез спокоен. Хронические заболевания - гипертоническая болезнь, мочекаменная болезнь. подагра. АД 143/71 мм рт. ст., ЧСС 78 в минуту, ЧДД 18 в минуту, сатурация 95%. Лабораторно без особенностей. Планируется проведение комбинированного эндотрахеального наркоза поливинилхлоридной трубкой. Риск ASA 2.","question":"Какой недостаток имеет интубационная трубка из поливинилхлорида в данной ситуации?","correct":"Легкая воспламеняемость","distractors":["Низкая передача тепла","Высокая передача тепла"]},{"id":322,"scenario":"Больной 35 лет, 1-е сутки stractors":["Установка зонда на отток, проведение парентерального питания","Введение в зонд смеси типа «диабет» с проведением дополнительного парентерального питания"]},{"id":324,"scenario":"Пациентка в возрасте 68 лет, находится в ОРИТ 2 сутки после экстренного оперативного вмешательства по поводу по поводу острой спаечной тонкокишечной непроходимости. Причина непроходимости устранена, кишка жизнеспособна, выполнена интубация тощей кишки. Сопутствующая патология: ИБС, стенокардия напряжения, ФК II. Гипертоническая болезнь II ст. Сахарный диабет 2 типа.При осмотре: проводится медикаментозная седация, ИВЛ (SpO2 96 % при FiO2 0,35). Гемодинамика с тенденцией к гипотензии, АД 112/56 мм рт. ст., ЧСС 114 в мин, инфузия норадреналина со скоростью 0,12 мкг/кг/мин. Кишечные шумы не выслушиваются, по зонду выделилось 1600 мл отделяемого. Лабораторно гемоглобин 136 г/л, лейкоциты 14,2*10^9/л, К+ 3,7 ммоль/л, лактат 2,5 ммоль/л. Пациентке начато проведение кишечного лаважа глюкозо-электролитным раствором.","question":"Какой объем глюкозо-электролитного раствора оптимально вводить за сутки при проведении кишечного лаважа данной пациентке?","correct":"1500 -2000 мл","distractors":["250-500 мл","750-1000 мл"]},{"id":325,"scenario":"Больная, 42 лет, находится в ОРИТ 3 сутки в связи с тяжелой сочетанной травмой, полученной вследствие падения с высоты (перелом V-VIII ребер слева, перелом левой бедренной кости, разрыв селезенки, внутрибрюшное кровотечение геморрагический шок, ОРДС). Выполнена спленэктомия, стабилизация перелома бедренной кости аппаратом внешней фиксации. Проводилась массивная инфузионно-трансфузионная терапия, явления шока купированы, проводится ИВЛ. Отмечаются явления гастростаза (по назогастральному зонду сброс 1000 мл застойного отделяемого), начато проведение парентерального питания. Пациентке показано проведение прокинетической терапии.","question":"Какой из перечисленных препаратов оптимально назначить с этой целью?","correct":"Эритромицин","distractors":["Оксациллин","Рифампицин"]},{"id":326,"scenario":"Женщина 26 лет находится в отделении реанимации более 30 дней по поводу разрыва аневризмы головного мозга. Сознание угнетено, атония, арефлексия, адинамия. Продленная ИВЛ. Гемодинамика стабильная на фоне внутривенной инфузии норадреналина 0,1 мкг/кг/мин. Констатирована смерть мозга.","question":"При каком условии в данном случае органы или ткани могут быть изъяты для трансплантации?","correct":"Если имеются бесспорные доказательства факта смерти, зафиксированного консилиумом","distractors":["Если есть письменное прижизненное согласие на изъятие органов потенциального донора","Только при наличии экстренной ситуации с угрозой жизни для реципиента"]},{"id":327,"scenario":"Пациент 18 лет находится в отделении реанимации более 50 дней после падения с высоты 10-го этажа с диагнозом: \"Тяжелая черепно-мозговая травма\". Сознание угнетено, атония, арефлексия, адинамия. Продленная ИВЛ. Гемодинамика стабильная. Диурез 3 мл/кг/час. Энтеральное зондовое питание удерживает.","question":"С какой целью в данном случае пациенту может быть назначен тест апноэтической оксигенации?","correct":"Диагностика смерти мозга","distractors":["Диагностика нарушений со стороны ССС","Определение функциональной активности дыхательной мускулатуры"]},{"id":328,"scenario":"Пациент 18 лет находится в отделении реанимации более 50 дней после падения с высоты 10-го этажа с диагнозом: \"Тяжелая черепно-мозговая травма\". Сознание угнетено, атония, арефлексия, адинамия. Продленная ИВЛ. Гемодинамика стабильная. Диурез 3 мл/кг/час. Энтеральное зондовое питание удерживает.","question":"Что из перечисленного ниже, с наибольшей вероятностью, может подтвердить в данном случае отсутствие самостоятельного дыхания при протоколе диагностики смерти мозга?","correct":"Тест апноэтической оксигенации","distractors":["Перевод на режим СРАР с контролем рСО2 и рО2 венозной крови","Экстубация трахеи с полным отключением аппарата ИВЛ"]},{"id":329,"scenario":"Пациент, возраст 50 ect":"Мониторинг нейромышечной проводимости","distractors":["Мониторинг биспектрального индекса","Мониторинг энтропии"]},{"id":332,"scenario":"Пациентке 45 лет (ASA II), лапароскопическая холецистэктомия. Из анамнеза пациентки установлено, что у нее (согласно инструкции производителя) имеются противопоказания к введению пропофола. В связи с этим, Вы собираетесь провести ингаляционную масочную индукцию и поддержание общей анестезии севофлураном.","question":"Какой из перечисленных вариантов наиболее правильно описывает зависимость скорости индукции анестезии?","correct":"Чем сильнее анестетик поглощается кровью, тем медленнее индукция анестезии","distractors":["Скорость индукции анестезии прямо пропорциональна температуре воздуха в операционной","Скорость индукции анестезии не зависит от скорости поглощения анестетика кровью"]},{"id":333,"scenario":"Пациенту 73 лет (ASA III) планируется биопсия простаты под тотальной внутривенной анестезией. Из анамнеза известно, что он длительное время принимает статины, ривароксабан, перенес острое нарушение мозгового кровообращения 10 месяцев назад. При осмотре отмечается правосторонний гемипарез. АД 140/90 мм рт. ст., SрO2 98%. В анализах крови выраженных отклонений не выявлено. По ЭКГ - постоянная форма фибрилляции предсердий.","question":"Когда следует прекратить прием ривароксабана перед операцией?","correct":"Не менее, чем за 24 часа до операции","distractors":["Не менее, чем за 6 часов до операции","Не менее, чем за 12 часов до операции"]},{"id":334,"scenario":"Пациенту 56 лет проводится операция - верхняя лобэктомия слева под общей анестезией. Выполнена индукция, установлена двухпросветная трубка без технических сложностей. Положение пациента на правом боку. Проводится одноклеточная вентиляция. Витальные показатели - АД 116/70 мм рт. ст., ЧСС 76 ударов/мин, SрO2 96 %, ЭКГ- ритм синусовый.","question":"Какова наиболее вероятная доля шунтирования крови при одноклеточной вентиляции?","correct":"20-30%","distractors":["1-5%","6-10%"]},{"id":335,"scenario":"Пациенту 56 лет проводится операция - верхняя лобэктомия слева под общей анестезией. Выполнена индукция, установлена двухпросветная трубка без технических сложностей. Положение пациента на правом боку. Проводится одноклеточная вентиляция. Витальные показатели - АД 116/70 мм рт. ст., ЧСС 76 ударов/мин, SрO2 96 %, ЭКГ- ритм синусовый.","question":"Как повлияет начало одноклеточной вентиляции на альвеолярно-артериальную разницу по кислороду (РА-а) у данного пациента?","correct":"Альвеолярно-артериальная разница по кислороду (РА-а) увеличится","distractors":["Альвеолярно-артериальная разница по кислороду (РА-а) уменьшится","Альвеолярно-артериальная разница по кислороду (РА-а) не изменится"]},{"id":336,"scenario":"Пациенту 56 лет проводится операция - верхняя лобэктомия слева под общей анестезией. Выполнена индукция, установлена двухпросветная трубка без технических сложностей. Положение пациента на правом боку. Проводится одноклеточная вентиляция. Витальные показатели - АД 116/70 мм рт. ст., ЧСС 76 ударов/мин, SрO2 96 %, ЭКГ- ритм синусовый.","question":"Какой эффект наиболее вероятен при введении нитроглицерина в данной ситуации?","correct":"Угнетение гипоксической легочной вазконстрикции, увеличение легочного шунта","distractors":["Угнетение гипоксической легочной вазконстрикции, уменьшение легочного шунта","Стимуляция гипоксической легочной вазоконстрикции, уменьшение легочного шунта"]},{"id":337,"scenario":"Пациенту 56 (ASA II) лет проводится операция - верхняя лобэктомия слева по поводу объемного образования под общей анестезией. Выполнена индукция (фентанил 0,2мг, пропофол 200мг, рокуроний- 50 мг внутривенно), установлена левосторонняя двухпросветная трубка без технических сложностей. Положение пациента на правом боку. Во время операции применяете севофлюран (1 МАК). Течение анестезии гладкое. Проводится однолегочная вентиляция (газовый состав смеси - кислород+воздух+севофлюран). Витальные показатели - АД 125/70 мм.рт.ст, ЧСС 68 ударов/мин, SatO2 - 96%, ЭКГ- ритм синусовый, ЧСС 68 ударов/минуту.","question":"Какое утверждение наиболее верно относительно фракции кислорода во вдыхаемой смеси при однолегочной вентиляции у данного пациента?","correct":"Низкая FiO2 вызывает гипоксическую вызоконстрикцию в вентилируемом легком","distractors":["Высокая FiO2 вызывает гипоксическую вызоконстрикцию в вентилируемом легком","Низкая FiO2 вызывает увеличение кровотока в вентилируемом легком"]},{"id":338,"scenario":"Женщина 55 лет поступает в ОРИТ из операционной после завершения экстренного оперативного вмешательства по поводу опухоли нисходящей ободочной кишки, обтурационной толстокишечной непроходимости, перфорации толстой кишки, фибринозно-гнойного перитонита. Операция: левосторонняя гемиколэктомия, трансверзостомия, санация и дренирование брюшной полости. В ОРИТ продолжена ИВЛ в режиме SIMV+PS с параметрами fiO2 50%, ДО 400 мл, ЧД 15/мин, спонтанной дыхательной активности пока нет. PEEP 6 мбар, PS 10 мбар, Pmean 10 мбар Ppeak 15 мбар. SatO2 99%. Гемодинамика стабильная, АД 110/65 мм рт.ст, ЧСС 90/мин, ритм синусовый, центральное венозное давление +5 см Н2О. Через 30 минут после поступления медицинская сестра внутривенно ввела антибиотик (цефотаксим 2 г). Через 3 минуты после введения отмечается синусовая тахикардия до 130/мин, падение артериального давления до 80/40 мм рт.ст, рост пикового давления до 40 мбар, снижение сатурации до 85%. Реаниматолог экстренно произвел вмешательство первой линии.","question":"Каково наиболее частое осложнение этого вмешательства?","correct":"Желудочковая тахикардия","distractors":["Острая надпочечниковая недостаточность","Травма легкого"]},{"id":339,"scenario":"Женщина 55 лет находится в в ОРИТ, в раннем послеоперационном периоде в ответ на введение антибиотика развился анафилактический шок, врач установил диагноз, ввел 1 мл 0,1% р-ра адреналина в/в струйно. У больной развилось нарушение сердечного ритма - см. ЭКГ. Пульс на крупных сосудах отсутствует. АД не поддается измерению.","question":"Каков первоочередный метод купирования данного состояния?","correct":"Электроимпульсная терапия","distractors":["Введение атропина 1 мг в/в струйно","Установка временного водителя ритма"]},{"id":340,"scenario":"Мужчина 35 лет доставлен в стационар с диагнозом: \"Анафилактический шок 2 степени\". Через 15-20 минут после употребления в пищу пиццы с морепродуктами у пациента развилось удушье, отек языка, лица, головокружение, слабость. Бригада скорой медицинской помощи зафиксировала АД 70/40 мм рт. ст., ввели в/м адреналин. Через 5 минут АД 100/75 мм рт. ст., синусовая тахикардия 120/мин, удушье менее выражено, в периферический венозный катетер провели инфузию Стерофундина 500 мл. Доставлен в ОРИТ через 15 минут. При осмотре: возбужден, дезориентирован, АД 110/60 мм рт.ст., ЧСС 110/мин, синусовая тахикардия на ЭКГ, SpO2 90 %, частота дыхательных движений 26/мин, при аускультации - свистящие хрипы. Налажена кислородотерапия.","question":"Что из нижеперечисленного необходимо сделать в первую очередь?","correct":"Начать терапию глюкокортикостероидами: преднизололон 90-120 мг или дексаметазон 8-32 мг в/в капельно","distractors":["Небулайзерная ингаляция раствора адреналина","Повторное введение адреналина в/в 0,01 мг/кг, не более 0,5 мг суммарно в условиях мониторинга сердечной деятельности"]},{"id":341,"scenario":"Женщина 45 лет доставлена бригадой скорой медицинской помощи в стационар с направительным диагнозом: анафилактический шок. Через 15-20 минут после употребления в пищу пирога с орехами у пациентки развилось удушье, отек языка, лица, головокружение, слабость. Бригада скорой медицинской помощи зафиксировала АД 80/55 мм рт. ст., ввели в/м адреналин. Через 5 минут АД 105/75 мм рт. ст., синусовая тахикардия 120/мин, удушье менее выражено, в периферический венозный катетер провели инфузию кристаллоидов 500 мл. Доставлена в стационар через 15 минут. При осмотре в ОРИТ: возбуждена, дезориентирована, АД 80/50 мм рт. ст., ЧСС 120/мин, синусовая тахикардия на ЭКГ, SpO2 90 %, ЧД 28/мин, дистантные свистящие хрипы. Налажена кислородотерапия. Повторно в/в медленно введено 300 мкг адреналина, проведена быстрая в/в инфузия 500 мл кристаллоидов - артериальное давление 110/70 мм рт. ст., ЧСС 100/мин. Введено 120 мг преднизолона в/в капельно в течение 30 минут. Сохраняется одышка до 24/мин, свистящие хрипы по всем легочным полям при аускультации. SpO2 94 % на фоне инсуффляции О2 5 л/мин. КОС: рН 7,44, рСО2 50 мм рт. ст, раО2 68 мм рт. ст.","question":"Какая тактика ведения пациента наиболее правильная в данной ситуации?","correct":"Небулайзерная терапия сальбутамолом","distractors":["Небулайзерная ингаляция раствора адреналина","Небулайзерная ингаляция раствора м-холиномиметиков"]},{"id":342,"scenario":"Больной 65 лет обратился в приемное отделение стационара самотеком с жалобами на выраженную одышку, удушье. Со слов сопровождающей дочери, состояние ухудшилось внезапно: накануне пациент отмечал першение в горле и заложенность носа, сегодня во время прогулки закашлялся и решил использовать подаренный соседкой ингалятор, после ингаляции развилось резкое удушье, отек лица, свистящее дыхание. Ингалятор предоставлен для осмотра – биологически активный препарат, сбор трав. Ранее пациент переносил инфаркт миокарда, страдает гипертонической болезнью, принимает рекомендованную кардиологом терапию, не курит, занимается спортом. Страдает аллергическим ринитом с обострением в период цветения. Никогда ранее подобных эпизодов одышки не было. Осмотр реаниматологом в приемном отделении: пациент в сознании, возбужден, дезориентирован, лицо отечно, говорит с трудом, свистящее стридорозное дыхание с участием мышц шеи, 30/мин. Сатурация 75%. Акроцианоз. Артериальное давление 160/90 мм рт.ст., ЧСС 120/мин.","question":"Какой наиболее вероятный диагноз?","correct":"Анафилаксия","distractors":["Бронхиальная астма","Обострение хронической обструктивной болезни легких"]},{"id":343,"scenario":"Больной 65 лет доставлен в ОРИТ с диагнозом \"Анафилакти й плотный бледный безболезненный отек шеи, лица, век, губ. Кожные покровы бледные, высыпаний нет. Дышит самостоятельно, 24/мин, дистантные шумы на вдохе и выдохе. Сатурация 95% без дополнительной оксигенации. Артериальное давление 100/70 мм рт.ст., ЧСС 110/мин, синусовая тахикардия.","question":"Какой препарат первой линии в данном случае?","correct":"Блокатор рецепторов к брадикинину","distractors":["Глюкокортикостероид","Блокатор Н2-гистаминовых рецепторов"]},{"id":354,"scenario":"Больная 48 лет доставлена в стационар бригадой СМП с направляющим диагнозом (острый живот). Боли в животе схваткообразного характера беспокоят на протяжение 6 часов, начались после удара мячом в живот, стихают и снова усиливаются. Рвота \"зеленью\" 4 раза за 2 предшествующих часа. Никаких лекарств постоянно не принимает, хронические заболевания – артериальная гипертензия, сообщает об аллергии на капотен в виде отека лица, языка. В приемном отделении осмотрена хирургом, направлена в экстренную операционную. Интраоперационно – плотный отек участка тонкой кишки с полным перекрытием ее просвета, дилятация выше расположенных участков тонкой кишки, асцитический выпот. Выполнена резекция измененного участка, энтероэнтеростомия \"бок-в-бок\". Для послеоперационного наблюдения переведена в ОРИТ.","question":"Какой наиболее вероятный диагноз?","correct":"Наследственный ангиоотек","distractors":["Мезентериальный тромбоз","Периодическая болезнь"]},{"id":355,"scenario":"Больная 48 лет доставлена в стационар бригадой СМП с направляющим диагнозом (острый живот). Боли в животе схваткообразного характера беспокоят на протяжение 6 часов, начались после удара мячом в живот, стихают и снова усиливаются. Рвота \"зеленью\" 4 раза за 2 предшествующих часа. Никаких лекарств постоянно не принимает, хронические заболевания – артериальная гипертензия, сообщает об аллергии на капотен в виде отека лица, языка. Мать пациентки скончалась от отека лица и шеи, острого удушья. В приемном отделении пациентка осмотрена хирургом, с диагнозом \"острая кишечная непроходимость\" направлена в экстренную операционную. Интраоперационно – плотный отек участка тонкой кишки с полным перекрытием ее просвета, дилятация выше расположенных участков тонкой кишки, асцитический выпот. Выполнена резекция измененного участка, энтероэнтеростомия \"бок-в-бок\". Для послеоперационного наблюдения переведена в ОРИТ.","question":"Что необходимо добавить к традиционному послеоперационному ведению кишечной непроходимости в этом случае?","correct":"Нативную или свежезамороженную плазму","distractors":["Хлорпирамин","Дексаметазон"]},{"id":356,"scenario":"Пациентка 28 лет, беременность 40 недель, оперативное родоразрешение. Метод анестезиологического пособия - спинальная анестезия. В операционной у пациентки АД124/63 мм рт.ст., ЧСС 87 в мин., SpO2 98%. С техническими сложностям, с третьей попытки анестезиолог выполняет пункцию спинального пространства на уровне L2-L3, в павильоне спинальной иглы получен ликвор с примесью крови. Введен бупивакаин 5мг/мл в дозе 11мг/2.1 мл. После выполнения анестезии пациентка укладывается на операционный стол. Пациентка предъявляет жалобы на шум в ушах, чувство нехватки воздуха, сердцебиение. После развиваются тонико-клонические судороги. Выставлен диагноз: токсическое действие местным анестетиком. Начата сердечно-легочная реанимация и интенсивная терапия.","question":"Какова продолжительность сердечно-легочная реанимации у данной пациентки?","correct":"60 минут","distractors":["30 минут","40 минут"]},{"id":357,"scenario":"Пациентка 32 лет с диагнозом: беременность 39 недель доставлена в экстренную операционную с признаками дистресса плода. Сопутствующих заболеваний нет. Лабораторные данные в пределах референсных значений. АД 100/62 мм рт.ст., пульс 98 в мин, сатурация 97%, температура 36,8 °С. С целью профилактики гнойно-септических осложнений до извлечения плода введен амоксиклав. Выполнена спинальная анестезия, сенсорный и моторный блок адекватный. Начата операция кесарево сечение. После извлечения плода и отделения плаценты пациентка отмечает чувство нехватки воздуха, резкое головокружение. Врач анестезиолог зафиксировал цианоз кожных покровов, диспноэ, гипотонию до 60/30 мм рт. ст., развилось массивное акушерское кровотечении, произошла остановка сердечной деятельности.","question":"Наиболее вероятны диагноз?","correct":"Эмболия околоплодными водами","distractors":["Разрыв матки","Отслойка плаценты"]},{"id":358,"scenario":"Пациентка 29 лет наблюдается в палате интенсивной терапии после экстренного кесарева сечения в условиях эндотрахеального наркоза с применением опиодов, миорелаксантов, летучих анестетиков. АД 100/70 мм рт. ст., ЧСС 72 в мин., SpO2-99%. Через 2 часа после операции отмечается повышение температуры тела до 39,5 °С, введение антипиретиков без эффекта. Лабораторные показатели биохимического анализа крови: К 8,1 ммоль/л, КФК 1500 МЕ. КОС: смешанный ацидоз. При макроскопической оценке мочи отмечается окраска цвета \"мясных помоев\".","question":"Наиболее вероятный диагноз?","correct":"Злокачественная гипертермия","distractors":["Рабдомиолиз","Сепсис"]},{"id":359,"scenario":"Пациент 60 лет (ASA III) поступает в операционную с диагнозом - абсцесс легкого. Планируется экстренная санационная операция. В операционной состояние пациента тяжелое, АД 100/60мм.рт.ст, ЧСС 110 ударов в минуту, по ЭКГ - синусовый ритм, SрO2- 91%. Вы проводите быструю последовательную индукцию.","question":"Какое положение наиболее оптимально для эндобронхиальной интубации больного в данном случае?","correct":"Полусидя, пораженная сторона ниже здоровой","distractors":["Лежа на спине, пораженная сторона ниже здоровой","Положение с приподнятым ножным концом"]},{"id":360,"scenario":"Пациент 60 лет, плановая холецистэктомия в условиях общей анестезии с ИВЛ (севофлуран+фентанил+рокуроний). Течение интраоперационного периода без особенностей, проводится инфузионная терапия кристаллоидными растворами.","question":"Какая концентрация ионов хлорида наиболее вероя ельная почечная терапия в модальности Высокообъемная гемодиафильтрация, объем замещения 80 мл/кг/час. Температура нагревания диализата и замещающего раствора - 36 С. Применение экстракорпоральной терапии привело к стабилизации гемодинамики и нормализации температуры. Через 6 часов от начала гемодиафильтрации отмечается сильная мышечная дрожь, тахикардия 150-160 уд. в мин., гипотермия до 35,6 в пищеводе.","question":"Какова оптимальная тактика в данной ситуации?","correct":"Снижение объема замещения, увеличение температуры диализата и субституата","distractors":["Углубление седации","Замена экстракорпорального контура"]},{"id":409,"scenario":"Пациентка 50 лет поступила в приемное отделение в связи с гипотонией. Объективно: сознание - поверхностное оглушение, ЧД 22 в мин., АД 85/45 мм рт. ст., ЧСС 92 в мин. Из анамнеза известно, что пациентка ограничено питалась, последний месяц принимала регулярно кеторолак, диклофенак, ибупрофен в связи с сильными артралгиями. В последние 3 дня объем суточного диуреза уменьшился до 500 мл.","question":"Какой раствор для восполнения объема циркулирующей крови будет предпочтительным в этой ситуации?","correct":"Сбалансированные кристаллоиды","distractors":["Растворы гидроксиэтилкрахмала","Препараты альбумина"]},{"id":410,"scenario":"Мужчина 67 лет, поступил в приемное отделение с болью в спине. При лабораторном скрининге выявлен креатинин 550 мкмоль/л, мочевина 30 ммоль/л, калий 6,1 ммоль/л, На консультацию приглашен реаниматолог. При расспросе – больной отрицает заболевания почек, страдает сахарным диабетом, гипертонической болезнью. Три недели назад также обращался в приемное отделение с болями в спине, установлен диагноз люмбоишалгия, назначены нестероидные противовоспалительные препараты, тогда же креатинин 58 мкмоль/л. Все это время продолжал принимать НПВС, однако эффект снижался, в последние дни дозу увеличил.","question":"Какая наиболее вероятная причина повышения креатинина?","correct":"Острое повреждение почек вследствие нефротоксического действия нестероидных противовоспалительных средств","distractors":["Экстренная госпитализация в ОРИТ, интубация трахеи, начать ИВЛ, инфузионную терапию","Выполнить КТ олрганов брюшной полости с контрастированием с последующей госпитализацией в ОРИТ"]},{"id":411,"scenario":"Мужчина 50 лет. МКБ, конкремент правого мочеточника. Обструктивный пиелонефрит, гидронефроз. Анамнез скудный: беспокоят боли в спине, тошнота, уменьшение количества мочи, считает себя больным несколько суток. При поступлении установлена чрескожная пункционная нефростома справа. Через 2 часа после вмешательства вызов врача в палату: тошнота, рвота, возбуждение, дезориентация. Переведен в ОРИТ. При осмотре в ОРИТ: возбужден, дезориентирован в месте и времени, жалуется на тошноту, рвоту, жажду. Кожные покров бледный с землистым оттенком, пастозность подкожо-жировой клетчатки, отеки нижних конечностей, поясничной области. ЧД 30/мин, 94%, при аускультации – жесткое дыхание, влажные мелкопузырчатые хрипы в нижних отделах. ЧСС 100/мин, АД 175/100 мм рт. ст. Температура тела 38,5 С. Лабораторно: калий 6,8, мочевина 50 ммоль/л, креатинин 800 мкмоль/л.","question":"Какое нарушение водно-электролитного баланса с наибольшей вероятностью имеет место у больного?","correct":"Гиперосмоляльная гипергидратация","distractors":["Амлодипин","Валсартан"]},{"id":412,"scenario":"В отделение реанимации поступил пациент 66 лет в связи с гипотонией, потребовавшей вазопрессорной поддержки. Известно, что пациент получает сеансы программного гемодиализа. Последний сеанс ЗПТ был 4 дня назад. У пациента имеется перманентный центральный венозный катетер (внутренняя яремная вена справа), туннелизированный в правую подключичную область. При физикальном осмотре отмечается гиперемия и отек области вокруг ЦВК, гнойное отделяемое. Вам необходимо провести сеанс ЗПТ.","question":"Какая тактика в данном случае предпочтительна?","correct":"Удалить перманентный катетер, установить временный катетер для диализа во внутреннюю Гепатит А"]},{"id":447,"scenario":"Пациент, возраст 62 года, переведен в отделение реанимации в послеоперационном периоде с диагнозом острый гангренозно-перфоративный аппендицит, разлитой перитонит, сепсис. Проводится ИВЛ, инфузионная терапия, антибактериальная терапия. АД 90/50 мм рт. ст. ЧСС 133 в минуту. ЭХО-КГ — ФВ 50%, НПВ 2,0 см, коллабирует 50%. По данным КОС — лактат 4,0 ммоль/л, pH 7,15, BE - 12 ммоль/л, рСО2 32 мм рт. ст.","question":"Какой режим терапии для поддержки гемодинамики наиболее оптимален?","correct":"Инфузия норадреналина, титрация дозы","distractors":["Возможно начало энтерального питания, достаточен расчет потребности в нутриентах по стандартной формуле","Возможно начало энтерального питания, для определения потребностив нутриенктах требуется проведение непрямой калориметрии"]},{"id":448,"scenario":"Мужчина 50 лет. Конкремент правого мочеточника, обструктивный правосторонний пиелонефрит. Урологом выполнено стентирование мочеточника, получена гнойная моча. Интраоперационно развился озгноб, переведен в ОРИТ. При осмотре в ОРИТ: возбужден, дезориентирован в месте и времени, жалуется на тошноту. Кожные покров бледные, \"мраморные\", пастозность нижних конечностей, поясничной области. Температура тела 38,5. ЧД 30/мин, 94% без кислородный поддержки, при аускультации – жесткое дыхание. Налажена инсуффляция увлажненного кислорода 5 л/мин через носовые канюли, на этом фоне сатурация повысилась до 97%. ЧСС 120/мин, АД 80/40 мм рт. ст. По данным КОС: pH 7,25, BE - 12 ммоль/л, рСО2 24 мм рт. ст., лактат 9,2 ммоль/л.","question":"На какой лабораторный показатель можно будет ориентироваться в первые сутки для оценки эффективности проводимой терапии?","correct":"Лактат крови","distractors":["Кислород-индуцированная гиперкапния","Острый инфаркт миокарда"]},{"id":449,"scenario":"Мужчина 50 лет. Конкремент правого мочеточника, обструктивный правосторонний пиелонефрит. Урологом выполнено стентирование мочеточника, получена гнойная моча. Интраоперационно развилс  отделение стационара после дорожно-транспортного происшествия с направительным диагнозом: Сотрясение головного мозга. Перелом лучевой кости. Из анамнеза известно: сбит автомобилем. Выполнено обезболивание на догоспитальном этапе - фентанил. Объективно: Сознание ясное, контактен. Тоны сердца ритмичные АД 100/54 мм рт. ст., ЧСС 100 в минуту. ЧД 18 в минуту SpO2 99 %. На боковой поверхности туловища слева ссадина и подкожная гематома. Состояние пациент расценено как стабильное, пациент отправлена на КТ в сопровождении медицинской сестры. В кабинете КТ состяоние пациента с отрицательной динамикой, угнетение сознания, кожный пакров бледный, влажный, АД 65/30 мм рт. ст., ЧСС 130, пульс слабый.","question":"Что при поступлении наиболее очевидно указывало на вероятность наличия скрытых повреждений?","correct":"Сбитый пешеход","distractors":["Перелом основания черепа","Делирий, ассоциированный с пребыванием в палате интенсивной терапии"]},{"id":465,"scenario":"Мужчина, 67 лет, выполнена лапароскопическая аппендэктомия. В анамнезе гипертоническая болезнь, постоянно препараты не принимает. Интраоперационный период прошел без особенностей. Гемодинамика была стабильной на протяжении всей операции. Однако, в послеоперационном периоде, на выходе из наркоза, на фоне продолжающейся ИВЛ, у пациента развилась гипертензия до 171/79 мм рт. ст., появилось выраженное возбуждение, свистящие хрипы над всеми полями появилось нарушение ритма в виде суправентрикулярной экстрасистолии. Снижение SpО2 до 89 %.","question":"Какое из перечисленных ниже патологический состояний, с наибольшей вероятностью, развилось у пациента?","correct":"Бронхоспазм","distractors":["Добутамин","Вазопрессин"]},{"id":466,"scenario":"Мужчина, 67 лет, выполнена лапароскопическая аппендэктомия. В анамнезе гипертоническая болезнь, постоянно препараты не принимает. Интраоперационный период прошел без особенностей. Гемодинамика была стабильной на протяжении всей операции. Однако, в послеоперационном периоде, на выходе из м лейкоцитарной формулы влево.","question":"Что из нижеперечисленного является наиболее вероятным рабочим диагнозом?","correct":"Эмпиема плевры","distractors":["Сатурация менее 95%","Одышка более 20 в минуту"]},{"id":469,"scenario":"Мужчина 58 лет, поступил в стационар в связи с клиникой трансмурального инфаркта миокарда передней стенки левого желудочка. Выполнена ангиопластика и стентирование пердней межжелудочковой ветви левой коронарной артерии. Через 4 часа после вмешательства у пациента развилась клиника непрерывно-рецидивирующей фибрилляции предсердий с частотой 120-130 в мин, и эпизодами восстановления синусового ритма с частотой 83 в мин. АД на фоне пароксизма 110/65 мм рт. ст.","question":"Какой антиаритмический препарат наиболее оптимален в данном случае для купирования нарушений ритма?","correct":"Амиодарон","distractors":["не показана в связи с низким СКФ","внутривенное введение эноксапарина в дозе 30 ед/кг"]},{"id":470,"scenario":"Мужчина 49 лет, поступил в стационар в связи с клиникой трансмурального инфаркта миокарда передней стенки левого желудочка. Инфаркт миокарда произошел за трое суток до госпитализации. Пациент в это время находился на даче, за медицинской помощью не обращался. Жалобы на момент поступления в стационар на общую слабость, одышку при физической нагрузке. Боли в грудной клетке не рецидивируют. По данным ЭКГ - элевация сегмента ST в I, AVL, V-V4 отведениях, инверсия Т в V1-V5 отведениях. АД 130/85 мм рт. ст. ЧСС 105 в мин. ЧДД 20 в мин. SpO2 94%.","question":"Какая тактика лечения наиболее предпочтительна в данном случае?","correct":"Консервативная медикаментозная терапия","distractors":["Проведение экстренного ЧКВ, терапия бета-адреноблокаторами, через 40 дней решить вопрос о постановке кардиовертера-дефибриллятора","специальных вмешательств не требуется"]},{"id":471,"scenario":"Мужчина 70 лет, поступил в стационар в связи с клиникой трансмурального инфаркта миокарда передней стенки левого желудочка. Начало болей за 4 часа до вызова регистрировано: синусовый ритм, элевация сегмента ST в отведениях I, aVL, V 1-6 , до 0,5 мВ, патологический зубец Q в отведениях V 1-6. Назначено: морфин внутривенно, ацетилсалициловая кислота 300 мг внутрь, тикагрелор 180 мг внутрь. При объективном обследовании состояние тяжелое, заторможен. Кожные покровы бледные. В легких дыхание везикулярное, хрипов нет. ЧДД 20 в минуту. I тон на верхушке ослаблен, ритм сердца правильный, ЧСС - 80 в минуту. АД - 70/40 мм рт. ст.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Острый коронарный синдром с подъемом сегмента ST, кардиогенный шок","distractors":["Системный тромболизис t-PA (альтеплаза, тенектеплаза)","Системный тромболизис с последующим чрескожным коронарным вмешательством"]},{"id":474,"scenario":"Пациент 61 год поступает в шоковый зал с клинической картиной ОКС (ангинозные боли, ЭКГ картина), при въезде в шоковый зал у пациента клинико-инструментальная картина ФЖ, выполнена электрическая дефибрилляция - асистолия, подключен аппарат наружных компрессий, выполнена интубация трахеи, начата ИВЛ и больной подан в рентгенангиооперационную, через 3 минуты компрессий востановлен гемодинамически эффективный ритм. Установлен желудочный зонд, проведена нагрузка тикагрилолом 180мг (данных о введении на догоспитальном этапе аспирина нет). При перекладывании на стол отмечался эпизод рвоты мимо зонда. В рентгеноперационной выявлена острая оклюзия правой коронарной артерии, проведена тромбоаспирация с баллонной ангиопластикой и стентированием в в/3 правой коронарной артерии, стент без медикаментозного покрытия. Больной возвращен в кардиореанимацию , где выполнено ЭХО-КГ VTI 15 ФВ 50%. Через 15 минут зафиксирована ЖТ с переходом в фибрилляцию желудочков, дефибрилляция дважды, струйное введение р-р амодарона 300мг, без эффекта, повторная дефибрилляция с переходом в ассистолию, начаты компрессии аппаратом механической поддержки кровообращения. выполнено ЭХО-КГ для исключения разрыва миокарда и гемотампонады сердца - тампонады нет. Предположительная причина тромбоз стента, больной поднят в рентгенэндоваскулярную операционую - выявлен тромбоз ранее установленного стента, выполнена тромбоаспирация кровоток TCI IIb.","question":"вероятная причина тромбоза ранее установленного стента","correct":"нарушение доставки препарата (обильная рвота больного), не выполненная повторная нагрузка дезагрегантными препаратами","distractors":["Установка временного кардиостимулятора. Дезагрегантная терапия. Инфузия, симпатомиметики - по показаниям.","Установка постоянного кардиостимулятора. Инфузия адреналина. Фуросемид. Дезагрегантная терапия."]},{"id":475,"scenario":"Пациент 75 лет, поступил в стационар в связи с развитием длительного (>20 мин) приступа давящих болей за грудиной. Длительно страдает гипертонической болезнью с повышением уровня АД до 180/100 мм рт. ст., гипотензивные препараты принимает эпизодически, в течение последних 5 лет – кратковременные приступы давящих болей за грудиной при умеренных физических нагрузках, проходящие в покое. На ЭКГ при поступлении - депрессии ST до 0,3 мВ в отведениях V4-V6. АД при поступлении - 90/60 мм рт. ст. При аускультации легких - выслушиваются влажные незвонкие мелкопузырчатые хрипы с двух сторон ниже углов лопаток. Болевой синдром рецидивирует на фоне введение нитроглицерина внутривенно, купирован введением наркотических анальгетиков.","question":"Какая тактика ведения данного пациента наиболее вероятна в данном случае?","correct":"Провести экстренную коронароангиографию и при возможности выполнить чрескожное коронарное вмешательство","distractors":["Экстренная госпитализация в стационар оснащенного возможностью проведения чрескожного коронарного вмешательства","Холтеровское мониторирование ЭКГ для выявления изменений на ЭКГ во время приступа, при наличии - направление на плановую коронарографию"]},{"id":476,"scenario":"Женщина 53 лет, поступила в стационар в связи с развившимся пароксизмом фибрилляции предсердий. Из анамнеза известно, что п let currentData=[], currentTitle='', order=[], pos=0, correctCount=0, wrongCount=0, answered=false, results=[];
const app=document.getElementById('app'),stats=document.getElementById('stats'),headerSub=document.getElementById('headerSub'),progressFill=document.getElementById('progressFill'),statCorrect=document.getElementById('statCorrect'),statWrong=document.getElementById('statWrong'),statLeft=document.getElementById('statLeft');
const LETTERS=['А','Б','В','Г','Д','Е'];
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML}
function showMenu(){stats.style.display='none';headerSub.textContent='Анестезиология и реаниматология';app.innerHTML=`<h2 class="menu-title">Выберите раздел</h2><p class="menu-text">Оба теста находятся в одном файле.</p><div class="menu-grid"><button class="menu-btn" id="anBtn"><strong>Анестезиология</strong><span>${ANESTHESIA_DATA.length} вопросов</span></button><button class="menu-btn" id="reBtn"><strong>Реаниматология</strong><span>${REANIMATION_DATA.length} вопроса</span></button></div>`;document.getElementById('anBtn').onclick=()=>startQuiz(ANESTHESIA_DATA,'Анестезиология');document.getElementById('reBtn').onclick=()=>startQuiz(REANIMATION_DATA,'Реаниматология')}
function startQuiz(data,title){currentData=data;currentTitle=title;order=shuffle(data.map((_,i)=>i));pos=0;correctCount=0;wrongCount=0;results=[];statCorrect.textContent='0';statWrong.textContent='0';stats.style.display='block';headerSub.textContent=title+' · '+data.length+' вопросов';renderQuestion()}
function renderQuestion(){answered=false;const item=currentData[order[pos]];const opts=shuffle([{text:item.correct,correct:true},...(item.distractors||[]).map(x=>({text:x,correct:false}))]);progressFill.style.width=(pos/currentData.length*100)+'%';statLeft.textContent=currentData.length-pos;app.innerHTML=`<div class="qnum">Вопрос ${pos+1} из ${currentData.length}</div><div class="scenario">${esc(item.scenario)}</div><div class="question">${esc(item.question)}</div><div class="options" id="optionsBox"></div><div class="feedback" id="feedbackBox"></div><div class="controls"><button class="control-btn back" id="backBtn">← В меню</button><button class="control-btn next" id="nextBtn">Следующий вопрос →</button></div>`;const box=document.getElementById('optionsBox');opts.forEach((opt,idx)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="letter">${LETTERS[idx]||idx+1}</span><span>${esc(opt.text)}</span>`;b.onclick=()=>selectAnswer(b,opt,opts,item);box.appendChild(b)});document.getElementById('nextBtn').onclick=nextQuestion;document.getElementById('backBtn').onclick=showMenu}
function selectAnswer(btn,opt,opts,item){if(answered)return;answered=true;const buttons=[...document.querySelectorAll('.opt')];buttons.forEach(b=>b.disabled=true);const f=document.getElementById('feedbackBox');f.classList.add('show');if(opt.correct){btn.classList.add('correct');correctCount++;f.classList.add('good');f.textContent='✓ Верно.';results.push({ok:true,q:item.question})}else{btn.classList.add('wrong');wrongCount++;f.classList.add('bad');f.textContent='✗ Неверно. Правильный ответ выделен зелёным.';results.push({ok:false,q:item.question});buttons.forEach((b,i)=>{if(opts[i].correct)b.classList.add('correct');else if(b!==btn)b.classList.add('dim')})}statCorrect.textContent=correctCount;statWrong.textContent=wrongCount;document.getElementById('nextBtn').classList.add('show')}
function nextQuestion(){pos++;if(pos>=currentData.length)renderEnd();else renderQuestion()}
function renderEnd(){progressFill.style.width='100%';statLeft.textContent='0';const total=currentData.length,pct=Math.round(correctCount/total*100);let review='<div class="review-list">';results.forEach(r=>review+=`<div class="review-item ${r.ok?'ok':'no'}"><span class="mark">${r.ok?'✓':'✗'}</span><span>${esc(r.q)}</span></div>`);review+='</div>';app.innerHTML=`<div class="end-card"><div class="score-label">${esc(currentTitle)} · результат</div><div class="score">${correctCount} / ${total}</div><div class="score-label">${pct}% правильных ответов</div><div class="end-actions"><button class="primary" id="restartBtn">Пройти ещё раз</button><button id="menuBtn">В главное меню</button><button id="reviewBtn">Показать разбор</button></div><div id="reviewWrap" style="display:none">${review}</div></div>`;document.getElementById('restartBtn').onclick=()=>startQuiz(currentData,currentTitle);document.getElementById('menuBtn').onclick=showMenu;document.getElementById('reviewBtn').onclick=e=>{const w=document.getElementById('reviewWrap'),show=w.style.display==='none';w.style.display=show?'block':'none';e.target.textContent=show?'Скрыть разбор':'Показать разбор'}}
showMenu();
</script></body></html>
