перационную с диагнозом разрыв ахиллового сухожилия. Травма несколько часов назад. В приемном выполнено: ЭКГ- синусовый ритм,ЧСС 80 в минуту, без острой патологии. Рентген грудной клетки: без особенностей. Общий анализ крови: без особенностей. Пациент не сообщил о приеме каких-либо медицинских препаратов на постоянной основе. Хронические заболевания отсутствуют, операций не было. За 20 минут до подачи в операционную введен цефазолин 2 г. После выполнения субарахноидальной анестезии на уровне L3-L4 изобарическим раствором бупивакаина в дозировке 15 мг параметры мониторинга, следующие: АД 123/74 мм рт. ст. ЧСС 78 в минуту. Сатурация 99%. Через несколько минут пациент отметил нарастающее чувство беспокойства, зуд по всему телу. Проступил холодный липкий пот и наступила потеря сознания. АД 60/19 мм рт. ст., ЧСС 119 в минуту, сатурация не определяется.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Анафилактический шок","distractors":["Острый коронарный синдром","Рефлекс Берцольда-Яриша"]},{"id":154,"scenario":"Пациентке 34 лет в условиях общей анестезии выполняется ринопластика в плановом порядке. На 20 минуте от начала операции вы отметили падение артериального давления до 70/30 мм рт. ст., при осмотре кожных покровов выявлена крапивница на животе и передней поверхности бедер. Незамедлительно был введен эпинефрин, гемодинамика стабилизирована. Однако, сохраняются явления бронхоспазма.","question":"Какие дополнительные действия наиболее целесообразно предпринять в данном случае для купирования бронхоспазма?","correct":"Применить сальбутамол","distractors":["Ввести эуфилин","Применить ингаляции с глюкокортикостероидами"]},{"id":155,"scenario":"Пациент 48 лет. Поступил на плановую операцию по поводу устранения паховой грыжи. Планируется проведение лапароскопии. В анамнезе устойчивая изжога, сопровождающаяся пассивной регургитацией содержимого желудка в глотку. Больной сообщил, что терапевт в поликлинике связывает это с грыжей пищеводного отверстия диафрагмы. У пациента имеется повышенный риск аспирации содержимого желудка во время анестезии.","question":"Какая методика анестезии наиболее предпочтительна у данного пациента?","correct":"Быстрая последовательная индукция + интубация трахеи","distractors":["Спинальная анестезия + седация","Быстрая последовательная индукция + ларингеальная маска"]},{"id":156,"scenario":"Пациент 48 лет. Подан в операционную на лапароскопическую герниопластику при паховой грыже. В анамнезе устойчивая изжога, сопровождающаяся пассивной регургитацией содержимого желудка в глотку. Больной сообщил, что терапевт в поликлинике связывает это с грыжей пищеводного отверстия диафрагмы. После индукции в анестезию при проведении прямой ларингоскопии в глотке отмечается уровень жидкости.","question":"Какая тактика наиболее предпочтительна в данном случае?","correct":"Опустить головной конец операционного стола","distractors":["Поднять головной конец операционного стола","Повернуть голову пациента набок"]},{"id":157,"scenario":"Пациентка 35 лет, 2 недели после самопроизвольных срочных родов здоровым доношенным ребенком. Доставлена с жалобами на двухчасовую боль в грудной клетке, сопровождающуюся профузным потоотделением и тошнотой. При осмотре: температура тела в норме, сердечный ритм 65 уд/минуту и артериальное давление 130/75 мм рт. ст. Тоны сердца при аускультации ритмичные, без патологических шумов. Пульс на периферических артериях удовлетворительного наполнения, без дефицита пульса. При аускультации легких – без патологических шумов. На ЭКГ - элевация сегмента ST в отведениях II, III, avF, V5, V6 с реципрокной депрессией сегмента ST в отведениях V1-V3. ЭхоКГ выявила нарушения локальной сократимости левого желудочка - гипокинезию в базальном и среднем нижнем сегментах стенки левого желудочка без изменений клапанного аппарата, выпота в полости перикарда нет. Корень аорты и восходящая аорта без изменений.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Острый коронарный синдром","distractors":["послеродовая кардиомиопатия","диссекция аорты"]},{"id":158,"scenario":"Пациентка 67 лет. Менопауза, заместительной гормональной терапии не получает. Анамнез без особенностей. Тяжело переживает прекращение трудовой деятельности, суицидальных мыслей не высказывает, прием лекарственных препаратов, наркотиков отрицает. Госпитализирована с болью в груди и признаками сердечной недостаточности - одышка, тахипноэ до 20 в минуту, незначительное количество влажных не звонких мелкопузырчатых хрипов в легких. ЧСС 74 в минуту, АД 145/85 мм рт. ст. На ЭКГ - элевация сегмента ST в отведениях V 1- V 6.","question":"Какая лечебная тактика наиболее целесообразна в данном случае?","correct":"Экстренное чрескожное коронарное вмешательство","distractors":["Экстренная мультиспиральная компьютерная томография с контрастным усилением","Эхо КГ для исключения выпота в перикарде с последующим дренированием полости перикарда"]},{"id":159,"scenario":"Пациентка 67 лет. Менопауза, заместительной гормональной терапии не получает. Анамнез без особенностей. Госпитализирована с болью в груди и признаками сердечной недостаточности - одышка, тахипноэ до 20 в минуту, незначительное количество влажных незвонких мелкопузырчатых хрипов в легких. ЧСС 74 в минуту, АД 145/85 мм рт. ст. На ЭКГ элевация сегмента ST в отведениях V1-V6. На ЭхоКГ ФВ 40%, зоны акинезии в верхушечных сегментах с баллонированием верхушки. В клиническом анализе крови без существенных отклонений от нормальных значений, тропонин-Т 4 нг/мл. Пациентка госпитализирована в ОРИТ, налажен мониторинг центральной гемодинамики, который показывает повышенное ДЗЛА до 23 мм рт. ст., сердечный выброс и индекс, измеренные по методу термодилюции, составили 3,9 л/мин и 2.2 л/мин/м2. Учитывая клиническую картину заболевания и изменения на ЭКГ пациентке выполнена экстренная коронароангиография:","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Кардиомиопатия Такотсубо","distractors":["Острый миоперикардит","Острый инфаркт миокарда с подъемом сегмента ST"]},{"id":160,"scenario":"Пациентка 35 лет, две недели после нормальных срочных родов здоровым доношенным ребенком, была госпитализирована с жалобами на двухчасовую боль в грудной клетке, сопровождающуюся профузным потоотделением и тошнотой. При осмотре: температура тела в норме, сердечный ритм 65 уд/минуту и артериальное давление 130/75 мм рт. ст. Тоны сердца при аускультации ритмичные, без патологических шумов. Пульс на периферических артериях удовлетворительного наполнения, без дефицита пульса. При аускультации легких – без патологических шумов. На ЭКГ - элевация сегмента ST в отведениях II, III, avF, V5, V6 с реципрокной депрессией сегмента ST в отведениях V1-V3. ЭхоКГ выявила нарушения локальной сократимости левого желудочка - гипокинезию в базальном и среднем нижнем сегментах стенки левого желудочка без изменений клапанного аппарата, выпота в полости перикарда нет. Корень аорты и восходящая аорта без изменений.","question":"Какое диагностическое мероприятие наиболее целесообразно выполнить в данном случае?","correct":"Коронароангиография","distractors":["МРТ сердца","МРТ коронарных артерий"]},{"id":161,"scenario":"Мужчина 46 лет, предъявляет жалобы на интенсивные жгучие боли в груди, шее и нижней челюсти, развившиеся внезапно, после тяжелого психоэмоционального стресса, около 40 минут назад. Госпитализирован в сосудистый центр с возможностью чрескожного коронарного вмешательства. Ранее считал себя относительно здоровым человеком, хронические заболевания отрицает, уровень АД не контролировал. Курильщик. При осмотре: кожные покровы бледные, липкий холодный пот, отеков нет. ИМТ 37кг/м2. В легких хрипов нет, ЧДД 18 в минуту, SatO2 96%. Тоны сердца глухие, ритмичные, шумов нет. АД 110/70 мм рт. ст., ЧСС 56 ударов в минуту. ЭКГ прилагается.","question":"Какая тактика лечения наиболее оптимальна в данном случае наряду с мониторингом АД и ЧСС?","correct":"Морфин дробно внутривенно. Внутривенный болюс эноксапарина 0,5 мг/кг, тикагрелор 180 мг, ацетилсалициловая кислота 300 мг, экстренная ЧКВ","distractors":["Неинвазивная масочная вентиляция. Внутривенный болюс нефракционированного гепарина 100 ЕД/кг, клопидогрел 600 мг, ацетилсалициловая кислота 300 мг, экстренная ЧКВ","Интубация трахеи. ИВЛ. Внутривенная инфузия нитратов. Внутривенный болюс эноксапарина 0,5 мг/кг, тикагрелор 180 мг, ацетилсалициловая кислота 300 мг, экстренная ЧКВ"]},{"id":162,"scenario":"Мужчина 46 лет, предъявляет жалобы на интенсивные жгучие боли в груди, шее и нижней челюсти, развившиеся внезапно, после тяжелого психоэмоционального стресса, около 40 минут назад. Госпитализирован в сосудистый центр с возможностью чрескожного коронарного вмешательства . Ранее считал себя относительно здоровым человеком, хронические заболевания отрицает, уровень АД не контролировал. Курильщик. При осмотре: кожные покровы бледные, липкий холодный пот, отеков нет. ИМТ 37кг/м 2 . В легких хрипов нет, ЧД 18 в минуту, SatO2 – 96. Тоны сердца глухие, ритмичные, шумов нет. АД 110/70 мм рт. ст., ЧСС 56 в минуту. ЭКГ прилагается. После выполнения коронароангиографии и стентирования проксимальной трети ПКА пациент доставлен в отделение интенсивной терапии. В последующие сутки в состоянии отмечена отрицательная динамика, с развитием отека легких. При аускультации сердца у пациента отмечается появление грубого систолического шума на верхушке сердца.","question":"Что из перечисленного ниже, с наибольшей вероятностью, обусловило появление данных изменений?","correct":"Развитие острой недостаточности митрального клапана в результате отрыва хорды или дисфункции папиллярной мышцы","distractors":["Эпистенокардитический перикардит","Развитие аневризмы левого желудочка"]},{"id":163,"scenario":"Пациентка 80 лет, доставлена в кардиоОРИТ. При поступлении предъявляет жалобы на дискомфорт в грудной клетке. В анамнезе 3 года назад острый инфаркт миокарда без проведения чрескожного коронарного вмешательства. Настоящее ухудшение состояния в течение 7-8 ч, когда появились интенсивные давящие, сжимающие загрудинные боли без иррадиации. Самостоятельно использовала 3 дозы спрея с нитроглицерином, без эффекта. Вызвала скорую медицинскую помощь. На ЭКГ зарегистрированы синусовая тахикардия, полная блокада левой ножки пучка Гиса. Назначен морфин внутривенно дробно, ацетилсалициловая кислота 250 мг, клопидогрел 300 мг. При объективном обследовании состояние средней тяжести. Кожные покровы обычной окраски. В легких дыхание везикулярное, хрипов нет. I тон на верхушке сердца ослаблен, акцент II тона над аортой. ЧСС - 98 в минуту, АД - 112/74 мм рт. ст. Живот мягкий, при пальпации безболезненный. Печень не увеличена. Анализ крови на высокочувствительный тропонин 0,6 нг/мл (верхняя граница нормы 0,02 нг/мл). Запланировано проведение коронарной реперфузии.","question":"Какой метод коронарной реперфузии наиболее предпочтителен в данном случае?","correct":"Экстренное первичное чрескожное коронарное вмешательство","distractors":["Системный тромболизис t-PA (альтеплаза, тенектеплаза)","Системный тромболизис с последующим чрескожным коронарным вмешательством"]},{"id":164,"scenario":"Мужчина 54 лет, находится на стационарном лечении в отделении кардиологии с диагнозом: ИБС: острый инфаркт миокарда с подъемом сегмента ST в области передней стенки левого желудочка. Пациенту проведено экстренное ЧКВ со стентированием проксимальной трети передней межжелудочковой артерии, остальные артерии интактны кровоток по пораженной артерии TIMIIII . Получен хороший клинический результат, на ЭКГ- снижение сегмента ST практически к изолинии. Давность инфаркта миокарда 3 суток. Пациент принимает ацетилсалициловую кислоту 125 мг/сут, клопидогрел 75 мг/сут, аторвастатин 80 мг/сут, валсартан 80 мг/сут, метопролол 50 мг/сут. У пациента вновь возникли интенсивные загрудинные боли, резкая общая слабость. При объективном обследовании в легких дыхание ослабленное, влажные хрипы над всей поверхностью легких. АД 85/50 мм рт. ст., ЧСС 112 в минуту, ритм правильный. На ЭКГ в динамике по сравнению с предшествующими сутками зарегистрирован подъем сегмента ST в отведениях V 1-6 до 0,8 мВ.","question":"Какая тактика ведения наиболее вероятна в данном случае?","correct":"показано проведение экстренного ЧКВ","distractors":["обезболивание морфином, продолжение консервативного лечения","проведение ЭхоКГ, при признаках тромбообразования в полости левого желудочка – назначение непрямых антикоагулянтов на срок 180 дней, продолжение консервативной терапии"]},{"id":165,"scenario":"Пациент 26 лет, доставлен в шоковый зал, направительный диагноз острый коронарный синдром. Хронические заболевания отрицает, прием лекарств отрицает, ведет активный образ жизни. Внезапно, около 2 часов назад, появились интенсивные раздирающие боли за грудиной с иррадиацией в позвоночник, обе руки, затрудненное дыхание. Бригадой скорой помощи зарегистрирована ЭКГ: синусовый ритм, нормальное положение электрической оси сердца. Без очаговых изменений, сегмент ST на изолинии. На догоспитальном этапе назначено: морфин внутривенно, терапия ОКС согласно алгоритмам неотложной помощи. Рост 184 см, масса тела 74 кг. При поступлении кожные покровы бледные. При аускультации сердца выслушивается диастолический шум над аортой. ЧСС 100 в минуту. АД на правом плече 130/80 мм рт. ст., на левом - 60/20 мм рт. ст.","question":"Какой диагноз наиболее вероятен у этого пациента?","correct":"Расслаивающая аневризма аорты","distractors":["Острый коронарный синдром c подъемом сегмента ST","Тромбоэмболия легочной артерии"]},{"id":166,"scenario":"Пациентка 74 лет, находится на лечении в отделении неотложной кардиологии в течение 9 дней по поводу инфаркта миокарда с подъемом сегмента ST передней локализации. Реперфузионное лечение не проводилось, в связи с поздними сроками госпитализации в стационар. Течение инфаркта миокарда осложнилось развитием аневризмы левого желудочка. При проведении эхокардиографии: снижение глобальной сократимости левого желудочка (фракция выброса левого желудочка 35%), эффекта спонтанного эхоконтрастирования или признаков внутрисердечного тромбоза нет. Состояние пациентки сохранялось стабильным, нарушений ритма сердца не регистрировалось, явлений недостаточности кровообращения нет. Во время прогулки по коридору пациентка упала, потеряла сознание, персоналом начаты реанимационные мероприятия, зарегистрирована фибрилляция желудочков, купированная разрядом дефибриллятора. Реанимационные мероприятия оказались успешными. Пациентка переведена в блок интенсивной терапии, состояние стабильное. Неврологического дефицита нет. В динамике на ЭКГ синусовый ритм, ЧСС 64 в минуту, зарегистрировано увеличение выраженности подъема сегмента ST в левых грудных отведениях, интервал PQ 120 мсек, комплекс QRS 100 мсек, интервал QTc 420 мсек.","question":"Какая тактика дальнейшего лечения наиболее целесообразна в данном случае?","correct":"Проведение экстренного ЧКВ, терапия бета-адреноблокаторами, через 40 дней решить вопрос о постановке кардиовертера-дефибриллятора","distractors":["специальных вмешательств не требуется","Применение учащающей эндокардиальной стимуляции с целью укорочения продолжительности интервала QTc и снижения риска развития тахикардии типа «пируэт»"]},{"id":167,"scenario":"Девушка 20 лет. Доставлена бригадой СМП из ночного клуба. Жалобы на сильную головную боль, возникшую внезапно, нарушения зрения. Прием анальгетиков боль практически не купировал. Известно, что для бодрости приняла таблетку, купленную с рук в ночном клубе, а примерно через час почувствовала резкую, \"громоподобную\" головную боль, через 30 минут отметила нарушение зрения. При неврологическом осмотре: ШКГ 15 баллов, умеренный мидриаз, реакция зрачков на свет сохранена. Менингеальной симптоматики нет, двухсторонняя гемианопсия с сохранением центрального зрения. АД 150/90 мм рт. ст. ЭКГ - синусовый ритм. ЧСС 100 уд/мин. Температура тела 36,7С. Клинический и биохимический анализы крови – без особенностей. Коагулограмма в норме. МРТ с ангиорежимом, на которой подтвердили САК и выявили очаги ишемии в затылочных долях обоих полушарий; также было отмечено диффузное сегментарное сужение церебральных артерий. С целью поиска источника субкортикальных кровоизлияний, пациентке выполнили церебральную ангиографию, на которой визуализируется диффузное, мультифокальное, сегментарное сужение просветов артерий крупного/среднего калибра по типу (нити бус).","question":"Какой диагноз наиболее вероятен у данной пациентки?","correct":"Синдром обратимой церебральной вазоконстрикции","distractors":["Острое нарушение мозгового кровообращения","Субарахноидальное кровоизлияние"]},{"id":168,"scenario":"Пациентка 35 лет, госпитализирована с жалобами на внезапно появившуюся одышку, слабость, сердцебиение, дискомфорт в грудной клетке. Хронические заболевания отрицает. Менструальная функция сохранена, принимает гормональные контрацептивы. При осмотре АД 115/70 мм рт. ст., ЧСС 96 уд/мин. На ЭКГ – синусовый ритм, блокада правой ножки пучка Гиса, отрицательные зубцы T в отведениях V1-3. В анализах крови уровень D-димера 49600 нг/мл, уровень тропонина I не повышен, клиренс креатинина по Cockcroft - Gault 82 мл/мин. На ЭхоКГ: давление в легочной артерии 40 мм рт. ст. При УЗ-исследовании признаков нарушения проходимости вен нижних конечностей не выявлено. При МСКТ органов грудной клетки с внутривенным контрастированием выявлены дефекты контрастирования в проксимальных отделах правой нижнедолевой артерии.","question":"Какая тактика лечения наиболее оптимальна в данном случае?","correct":"терапия ривароксабаном 15 мг 2 раза в сутки в течение 3 недель, в дальнейшем 20 мг 1 раз в день не менее 3 месяцев","distractors":["терапия ривароксабаном 20 мг 1 раза в сутки неопределенно долго","проведение системного тромболизиса, сочетанная терапия низкомолекулярными гепаринами и антагонистами витамина К до достижения целевого МНО, далее монотерапия антагонистами витамина К с целевым МНО 2,0-3,0 неопределенно долго"]},{"id":169,"scenario":"Пациентка 35 лет, госпитализирована с жалобами на внезапно появившуюся одышку, слабость, сердцебиение, дискомфорт в грудной клетке. Хронические заболевания отрицает. Менструальная функция сохранена, принимает гормональные контрацептивы. При осмотре АД 115/70 мм рт. ст., ЧСС 96 уд/мин. На ЭКГ – синусовый ритм, блокада правой ножки пучка Гиса, отрицательные зубцы T в отведениях V1-3. В анализах крови уровень D-димера 49600 нг/мл, уровень тропонина I не повышен, клиренс креатинина по Cockcroft - Gault 82 мл/мин. На ЭхоКГ: давление в легочной артерии 40 мм рт. ст. При УЗ-исследовании признаков нарушения проходимости вен нижних конечностей не выявлено. При МСКТ органов грудной клетки с внутривенным контрастированием выявлены дефекты контрастирования в проксимальных отделах правой нижнедолевой артерии.","question":"Какая степень тяжести тромбоэмболии легочной артерии наиболее вероятна в данном случае?","correct":"I класс по индексу PESI, низкий риск","distractors":["II класс по индексу PESI, низкий риск с учетом повышения только маркера сердечной недостаточности","II класс по индексу PESI, промежуточно высокий риск"]},{"id":170,"scenario":"Мужчина 65 лет, госпитализирован с жалобами на сильную одышку, которая началась внезапно, кашель с кровохарканием, головокружение, кратковременную потерю сознания и боль за грудиной. За неделю до этого события пациент обратил внимание на отек и болезненность в области правой голени. При осмотре состояние тяжелое, уровень сознания по GCS 10 баллов, бледность кожных покровов, ЧСС 118 в минуту, пульс слабого наполнения, ЧД 28 в минуту, АД 80/40 мм рт. ст., сатурация 80%. На ЭКГ - синусовая тахикардия, отклонение электрической оси вправо, полная блокада правой ножки пучка Гиса. При МСКТ-ангиографии массивная тромбоэмболия.","question":"Какая тактика ведения пациента наиболее целесообразна?","correct":"первичная реперфузионная терапия – системный тромболизис, интенсивная терапия, направленная на стабилизацию состояния","distractors":["первичная реперфузионная терапия – системный тромболизис","новые оральные антикоагулянты или низкомолекулярные гепарины в сочетании с антагонистами витамина К до достижения целевого уровня МНО"]},{"id":171,"scenario":"Пациентка 42 лет, доставлен с направительным диагнозом ОКС. жалобы на тяжесть в левой половине грудной клетки без четкой связи с физической нагрузкой, на одышку при обычной физической нагрузке. АД 115/70 мм рт. ст., ЧСС 80 в минуту. На ЭКГ: синусовый ритм с ЧСС 80 в минуту, сегмент ST на изолинии, блокада передней ветви левой ножки пучка Гиса. При ЭхоКГ выявлены снижение глобальной сократительной способности левого желудочка (фракция выброса по Simpson 44%), утолщение межжелудочковой перегородки до 13 мм и задней стенки левого желудочка до 12 мм, зоны гипокинезии в области передней стенки левого желудочка. Хронические заболевания отрицает, вредных привычек нет, наследственность не отягощена. Менструальная функция сохранена, использует гормональные контрацептивные препараты. Из анамнеза известно, что 2 недели назад больная перенесла (кишечную инфекцию), сохраняется субфебрильная температура тела. В клиническом анализе крови без существенных отклонений от нормы, качественный анализ на тропонин-Т положительный.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Миокардит с увеличением толщины стенок левого желудочка за счет отека","distractors":["Гипертрофическая кардиомиопатия","Тромбоэмболия легочной артерии"]},{"id":172,"scenario":"Пациент 30 лет, вызов на консультацию в приемное отделение. Жалобы на слабость, одышку, снижение толерантности к физической нагрузке. ЧД 22 в покое, нарастает до 26 при минимальной активности. ЧСС 115 в минуту, АД 92/53 мм рт. ст. В анамнезе тяжелая респираторная инфекция 10 дней назад. На электрокардиографии неспецифические изменения реполяризации.","question":"Что из перечисленного ниже наиболее целесообразно выполнить в данном случае для подтверждения диагноза миокардита?","correct":"Тропонин I или Т","distractors":["Молекулярно-биологическое исследование (полимеразная цепная реакция и полимеразная цепная реакция в реальном времени) на кардиотропные вирусы в сыворотке крови","Профиль кардиоспецифических аутоантител"]},{"id":173,"scenario":"Пациент 32 лет. Страдает АГ с 20 лет, избыточная масса тела. Госпитализирован с интенсивным болевым синдромом за грудиной в течение 1,5 ч. Тропонин I при поступлении - 15 нг/мл, через 6 часов 16 нг/мл, через 12 часов 15 нг/мл. При коронароангиографии: коронарные артерии без патологических изменений, замедление кровотока по правой коронарной артерии (TIMI II). На электрокардиографии синусовая тахикардия, отклонение ЭОС влево, блокада передней ветви левой ножки пучка Гиса, отрицательные зубцы Т в отведениях II , III , V 4- V6, сегмент ST на изолинии. При эхокардиографии: фракция выброса - 42%, гипокинез задней стенки и гипокинез боковой стенки. При МРТ сердца с контрастным усилением выявлено снижение глобальной сократительной способности левого желудочка (фракция выброса - 46%) с зонами гипокинезии в области задней и боковой стенок левого желудочка, субэпикардиально расположенные признаки раннего и позднего контрастного усиления, а также отека миокарда на Т2-взвешенных изображениях в вышеперечисленных областях.","question":"Какое заболевание наиболее вероятно у данного пациента?","correct":"Острый миокардит","distractors":["Кардиомиопатия Такотсубо","Гипертрофическая кардиомиопатия"]},{"id":174,"scenario":"Пациентка 50 л, 2-е сутки в ОРИТ, диагноз \"Инфаркт головного мозга в бассейне ЛСМА\". Сенсорно-моторная афазия и правосторонний глубокий парез в руке. При выполнении КТ ГМ выявлена острая путаминальная гематома слева объемом до 40 мл. На вторые сутки отмечены признаки дыхательной недостаточности:- одышка, тахипноэ до 22 в минуту, SpO2 92 %, незначительное количество влажных незвонких мелкопузырчатых хрипов в легких. ЧСС 88 в минуту, АД 148/85 мм рт. ст. На ЭКГ - элевация сегмента ST в отведениях V1- V6. Консультирована нейрохирургами – в экстренном нейрохирургическом вмешательстве не нуждается, показано консервативное лечение. На ЭхоКГ – умеренное снижение глобальной сократительной способности левого желудочка (ФВ 40%), нарушения локальной сократимости – зоны акинезии в верхушечных сегментах с (баллонированием) верхушки, аномальное переднесистолическое движение створок митрального клапана с умеренной митральной регургитацией и умеренной динамической обструкцией выносящего тракта левого желудочка. В клиническом анализе крови без существенных отклонений от нормальных значений, при биохимическом исследовании крови – умеренное повышение маркеров некроза миокарда (тропонин-Т 4нг/мл). По данным мониторинга центральной гемодинамики, повышенное ДЗЛА до 23 мм рт. ст., сердечный выброс и индекс, измеренные по методу термодилюции, составили 3,9 л/мин и 2.2 л/мин/м2. Выполнена экстренная коронароангиография: данных за стенотические и тромботические окклюзии нет, коронарные сосуды проходимы.","question":"Какой диагноз наиболее вероятен в данном случае ?","correct":"Кардиомиопатия Такотсубо","distractors":["Острый инфаркт миокарда с подъемом сегмента ST","Острый миоперикардит"]},{"id":175,"scenario":"Молодой человек 20 лет, после бессонной ночи по дороге на учебу возникли перебои в работе сердца. Пройдя около 500м, потерял сознание, признаков жизни нет. Сопровождающими начат комплекс базовой сердечно-легочной реанимации, в течение 10 минут до прибытия бригады СМП, которая подключила больного к механическому устройству компрессий грудной клетки, интубировала, начата респираторную помощь. На ЭКГ признаки электромеханической диссоциации, через 7 минут получен гемодинамически эффективный ритм сердца, АД 80/ 30 мм рт. ст., ЧСС 120 в мин. За время СЛР введено 2мг раствора адреналина, инфузия изотонического раствора натрия хлорида, на ЭКГ: э левация сегментаSTв грудных отведенияхV 1- V 4 с отрицательным зубцом Т, с признаками блокады правой ножки пучка Гиса. Больной доставлен в кардиореанимационное отделение.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Синдром Бругада","distractors":["Гиперкалемия","Острый инфаркт миокарда с зубцом Q"]},{"id":176,"scenario":"Молодой человек 20 лет, после бессонной ночи по дороге на учебу возникли перебои в работе сердца. Пройдя около 500м, потерял сознание, признаков жизни нет. Сопровождающими начат комплекс базовой сердечно-легочной реанимации, в течение 10 минут до прибытия бригады СМП, которая подключила больного к механическому устройству компрессий грудной клетки, интубировала, начата респираторную помощь. На ЭКГ признаки электромеханической диссоциации, через 7 минут получен гемодинамически эффективный ритм сердца, АД 80/ 30 мм рт. ст., ЧСС 120 в мин. За время СЛР введено 2мг раствора адреналина, инфузия изотонического раствора натрия хлорида, на ЭКГ: элевация сегмента ST в грудных отведениях V 1- V 4 с отрицательным зубцом Т, с признаками блокады правой ножки пучка Гиса. Больной доставлен в кардиореанимационное отделение. Установлен диагноз: \"Синдром Бругада\".","question":"Какие критерии из перечисленных ниже наиболее соответствуют данному диагнозу?","correct":"Внезапно возникшая элевация ST в грудных отведениях V1-V4 с отрицательным зубцом Т, с признаками блокады правой ножки пучка Гиса","distractors":["Внезапно возникшая депрессия ST в грудных отведениях V1-V6 с отрицательным зубцом Т","Внезапно возникшая депрессия ST в грудных отведениях V4-V6 с двухфазным зубцом Т"]},{"id":177,"scenario":"Молодой человек 20 лет, после бессонной ночи по дороге на учебу возникли перебои в работе сердца, после чего произошла остановка кровообращения, СЛР в течение 7 минут, АД 80/ 30 мм рт. ст., ЧСС 120 в мин. На ЭКГ: элевация сегмента ST в грудных отведениях V1-V4 с отрицательным зубцом Т, с признаками блокады правой ножки пучка Гиса. Больной доставлен в кардиореанимационное отделение. Подтверждени диагноз \"синдром Бругада\"","question":"Какая лечебная тактика наиболее целесообразна в данном случае?","correct":"Имплантация кардиовертера дефибри ебная тактика наиболее оптимальна в данном случае?","correct":"Установка временного кардиостимулятора. Дезагрегантная терапия. Инфузия, симпатомиметики - по показаниям.","distractors":["Установка постоянного кардиостимулятора. Инфузия адреналина. Фуросемид. Дезагрегантная терапия.","Норадреналин. Постановка постоянного кардиостимулятора."]},{"id":180,"scenario":"Мужчина 57 лет, страдает артериальной гипертонией, находится на постоянном приеме бетта-адреноблокаторов и ингибиторов АПФ, на этом фоне имеет компенсированные показатели здоровья. Упал на улице, потерял сознание, прохожими вызвана скорая медицинская помощь. По прибытии бригады скорой помощи жалобы по тяжести состояния не предъявляет. При объективном осмотре отмечены бледные кожные покровы, сознание угнетено до оглушения, артериальное давление 50/30 мм рт. ст. На догоспитальном этапе выполнена ЭКГ.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Пароксизм фибрилляции предсердий, аритмогенный шок","distractors":["ОКС без подъема сегмента ST","ОКС с подъемом сегмента ST"]},{"id":181,"scenario":"Мужчина, 57 лет, страдает артериальной гипертоний, находится на постоянном приеме бета-адреноблокаторов и ингибиторов АПФ на этом фоне имеет компенсированные показатели здоровья. Упал на улице, потерял сознание, прохожими вызвана скорая медицинская помощь. По прибытии кареты скорой помощи жалобы по тяжести состояния не предъявляет. При объективном осмотре отмечены бледные кожные покровы, сознание угнетено до оглушения, артериальное давление 50/30 мм Рт Ст. Бригадой СМП выполнена ЭКГ . Начата инфузия препаратов калия. Установлен диагноз пароксизм фибрилляции предсердий, аритмогенный шок.","question":"Какая лечебная тактика наиболее целесообразна в данном случае?","correct":"проведения незамедлительной электрической кардиоверсии","distractors":["введение бетта-адреноблокаторов внутривенно","введение р-р амиодарона до 1200мг"]},{"id":182,"scenario":"Мужчина 62 лет, страдает артериальной гипертоние ионную для проведения экстренного оперативного родоразрешения в условиях эндотрахеального наркоза","question":"Какой препарат противопоказан данной пациентке?","correct":"Сукцинилхолин","distractors":["Пропофол","Атракурия безилат"]},{"id":193,"scenario":"Пациентка 25 лет, 2-е сутки после оперативного родоразрешения на сроке 32 недели по поводу тяжелой преэклампсии, HELLP-синдрома. Проводится антигипертензивная, магнезиальная терапия, профилактика ВТЭО. Объективно: в сознании, сонлива, ЧСС 100 в мин., АД 130/85 мм рт. ст., SpO2 96%. Омечается отрицательная динамика в виде: нарастание признаков печеночно-почечной недостаточности, снижения темпа диуреза до 10 мл/час,. Лабораторно: гемоглобин 76 г/л, тромбоциты 48*10^9/л, лейкоциты 7 тыс, эритроциты 2,1*10^9/л, шизоциты 18 %. АЛТ 980 ЕД/л, АСТ 850 ЕД/л, креатинин 560 мкмоль/л, мочевина 35 ммоль/л, общий билирубин 102 мкмоль/л, ЛДГ 15000 МЕ/л. Активность ADAMTS-13 20%.","question":"Что показано данной пациентке в качестве патогенетической терапии?","correct":"Экулизумаб","distractors":["Рекомбинантный фактор свертывания","Тромбоконцентрат"]},{"id":194,"scenario":"Пациентка 50 лет доставлена в шоковый зал бригадой СМП, поводом к вызову которой послужило появление и нарастание слабости, одышки, лихорадки до 39С на протяжении 5 дней. Из анамнеза известно, что пациентке 4 месяца назад было выполнено протезирование аортального клапана механическим протезом, после чего пациентка периодически отмечала лихорадку до 38С. При осмотре сознание ясное, кожные покровы бледные. На дистальных фалангах пальцев рук еди ничные болезненные узелки пурпурного цвета. При аускультации дыхание жесткое, хрипов нет. Т тела 39С. SpO2 93%. ЧДД 24/мин, АД 104/58 мм рт. ст., ЧСС 120 уд/мин, ритм синусовый, в проекции аортального клапана выслушивается мелодия протеза, а также диастолический шум. Живот мягкий, безболезненный, не увеличен в объеме. На ЭКГ ритм синусовый, без ишемической динамики. По данным ЭХО-КГ выявлено подвижное образование на створке протеза аортального клапана.","question":"Какая тактика антимикробной терапии у пациентки является наиболее целесообразной в данном случае?","correct":"Назначение комбинированной эмпирической антимикробной терапии, коррекция по результатам исследования крови на стерильность","distractors":["Назначение оксациллина, коррекция по результатам исследования крови на стерильность","Назначение линезолида, коррекция по результатам исследования крови на стерильность"]},{"id":195,"scenario":"Пациенту 56 лет (ASA I) проводится плановая артроскопия плечевого сустава в условиях тотальной внутривенной анестезии (Пропофол, Кетамин, Фентанил).","question":"Какое утверждение в отношении BIS мониторинга наиболее верное в данном случае?","correct":"BIS мониторинг не информативен при использовании кетамина","distractors":["Требуется проведение BIS мониторинга с целевыми значениями 80-100","Требуется проведение BIS мониторинга с целевыми значениями 60-80"]},{"id":196,"scenario":"Пациенту 32 лет проводится энуклеация глаза в условиях Комбинированного эндотрахеального наркоза. ASA 2E. Анестезия поддерживается Фентанилом,Рокуронием и ингаляцией закиси азота. Проводится мониторинг по гарвардскому стандарту + BIS.","question":"Какое утверждение в отношении использования BIS мониторинга у данного пациента наиболее верное?","correct":"BIS мониторинга не эффективен при использовании закиси азота","distractors":["Требуется проведение BIS мониторинга с целевыми значениями 80-100","Требуется проведение BIS мониторинга с целевыми значениями 60-80"]},{"id":197,"scenario":"В больницу доставлен мужчина 48 лет. Со слов сопровождающего, мужчина был найден без сознания во время ремонта автомобиля в закрытом гараже. На момент осмотра: в умеренном оглушении, на вопросы отвечает с задержкой, отмечает резкую слабость, шум в ушах, сонливость, чувство тошноты, не помнит, как потерял сознание. Кожные покровы гиперемированы, без признаков повреждения. Реакция зрачков на свет живая. Дыхание везикулярное, проводится во все отделы. ЧДД 20 в минуту. SpO2 100%. АД 95/60 мм рт. ст., ЧСС 110 уд/минуту, пульс слабого наполнения, тоны сердца приглушены. При заборе крови из периферической вены медсестрой отмечено, что кровь ярко-красного цвета.","question":"Какой антидот является специфическим в данном случае?","correct":"Ацизол","distractors":["Атропин","Унитиол"]},{"id":198,"scenario":"В больницу доставлен мужчина 48 лет. Со слов сопровождающего, мужчина был найден без сознания во время ремонта автомобиля в закрытом гараже. На момент осмотра: в умеренном оглушении, на вопросы отвечает с задержкой, отмечает резкую слабость, шум в ушах, сонливость, чувство тошноты, не помнит, как потерял сознание. Кожные покровы гиперемированы, без признаков повреждения. Реакция зрачков на свет живая. Дыхание везикулярное, проводится во все отделы. ЧДД 20 в минуту. SpO2 100%. АД 95/60 мм рт. ст., ЧСС 110 уд/минуту, пульс слабого наполнения, тоны сердца приглушены. При заборе крови из периферической вены медсестрой отмечено, что кровь ярко-красного цвета. Начата оксигенотерапия, введен ацизол.","question":"Какой эффект оказывает ацизол в данной клинической ситуации?","correct":"ингибирует образование карбоксигемоглобина и нормализует отдачу кислорода тканям","distractors":["Ацизол","Атропин"]},{"id":199,"scenario":"Мужчина 60 лет, доставлен в ОРИТ с направительным диагнозом Желудочно-кишечное кровотечение, артериальная гипотензия. Из анамнеза: в течение недели злоупотреблял алкоголем, сегодня появилась тошнота, трижды была обильная рвота съеденной пищей, а потом – рвота с интенсивной примесью алой крови, головокружение, слабость, боль в верхних отделах живота. Анамнез жизни: частое злоупотребление алкоголем, неоднократное лечение в наркологических стационарах. При осмотре: больной в сознании, вял, адинамичен. Кожные покровы бледные, липкий пот. Запах ацетона и алкоголя изо рта. ЧД 26 в мин, сатурация 96 %, при аускультации – жесткое дыхание. АД 80/40 мм рт. ст., ЧС 124 в мин. Выполнена ЭГДС, выявлен разрыв слизистой пищеводно-желудочного перехода, продолжающееся кровотечение, выполнено клипирование сосуда, в ОРИТ проведена гемостатическая, траснфузионная терапия. Рецидива кровотечения не было. На третьи сутки отмечен подъем температуры до 38,5 С. ЧД 22 в мин, сатурация 96 % , при аускультации – жесткое дыхание. АД 110/50 мм рт. ст., ЧС 100/мин, ЭКГ – синусовая тахикардия. Живот вздут, безболезненный при пальпации, перистальтика вялая, ослаблена. Перитонеальные симптомы сомнительные. Стула за время госпитализации не было. Лабораторно: Альбумин 26 г/л, билирубин общий 75,9 мкмоль/л, АЛТ 148 ЕД/л, АСТ 277 ЕД/л. Лейкоциты 15*10^9/л.","question":"Какое лечение сейчас необходимо больному?","correct":"Очистительные клизмы и деконтаминация кишечника","distractors":["Гепатопротекторная терапия","Санационная бронхоскопия"]},{"id":200,"scenario":"Пациентка 66 лет, анамнез хронических заболеваний неизвестен. Поступила в ОРИТ с пароксизмом фибрилляции предсердий. Проведена медикаментозная кардиоверсия (Амиодарон) с последующим назначением приема Амиодарона перорально, антикоагулянтная терапия Ксарелто 20 мг. Через 10 дней после госпитализации и выписки у пациентки развились жалобы на снижение аппетита, запоры, нерегулярный стул, отеки лица и конечностей, слабость, сонливость, мерзлявость. Объективно выявлено: брадикардия, сухость кожи, отеки по типу пастозности нижних и верхних конечностей, лица.","question":"Какое состояние, с наибольшей вероятностью, развилось в данном случае у пациентки?","correct":"снижение функционирования щитовидной железы","distractors":["триада Протопопова при депрессии","гипоактивный делирий, связанный с нахождением в ОРИТ"]},{"id":201,"scenario":"Пациентка 66 лет, анамнез хронических заболеваний неизвестен. Поступила в ОРИТ с пароксизмом фибрилляции предсердий. Проведена медикаментозная кардиоверсия (Амиодарон) с последующим назначением приема Амиодарона перорально, антикоагулянтная терапия Ксарелто. За время нахождения в ОРИТ в связи с эпизодом болей за грудиной выполнена коронарография, выявлено многососудистое поражение коронарного русла, стенозы до 70%. Назначен розувастатин. Через 10 дней после госпитализации и выписки у пациентки развились жалобы на снижение аппетита, запоры, нерегулярный стул, отеки лица и конечностей, слабость, сонливость, мерзлявость. Объективно выявлено: брадикардия, сухость кожи, отеки по типу пастозности нижних и верхних конечностей, лица. По результатам анализов крови у пациентки выявлено повышение тиреотропного гормона и снижение тироксина и трийодтиронина.","question":"Что из перечисленного ниже является наиболее вероятной причиной возникновения у пациентки данного состояния?","correct":"прием амиодарона","distractors":["нахождение в отделении реанимации с депривацией сна","алиментарный дефицит йода"]},{"id":202,"scenario":"Мужчина 66 лет поступает в ОРИТ. Жалобы на интенсивную боль в верхней половине живота, тошноту и рвоту, слабость. Болен на протяжении 3 суток, связывает начало заболевания с употреблением обильной жирной пищи. При осмотре: в сознании, контактен, ориентирован. Кожные покровы иктеричны. Артериальное давление 80/45 мм рт.ст., синусовая тахикардия 120/мин. Частота дыханий 27/мин, при аускультации – дыхание жесткое. Сатурация 93 %. Живот вздут, напряжен, болезненный при пальпации в правом подреберье, в эпигастрии, боль отдает в спину слева. Симптомы раздражения брюшины отрицательные. Лабораторно: общий билирубин 120 мкмоль/, прямой билирубин 80 мкмоль/л, альфа-амилаза 700 МЕ/л. ЭКГ – синусовая тахикардия, отрицательные Т в грудных отведениях V1-V4. Выполнено УЗИ брюшной полости - Стенка желчного пузыря утолщена до 8 мм, в просвете - множественные конкременты 3-10 мм, холедох расширен, 16 мм. Выраженный пневматоз кишечника, поджелудочная железа не визуализируется.","question":"Какой наиболее вероятный диагноз?","correct":"Блок терминального отдела холедоха, билиарный панкреатит","distractors":["Идиопатический панкреатит","Острый гепатит"]},{"id":203,"scenario":"Мужчина 66 лет поступает в ОРИТ. Жалобы на интенсивную боль в верхней половине живота, тошноту и рвоту, слабость. Болен на протяжении 3 суток, связывает начало заболевания с употреблением обильной жирной пищи. При осмотре: в сознании, контактен, ориентирован. Кожные покровы иктеричны. Артериальное давление 100/55 мм рт.ст., синусовая тахикардия 120/мин. Частота дыханий 27/мин, при аускультации – дыхание жесткое. Сатурация 93 %. Живот вздут, напряжен, болезненный при пальпации в правом подреберье, в эпигастрии, боль отдает в спину слева. Симптомы раздражения брюшины отрицательные. Лабораторно: общий билирубин 120 мкмоль/, прямой билирубин 80 мкмоль/л, альфа-амилаза 700 МЕ/л, креатинин 145 мкмоль/л, АСТ 73 МЕ/л, АЛТ 86 МЕ/л, калий 3,4 ммоль/л, натрий 128 ммоль/л, С-реактивный белок 86 мг/л. ЭКГ – синусовая тахикардия, отрицательные Т в грудных отведениях V1-V4. Компьютерная томография органов брюшной полости - отечный панкреатит, значительное расширение просвета холедоха.","question":"С какого лечебного действия необходимо начать лечение данного пациента?","correct":"Экстренное восстановление пассажа желчи","distractors":["Тромболитическая терапия с последующей внутривенной инфузией гепарина 48 часов","Инфузионная терапия, раннее начало энтерального питания"]},{"id":204,"scenario":"Мужчина 65 лет поступает в ОРИТ. Жалобы на интенсивную боль в верхней половине живота, тошноту и рвоту, слабость в течение суток, связывает начало заболевания с употреблением обильной жирной пищи и приемом алкогольного коктейля. При осмотре: дезориентирован, вял, сонлив. Артериальное давление 80/45 мм рт.ст., синусовая тахикардия 120/мин. Частота дыханий 27/мин, при аускультации – дыхание жесткое, в нижних отделах слева значительно ослаблено. Сатурация 93 %. Живот вздут, напряжен, болезненный при пальпации. Симптомы раздражения брюшины сомнительные. Перистальтика не выслушивается. ЭКГ – синусовая тахикардия, отрицательные Т в грудных отведениях. Лабораторно: гемоглобин 172 г/л, лейкоциты 19*10^9/л, общий билирубин 30 мкмоль/, прямой билирубин 24 мкмоль/л, альфа-амилаза 1100 МЕ/л, креатинин 145 мкмоль/л, АСТ 73 МЕ/л, АЛТ 86 МЕ/л, калий 3,4 ммоль/л, натрий 128 ммоль/л, С-реактивный белок 86 мг/л.","question":"Какое дообследование необходимо провести в первую очередь?","correct":"Ультразвуковое исследование брюшной полости","distractors":["ЭРПХГ","Лапароскопия"]},{"id":205,"scenario":"Мужчина 62 лет поступает в приемное отделение, на консультацию вызван реаниматолог. Жалобы на интенсивную боль в верхней половине живота, тошноту и рвоту, слабость. Болеет вторые сутки, после погрешности в диете и приема алкоголя. При осмотре: в сознании, контактен, дезориентирован, возбужден. Артериальное давление 80/45 мм рт. ст., синусовая тахикардия 130/мин. Частота дыханий 32/мин, в дыхании участвуют вспомогательные мышцы, при аускультации – дыхание жесткое. Сатурация 98 %. Живот вздут, напряженный, болезненный при пальпации. Симптомы раздражения брюшины отрицательные. Перистальтика не выслушивается. Выполнено УЗИ брюшной полости - выявлена картина острого отечного панкреатита. Лабораторно: гемоглобин 172 г/л, лейкоциты 19*10^9/л, общий билирубин 27,8 мкмоль/, альфа-амилаза 1100 МЕ/л, креатинин 118 мкмоль/л, АСТ 67,7 МЕ/л, калий 5,3 ммоль/л, натрий 130 ммоль/л, С-реактивный белок 91,5 мг/л. рН 7,13, рСО2 15 мм рт. ст., рО2 104 мм рт. ст., лактат 15 ммоль/л, ВЕ - 22,6 ммоль/л.","question":"Какая дальнейшая тактика?","correct":"Экстренная госпитализация в ОРИТ, интубация трахеи, начать ИВЛ, инфузионную терапию","distractors":["Выполнить КТ олрганов брюшной полости с контрастированием с последующей госпитализацией в ОРИТ","Экстренное оперативное вмешательство"]},{"id":206,"scenario":"Женщина 58 лет поступает в ОРИТ из приемного покоя. Жалобы на интенсивную боль в верхней половине живота, тошноту и рвоту, слабость. Больна на протяжение суток, связывает начало заболевания с употреблением обильной жирной пищи и алкоголя накануне. При осмотре: в сознании, контактна, ориентирована верно. Артериальное давление 130/55 мм рт.ст., синусовая тахикардия 110/мин. Дышит самостоятельно, частота дыханий 24/мин, при аускультации – дыхание жесткое. Сатурация 97%. Живот вздут, напряженный, болезненный при пальпации в эпигастральной области. Симптомы раздражения брюшины отрицательные. Перистальтика не выслушивается. Биохимический анализ крови – см. рисунок. В приемном покое выполнено ультразвуковое исследование брюшной полости - выявлена картина острого отечного панкреатита, увеличенного желудка, расширенных петель кишечника при отсутствии перистальтики. При поступлении в реанимационное отделение - обильная рвота. Установлен назогастральный зонд, эвакуировано 1000 мл застойного отделяемого.","question":"Какое вмешательство, помимо инфузионной терапии и обезболивания, необходимо больной?","correct":"Декомпрессия желудка, установка назоинтестинального зонда за связку Трейтца, введение в него питательной смеси, прокинетическая терапия","distractors":["Назначение антибактериальной терапии","Экстренное оперативное вмешательство - лапаротомия, назоинтестинальная интубация"]},{"id":207,"scenario":"Женщина 57 лет поступает в ОРИТ из приемного покоя. Жалобы на интенсивную боль в верхней половине живота, тошноту и рвоту, слабость. Больна на протяжение 3 суток, связывает начало заболевания с употреблением обильной жирной пищи. Из анамнеза 8 лет назад протезирование митрального клапана, получает варфарин 2,5 мг ежедневно, МНО контролировали более 4 недель назад. За время текущего заболевания в связи с тошнотой и рвотой лекарство не принимала. При осмотре: в сознании, контактна, ориентирована. Артериальное давление 140/55 мм рт. ст., синусовая тахикардия 110/мин. Частота дыханий 24/мин, при аускультации – дыхание жесткое. Сатурация 97 %. Живот вздут, напряженный, болезненный при пальпации в эпигастральной области. Симптомы раздражения брюшины отрицательные. Перистальтика не выслушивается. В приемном покое выполнено ультразвуковое исследование брюшной полости - выявлена картина острого отечного панкреатита. В ОРИТ начата инфузионная терапия. Обезболивание ненаркотическими, наркотическими анальгетиками - без значимого эффекта на протяжении 2 ч. Решено установить эпидуральный катетер для продленной эпидуральной анальгезии.","question":"Какое исследование необходимо выполнить перед катетеризацией эпидурального пространства?","correct":"Коагулограмма с определением МНО","distractors":["Кожная проба с местным анестетиком","Эхокардиография"]},{"id":208,"scenario":"Девушка 20 лет. Доставлена бригадой СМП из ночного клуба. Жалобы на сильную головную боль, возникшую внезапно, нарушения зрения. Прием анальгетиков боль практически не купировал. Известно, что для бодрости приняла таблетку, купленную с рук в ночном клубе, а примерно через час почувствовала резкую, \"громоподобную\" головную боль, через 30 минут отметила нарушение зрения. При неврологическом осмотре: ШКГ 15 баллов, умеренный мидриаз, реакция зрачков на свет сохранена. Менингеальной симптоматики нет, двухсторонняя гемианопсия с сохранением центрального зрения. АД 150/90 мм рт. ст. ЭКГ - синусовый ритм. ЧСС 100 уд/мин. Температура тела 36,7С. Клинический и биохимический анализы крови – без особенностей. Коагулограмма в норме. МРТ с ангиорежимом, на которой подтвердили САК и выявили очаги ишемии в затылочных долях обоих полушарий; также было отмечено диффузное сегментарное сужение церебральных артерий. С целью поиска источника субкортикальных кровоизлияний, пациентке выполнили церебральную ангиографию, на которой визуализируется диффузное, мультифокальное, сегментарное сужение просветов артерий крупного/среднего калибра по типу (нити бус).","question":"Какой препарат наиболее оптимально назначить в данной ситуации?","correct":"Нимодипин","distractors":["Гепарин","Диазепам"]},{"id":209,"scenario":"Мужчина 72 лет поступил в операционную для экстренной диагностической лапароскопии. Сбит велосипедистом на тротуаре. По данным УЗИ: свободная жидкость в брюшной полости. Состояние средней степени тяжести. Сознание ясное. Не принимал пищу в течении 7 часов. Не имеет известных ему аллергических реакций. Страдает ишемической болезнью сердца, постоянной формой фибрилляции предсердий. Постоянно принимает дабигатран (110 мг 2 раза вдень) и конкор (5 мг). Кожные покровы бледные, АД 105/76 мм рт. ст., ЧСС 82-86 в минуту, сатурация 94%. Уровень гемоглобина 107 г/л. По результатам диагностической лапароскопии выявлено 2000 мл свежей крови в брюшной полости.","question":"В какой дозировке наиболее целесообразно в данном случае ввести идаруцизумаб?","correct":"5 г","distractors":["2,5 г","7,5 г"]},{"id":210,"scenario":"Пациентке 28 лет, ASA II, вес 57 кг, рост 165 см, планируется удаление объемного образования мозжечка. Операция требует положения пациентки сидя. После индукции и интубации трахеи начата ИВЛ в режиме VCV: ДО 400 мл, МОД 6 л, PEEP 5 см Н2О, Pins 20 см Н2О; поддержание анестезии – севофлуран 0.8 МАК, фентанил, пипекуроний; гемодинамика стабильная. После позиционирования пациентки в положение сидя, отметили снижение АД до 80/40 мм рт. ст., остальные физиологические показатели не изменились, аускультативно: дыхание проводится с обеих сторон, хрипов нет.","question":"Что из перечисленного ниже является наиболее вероятной причиной гипотензии?","correct":"Депонирование крови в нижней части тела","distractors":["Смещение эндотрахеальной трубки","Тромбоэмболия легочной артерии"]},{"id":211,"scenario":"Пациенту 47 лет, 70 кг, 176 см, сопутствующая патология: артериальная гипертензия 1 стадии, предстоит экстренная операция: первичная хирургическая обработка непроникающей раны верхних отделов передней брюшной стенки. Предположительная длительность операции 30 мин. Сознание ясное, АД 110/70 мм рт. ст., ЧСС 76 в мин, SpO2 98%. Последний прием пищи 4 часа назад, пил воду 2 часа назад. Предикторы трудной интубации отсутствуют.","question":"Какой метод анестезии является наиболее предпочтительным в этом случае?","correct":"Общая анестезия с интубацией трахеи","distractors":["Спинальная анестезия + седация","Общая анестезия с применением надгортанного воздуховода"]},{"id":212,"scenario":"Пациентка 32 лет доставлена в стационар с диагнозом: Беременность 25 недель. Пневмония? При осмотре ЧД 25 в минуту, SpO2 92% на инсуфляции кислородом. Лабораторно в общем анализе крови Hb 122 г/л, тромбоциты 402 х 10^9/л, лейкоциты 15,8 х 10^9/л, КОС капиллярной крови pH 7,39, pCO2 38 мм рт. ст, pO2 68 мм рт. ст., ВЕ +1 ммоль/л. По данным КТ - двусторонняя полисегментарная нижнедолевая пневмония.","question":"Что из перечисленного ниже является критическим акушерским состоянием?","correct":"Пневмония с явлениями ДН, требующей респираторной поддержки","distractors":["Сатурация менее 95%","Одышка более 20 в минуту"]},{"id":213,"scenario":"Пациентка 29 лет. Беременность 35 недель, доставлена в стационар с жалобами на обильные кровянистые выделения из половых путей предварительный диагноз. Выполнена экстренная операция кесарево сечение, интраоперационно - центральная отслойка площадью 75%, произведен хирургический гемостаз, общая кровопотеря 2500 мл. Проведена реинфузия аутокрови в объеме 850 мл, введен комплекс свертывающих факторов крови. АД 110/76 мм рт. ст., пульс 105 в мин, сатурация 98%. Лабораторно Hb 95 г/л, тромбоциты 105х10^9/л, лейкоциты 15,6х10^9/л, ЛДГ 250 Ед/л, АЛТ 43 ЕД/л, АЛТ 39 Ед/л, креатинин 135 ммоль/л. В общем анализе мочи белок 0,7 г/л.","question":"Что из перечисленного ниже является критическим акушерским состоянием?","correct":"Преждевременная отслойка плаценты с кровопотеря более 1000 мл","distractors":["Врастание плаценты","Креатинин более 100 ммоль/л"]},{"id":214,"scenario":"Пациентка 35 лет доставлена в операционную с диагнозом: Беременность 38 недель. Головное предлежание. Рубец на матке после 2 операций кесарево сечение на плановое родоразрешение. Отказ от регионарных методов анестезиологического пособия. При интубации трахеи произошла аспирация желудочным содержимым. Эндоскопической бригадой выполнена санация тка 60 лет. 2-е сутки в ОРИТ после экстреннного оперативного вмешательства по поводу нагноения послеоперационной раны (ранее выполнена пластика пупочной грыжи сеткой). Из сопутствующих заболеваний: артериальная гипертензия, ожирение 2 степени. В сознании, заторможена. Сохраняются эпизоды гипертермии до 38,5 °С. Прогрессирование дыхательной недостаточности: SpO2 84% на атмосферном воздухе, ЧД 26 в мин, p/F 280; на фоне инсуффляции увлажненного кислорода через назальные канюли с потоком 10 л/минуту SpO2 91%. АД 95/45 мм рт. ст., ЧСС 112 в мин. Живот вздут, перистальтика единичная. Темп мочеотделения 40 мл/час. На КТ органов грудной клетки двусторонние ателектатические изменения, нельзя исключить инфильтративные изменения. Лабораторно: лейкоциты 16→22*10^9/л с палочкоядерным сдвигом до 22%, СРБ 84→175 мг/л, прокальцитонин 4.9 нг/мл, pH 7.35, раО2 54 мм рт. ст., рСО2 22 мм рт. ст., ВЕ -7 ммоль/л, лактат 3.2 ммоль/л.","question":"Какая оптимальная тактика респираторной поддержки?","correct":"ИВЛ в протективном режиме","distractors":["Увеличить поток инсуффляции кислорода","Неинвазивная вентиляция легких с подбором параметров"]},{"id":218,"scenario":"Пациентка 60 лет. 2-е сутки в ОРИТ после экстреннного оперативного вмешательства по поводу нагноения послеоперационной раны (ранее выполнена пластика пупочной грыжи сеткой). Из сопутствующих заболеваний: артериальная гипертензия, ожирение 2 степени. В сознании, ориентирована, сохраняются эпизоды гипертермии до 38 °С. Прогрессирование дыхательной недостаточности: SpO2 84% на атмосферном воздухе, ЧД 25 в мин, p/F 310; на фоне инсуффляции увлажненного кислорода через назальные канюли с потоком 10 л/минуту SpO2 91%. АД 145/85 мм рт. ст., ЧСС 102 в мин. Живот умеренно вздут. Темп мочеотделения 80 мл/час. На КТ органов грудной клетки зоны ателектазов в базальных сегментах. Лабораторно: лейкоциты 16*10^9/л с палочкоядерным сдвигом до 22%, СРБ 102 мг/л, прокальцитонин 2,1 нг/мл, лактат 1,8 ммоль/л.","question":"Какая оптимальная тактика респираторной поддержки?","correct":"Высокопоточная оксигенация с подбором параметров","distractors":["Увеличить поток инсуффляции кислорода","Неинвазивная вентиляция легких с подбором параметров"]},{"id":219,"scenario":"Пациентка 35 лет, 3-и стуки в ОРИТ с диагнозом ЗЧМТ, ушиб головного мозга, контузионные очаги. Объективно: медикаментозная седация RAAS -3. Вне седации кома, 7 балов по шкале FOUR. Гипертермия 38,2 °С. ИВЛ в протективном режиме, вне седации гиперпноэ, SpO2 96%. Отмечается отрицательная динамика в виде снижения АД до 90/52 мм рт. ст., ЧСС 128 в минуту несмотря на адекватную инфузионную терапию. Время наполнения капилляров 2,5 сек. Клиническая картина расценена как развитие септического шока, незамедлительно назначена эмпирическая антибактериальная терапия в режиме меропенем 6г/сутки. Лабораторно: лейкоциты 11*10^9/л с палочкоядерным сдвигом до 15%, СРБ 22 мг/л, прокальцитонин 0,45 нг/мл, лактат 1,5 ммоль/л. По данным дообследования: контузионные очаги прежнего размера, диффузный отек головного мозга, данных за пневмонию не получено. УЗИ органов брюшной полости и почек - без особенностей. По данным Эхо-КГ гипоакинез, дилятация верхушки левого желудочка.","question":"Какая оптимальная тактика?","correct":"Отмена антибиотикотерапии, дальнейшую тактику определить совместно с кардиологом","distractors":["Незамедлительно подать в рентгенангиоперационную","Дальнейшую тактику определить совместно с кардиологом"]},{"id":220,"scenario":"Пациентка 35 лет, поступила в ОРИТ с диагнозом: Внебольничная полисегментарная пневмония. При поступлении SOFA 4 балла, гипертермия 38,7 °С. ЧД 24 в минуту, SpO2 92%. АД 88/52 мм рт. ст., ЧСС 118 в минуту . Время наполнения капилляров 2,5 сек. Лабораторно: лейкоциты 19*10^9/л со сдвигом до миелоцитов 3%, СРБ 142 мг/л, прокальцитонин 9,5 нг/мл, лактат 4,3 ммоль/л, креатинин 140 мкмоль/л. Начата интенсивная терапия, антибактериальная терапия Моксифлоксацин 400 мг/сутки в/в. На фоне терапии на 6-е сутки SOFA 0 баллов, температура максимально 37,4 °С, ЧД 17 в минуту, SpO2 96%. АД 120/70 мм рт. ст., ЧСС 78 в минуту. Диурез 2500 мл/сутки. Лабораторно: лейкоциты 9*10^9/л, палочкоядерные лейкоциты 11 %, СРБ 36 мг/л, прокальцитонин 0,5 нг/мл, лактат 1,3 ммоль/л, креатинин 85 мкмоль/л. По данным рентгенографии сохраняются двусторонние инфильтративные изменения.","question":"Определите оптимальную тактику дальнейшей терапии","correct":"Завершить курс АБТ","distractors":["Продолжить АБТ до 10-14 суток","Продолжить АБТ до полного стихания системной воспалительной реакции"]},{"id":221,"scenario":"Больной 27 лет, доставлен в ОРИТ с диагнозом: Пневмония. В анамнезе полинаркомания, 2 дня назад самостоятельно покинул другой стационар, куда был доставлен с передозировкой НС. Объективно: дезориентирован, диффузные мышечные боли, гипертермия 39,2 °С. ЧД 25, SpO2 96%. АД 89/53 мм рт. ст., ЧСС 118 в минуту. Время наполнения капилляров 2,5 сек. Подкожные вены склерозированы, покрыты рубцами. В правой подключичной области установленный ранее катетер, на канюле следы засохшей крови, в области установки отделяемого нет, тонкий венчик гиперемии.","question":"Какая тактика наиболее обоснована?","correct":"Обеспечить венозный доступ, начать инфузионную терапию, удалить установленный ранее катетер, направить на бактериологическое исследование","distractors":["Обеспечить венозный доступ, начать инфузионную терапию, удалить установленный ранее катетер","Незамедлительно удалить установленный ранее катетер"]},{"id":222,"scenario":"Больной 67 лет, 18-е сутки в ОРИТ. Диагноз: Рак головки поджелудочной железы T3N1M0. Гастропанкреатодуоденальная резекция. Несостоятельность гепатикоеюноанастамоза. Сепсис. Состояние тяжелое, в сознании. Дыхание самостоятельное. SpO2 94%, индекс P/F 340. Гемодинамика стабильна. Диурез сохранен. Живот умеренно вздут, перистальтика вялая. Проводилась неоднократная смена режима антимикробной терапии. Лабораторно Hb 108 г/л, Лейкоциты 15*10^9/л, СРБ 156 мг/л, прокальцитонин 0,4 нг/мл, креатинин 102 мкмоль/л, лактат 2,0 ммоль/л. Из брюшной полости выявлена полирезистентные Kl.pneumoniae, Ac.baumanii, Candida glabrata. Произведена коррекция режима антимикробной терапии: меропенем, полимиксин, тигециклин, вориконазол. Возобновлено парентреальное питание. На следующие сутки у пациента появились жалобы на преходящие эпизоды ухудшения зрения, размытости изображения. Осмотрен офтальмологом, патологии не выявлено.","question":"Назначение какого препарата вызвало обратимое ухудшение зрения у данного пациента?","correct":"Вориконазол","distractors":["Тигециклин","Полимиксин"]},{"id":223,"scenario":"Мужчина 65 лет поступил в стационар для планового некардиохирургического вмешательства. Сопутствующий диагноз: ИБС. СН 3 ФК, ХСН 2а ФК 2. Гипертоническая болезнь 2 стадии, 2 степени, риск ССО 4. Во время выполнения вмешательства на мониторе появляется выраженная тахиаритмия.","question":"Какой из перечисленных препаратов мог способствовать развитию адреналин - индуцированной аритмии у данного пациента?","correct":"Кетамин.","distractors":["Тиопентал натрия.","Севофлуран."]},{"id":224,"scenario":"Пациент 32 лет, мотоциклист, доставлен в операционную из шокового зала с диагнозом: \"Политравма, ЧМТ, тупая травма живота, перелом правого бедра в средней трети, травматическая ампутация пальцев левой верхней конечности\", для выполнения экстренной лапаротомии после обнаружения большого количества свободной жидкости в брюшной полости. Объективно: АД 74/56 мм рт. ст., ЧСС 120 в минуту, PS 120 уд/мин, SpO2 91%, ИП 0,01, температура тела 35,2С. Проводится инсуффляция О2 5 л/мин, инфузионная терапия (суммарно 2500 мл). Данные КЩС: рН 7,21, рСО2 26,4 мм рт. ст., АВ 12 ммоль/л, BE -13,5 ммоль/л, Na 135 ммоль/л, K 5,5 ммоль/л, НСО3 12,0 ммоль/л, лактат 3,2, глюкоза 2,9 ммоль/л.","question":"Какие компоненты, входящие в понятие летальной триады, присутствуют у данного пациента с наибольшей вероятностью?","correct":"Ацидоз, гипотермия, коагулопатия","distractors":["ЧМТ, кровотечение, ацидоз","Гипотензия, кровотечение, гипотермия"]},{"id":225,"scenario":"Мужчина 72 лет поступил в операционную для эндопротезирования тазобедренного сустава по причине перелома шейки бедра 16 часов назад. Состояние средней степени тяжести. Сознание ясное. Не принимал пищу в течении 7 часов. Не имеет известных ему аллергических реакций. Страдает ИБС, постоянной формой фибрилляции предсердий. Постоянно принимает ривараксобан и конкор (не принимал терапию последние двое суток). АД 145/76 мм рт. ст., ЧСС 82-86 в минуту, сатурация 99%.","question":"Какой метод анестезии наиболее безопасен в данном случае?","correct":"Комбинированный эндотрахеальный наркоз","distractors":["Субарахноидальная анестезия СМА+ эпидуральная анальгезия","Эпидуральная анестезия + PENG блок"]},{"id":226,"scenario":"Мужчина 24 лет доставлен в операционную из шокового зала с тяжелой сочетанной травмой. Из анамнеза известно, что пациент сбит автомобилем на пешеходном переходе. Состояние крайне тяжелое, ШКГ 13 баллов, ЧДД 25/мин с инсуффляцией кислорода 8 л/мин, ЧСС 136 уд/мин, АД 68/28 мм рт. ст., SpO2 не определяется. Кожные покровы бледные, правая нижняя голень травматически ампутирована на уровне средней трети - наложен жгут на правое бедро. По данным УЗИ ОБП: большое количество свободной жидкости в брюшной полости. По данным рентгенографии ОГК: перелом 7, 8, 9 ребра справа, легкие без признаков пневмоторакса. В левом предплечье установлен венозный катетер, с момента поступления в стационар введено 3500 мл кристаллоидов, морфин 10 мг, транексамовая кислота 1000 мг. Общий анализ крови: гемоглобин 51 г/л, гематокрит 15%, тромбоциты 20х10^9/л. Определена группа крови А+. Принято решение выполнить хирургическое вмешательство на брюшной полости и первичную хирургическую обработку культи правой голени по экстренным показаниям.","question":"Какая коррекция тактики ведения пациента до подачи в операционную наиболее уместна в данном случае?","correct":"Ограничить инфузию кристаллоидных растворов","distractors":["Выполнить компьютерную томографию","Не вводить транексамовую кислоту без признаков фибринолиза"]},{"id":227,"scenario":"Пациент 46 лет, хроническая алкогольная итоксикация, тяжелая ЧМТ поступил в ОРИТ, где начата ИВЛ, медикаментозная седация, интенсивная терапия. Выявлена субдуральная гематома, пациент подан в операционную. Показатели электролитов крови: K +2,2 ммоль/л, Na + 128 ммоль/л и Cl - 105 ммоль/л. Газовый состав артериальной крови: pH 7,47, PaO2 95 мм рт. ст., PaCO2 25 мм рт. ст., ВЕ -2,2 ммоль/л. На ЭКГ, снятой перед подачей в операционную: уплощение зубца Т, депрессия сегмента ST, единичые суправентрикулярные экстрасистолы.","question":"Что является наиболее вероятной причиной изменений ЭКГ?","correct":"Гипокалиемия","distractors":["Внутричерепная гипертензия","Гипонатриемия"]},{"id":228,"scenario":"Пациент 44 лет. Острый аппендицит. Предоперационный осмотр анестезиологом: АД 110/60 мм рт. ст., ЧСС 88 в мин., ЧД 18в мин., SpO2 98%. Из анамнеза известно, что пациент длительное время страдает от дистрофической миотонии, кардиомиопатиии. Вы планируете проведение комбинированной общей анестезии.","question":"Какой вид интраоперационного гемодинамического мониторинга наиболее целесообразен в данной ситуации?","correct":"Инвазивное измерение артериального давления","distractors":["Чреспищеводная эхокардиография","Измерение центрального венозного давления"]},{"id":229,"scenario":"Женщине 41 года произведено удаление невриномы слухового нерва под тотальной внутривенной анестезией пропофолом. Операция длилась 12 часов, кровопотеря составила 500 мл. После операции она переведена в ОРИТ, экстубирована, дыхание адекватное, неврологического дефицита нет. Витальные функции в норме. По данным анализа КОС: pH 7,30, PaCO2 42 мм рт. ст., PaO2 150 мм рт. ст. на ингаляции кислорода, BE – 4 ммоль/л, Na+ 143 ммоль/л, K+ 3 ммоль/л, Cl 115 ммоль/л, HCO3 20 ммоль/л.","question":"Что из перечисленного является наиболее вероятной причиной изменений кислотно-основного состояния у данной пациентки?","correct":"Интраоперационная инфузия 0,9% раствора NaCl","distractors":["Недостаточное восполнение гиповолемии","Побочный эффект пропофола"]},{"id":230,"scenario":"Пациенту 59 лет проводится операция – верхняя лобэктомия слева по поводу образования легкого. Из анамнеза известно, что пациент страдает хронической обструктивной болезнью легких, постоянно получает бронхолитическую терапию, курит более 40 пачка-лет. Операция проходит в условиях однолегочной вентиляции, состояние пациента во время операции стабильное. По окончании операции, пациент экстубирован в операционной. После экстубации пациент дышит самостоятельно, адекватно, SpO2 при дыхании атмосферным воздухом 95%. Сразу после пробуждения на кардиомониторе отмечается фибрилляция предсердий с частотой 140-170 ударов/минуту, АД снижается до 70/30 мм.рт.ст. Пациент заторможен, перестал отвечать на вопросы.","question":"Какая оптимальная тактика лечения пациента?","correct":"Проведение синхронизированной кардиоверсии","distractors":["Внутривенное введение лидокаина 1мг/кг","Инсуффляция кислорода через лицевую маску с потоком 6л/мин"]},{"id":231,"scenario":"Женщина, 53 года, на протяжении последних 2х лет страдает биполярным расстройством, постоянно принимает препараты лития. Ей проводится операция – тотальное эндопротезирование тазобедренного сустава под спино-эпидуральной анестезией. Во время операции пациентка в сознании. Интраоперационно она начинает жаловаться на дискомфорт за грудиной. По кардиомонитору ЭКГ отмечаются нерегулярные расширенные комплексы – полиморфная желудочковая тахикардия ( Torsade de pointes ). АД 110/70 мм.рт.ст.","question":"Введение какого препарата оптимально в этой ситуации?","correct":"Магния сульфат","distractors":["Аденозин","Лидокаин"]},{"id":232,"scenario":"Планируется проведение лапароскопической аднексэктомии женщине 32 лет. Пациентка наблюдается у кардиолога по поводу синдрома удлиненного QT , принимает ежедневно 5 мг бисопролола. Из анамнеза известно, что у женщины в прошлом была остановка кровообращения, за последний год отмечает два эпизода синкопальных состояний.","question":"Какова оптимальная тактика ведения пациентки перед операцией?","correct":"Имплантация кардиовертера-дефибриллятора","distractors":["Увеличение дозировки бисопролола","Применение наружной кардиостимуляции"]},{"id":233,"scenario":"Мужчине 55 лет с недавно возникшей резистентной к терапии артериальной гипертензией п роводится плановое вмешательство по поводу стеноза левой почечной артерии. Комбинированный эндотрахеальный наркоз. АД 135/ 90 мм рт. ст.,ЧСС 72 в мин, диурез по катетеру Фолея, моча светлая, прозрачная. Хирург сообщает, что собирается наложить зажим на аорту в супраренальном отделе.","question":"Какие эффекты следует ожидать?","correct":"Брадикардия, гипертензия, уменьшение скорости диуреза","distractors":["Брадикардия, гипотензия, увеличение скорости диуреза","Тахикардия, гипертензия, увеличение скорости диуреза"]},{"id":234,"scenario":"Пациент 37 лет доставлен в операционную для выполнения остеосинтеза локтевой кости пластиной верхней конечности. После проведенной блокады плечевого сплетения надключичным доступом появились жалобы на затруднение дыхания. Объективно: АД 147/78 мм рт. ст. Сатурация 91%. ЧДД 25 в минуту. По УЗИ грудной клетки определяется \"штрихкод\" (Barcode) в М-режиме над поверхностью левого легкого и \"морской берег\" справа.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Пневмоторакс слева","distractors":["Гемоторакс слева","Пневмоторакс справа"]},{"id":235,"scenario":"Мужчина 65 лет поступил в стационар для планового некардиохирургического вмешательства. Сопутствующий диагноз: ИБС. СН 3 ФК, ХСН 2а ФК 2. Гипертоническая болезнь 2 стадии, 2 степени, риск ССО 4.","question":"Какое исследование необходимо провести для оценки риска неблагоприятных кардиальных событий в периоперационном периоде?","correct":"Определение натрийдиуретического пептида типа В","distractors":["Определение тропонина I","Определение коэффициента Де Ритиса"]},{"id":236,"scenario":"Пациентка 27 лет, беременность 36 недель. Доставлена с жалобами на головную боль, повышение артериального давления. При осмотре сознание ясноя, АД 160/95 мм рт. ст, ЧСС 76 в мин, ЧД 19 в минуту, SpO2 98%. В общем анализе мочи общий белок 3,5 г/л. Установлен диагноз \"Тяжелая преэклампсия\", пациентка госпитализирована в отделение анестезиологии и реанимации, назначена регламентированная клиническим протоколом терапия (магния сульфат 25% - 48,0 мл со скоростью 4 мл/час, нифедипин 10 мг 2 раза в сутки, метилдопа 500 мг 4 раза в сутки).","question":"Какова цель назначения пациентке сульфата магния?","correct":"Профилактика судорог","distractors":["Гипотензивная терапия","Токолиз"]},{"id":237,"scenario":"Пациентка 26 лет поступила в акушерский стационар с диагнозом 38 недель и регулярной родовой деятельностью. Для проведения эпидуральной аналгезии вызван анестезиолог. Сопутствующих заболеваний нет, в общем анализе крови гемоглобин 123 г\\л, эритроциты 3,48 10х12\\л, гематокрит 37%, тромбоциты 89 х10х9\\л. С первой попытка выполнена установка эпидурального катетера. Течение родов без осложнений. На 2 сутки после родов пациентка предъявила жалобы на непроизвольное неконтролируемое мочеиспускание, парестезии и слабость в обеих нижних конечностях.","question":"Какой диагноз наиболее вероятен у данной пациентки?","correct":"Эпидуральная гематома","distractors":["Грыжа межпозвоночных дисков L1-L2","Травма корешков нервов"]},{"id":238,"scenario":"У пациентки 42 лет произошли 4 роды через естественные родовые пути, в 3 периоде родов в связи с задержкой частей последа развилось кровотечение, вызван анестезиолог, проведено ручное отделение плаценты и выделение последа, объем кровопотери составил 1000 мл. Начата инфузионная терапия, утеротоники. Консервативная терапия без эффекта, кровотечение продолжается, принято решение о хирургическом гемостазе. На момент оперативного вмешательства объем кровопотери составил 1500 мл, выполнен хирургический гемостаз.","question":"Какой объем свежезамороженной плазмы необходим в данной ситуации?","correct":"15-20 мл\\кг","distractors":["6-10 мл\\кг","10-15 мл\\кг"]},{"id":239,"scenario":"Пациентка 38 лет с диагнозом: 1 своевременные роды в головном предлежании на 1 сутки после родов предъявляет жалобы на головную боль, невозможность встать с кровати, парестезии в нижних конечностях. Сопутствующих заболеваний нет. Лабораторные данные в пределах референсных значений. АД 90/62 мм рт. ст., пульс 72 в мин, сатурация 98%, температура 36,8 °С. Из анамнеза: метод обезболивания родов эпидуральная аналгезия. Ввиду технических сложностей пункция выполнена с 3 попытки.","question":"Какой диагноз наиболее вероятен у данной пациентки?","correct":"Постпункционная головная боль","distractors":["Транзиторная ишемическая атака","Менингит"]},{"id":240,"scenario":"Пациентка 32 года, беременность 29 недель. Доставлена с жалобами на головную боль, повышение артериального давления, выраженную боль в эпигастральной области, носовое кровотечение. Из анамнеза известно о приеме препарата кардиомагнил в дозе 75 мг в сутки в течении 45 дней по назначению врача женской консультации. При поступлении в стационар АД 170/100 мм рт. ст., ЧСС 85 в мин., SpO2 98%. Лабораторно отмечается снижение тромбоцитов до 76*10^9/л.","question":"Какой диагноз наиболее вероятен у данной пациентки?","correct":"Тяжелая преэклампсия","distractors":["Транзиторная ишемическая атака","Прободная язва желудка"]},{"id":241,"scenario":"Вы проводите общую анестезию пациенту 65 лет во время операции каротидной эндартеректомии. Проводится неинвазивный мониторинг гемодинамики, капнометрия, термометрия. по Цельсию. Кроме стандартного мониторинга Вы используете мониторинг неивназивной оксиметрии головного мозга. Этот вид мониторинга определяет насыщение гемоглобина кислородом.","question":"В каком из перечисленных видов крови церебральный оксиметр определяет насыщение гемоглобина кислородом?","correct":"В артериальной, венозной и капиллярной крови","distractors":["В артериальной крови","В венозной крови"]},{"id":242,"scenario":"Вы проводите общую анестезию пациенту 70 лет во время операции каротидной эндартеректомии. Проводится неинвазивный мониторинг гемодинамики, капнометрия, термометрия. по Цельсию. Кроме стандартного мониторинга Вы используете мониторинг неивназивной оксиметрии головного мозга. Этот вид мониторинга определяет насыщение гемоглобина кислородом (rSo2). Во время данной анестезии этот монитор показывает нормальное значение.","question":"Какой показатель rSo2 соответствует нормальному значению?","correct":"70%","distractors":["100 %","95%"]},{"id":243,"scenario":"Пациентка 53 лет. Экстренная лапаротомия по поводу внутрибрюшного кровотечения. Пациентка страдает ожирением с ИМТ 42. После индукции центральный венозный катетер вводят через правую подключичную вену после двух неудачных попыток катетеризации внутренней яремной вены. Примерно через 30 минут от начала процедуры наблюдается повышение Ppeak с 21 до 40 см H 2 O и ЧСС до 128 уд. в мин, а насыщение кислородом снижается с 99% до 88%. При аускультации: ослабление дыхательных шумов справа. При осмотре обращает на себя внимание выбухание вен шеи.","question":"Какая тактика в лечении этой пациентки наиболее предпочтительна?","correct":"Пункция и дренирование плевральной полости","distractors":["Увеличение минутной вентиляции","Анализ газов артериальной крови"]},{"id":244,"scenario":"Пациент 30 лет. Рост 175 см, вес 85 кг. Подан в операционную для проведения плановой лапароскопической холецистэктомии. В анамнезе аллергическая реакция на антибиотики пенициллинового ряда, характер реакции уточнить не может. После постановки периферического венозного катетера с целью антибиотикопрофилактики введено внутривенно Цефазолин – 2 гр. Через 5 мин пациент жалуется на головокружение, затруднение дыхания. АД снижается со 110/70 мм рт. ст. до 70/40 мм рт. ст., ЧСС 130 уд. в мин, SpO 2 снижается до 90%. Подозревается анафилактический шок. Налажена подача 100% О 2 через лицевую маску. Введено внутримышечно 0,5 мг эпинефрина.","question":"Какая тактика инфузионной терапии наиболее предпочтительна в данном случае?","correct":"Внутривенное введение 1500 мл стерофундина","distractors":["Внутривенное введение 4000 мл 0,9% раствора натрия хлорида","Внутривенное введение 1000 мл гелофузина"]},{"id":245,"scenario":"Мужчина 24 лет доставлен в операционную из шокового зала с тяжелой сочетанной травмой. Из анамнеза известно, что пациент сбит автомобилем на пешеходном переходе. При осмотре состояние крайне тяжелое, ШКГ 13, ЧСС 136 в минуту, АД 68/28 мм рт. ст., сатурация не определяется, кожные покровы бледные, правая нижняя голень травматически ампутирована - наложен жгут на правое бедро. По данным УЗИ – большое количество свободной жидкости в брюшной полости.","question":"Какой препарат для индукции в общую анестезию наиболее предпочтителен в данном случае?","correct":"Кетамин","distractors":["Выполнить компьютерную томографию","Не вводить транексамовую кислоту без признаков фибринолиза"]},{"id":246,"scenario":"Пациент 83 лет в условиях спинальной анестезии оперируется по поводу перелома шейки бедра. Хронические заболевания: Гипертоническая болезнь 3 ст риск 3, ИБС, пароксизмальная форма фибрилляции предсердий. Риск ASA 3E. Течение анестезии без особенностей, гемодинамика стабильная. На этапе ввода бедренного компонента протеза, внезапно пациент начинает жаловаться на чувство нехватки воздуха, артериальное давление опускается до 72/54 мм рт. ст..","question":"Какое осложнение наиболее вероятно в данном случае?","correct":"Синдром имплантации костного цемента","distractors":["Синдром Берцольда-Яриша","Синдром сдавления нижней полой вены"]},{"id":247,"scenario":"Женщина, 65 лет. В анамнезе: постоянная форма фибрилляции предсердий, нормосистолия. Постоянно принимает апиксабан. За трое суток до оперативного вмешательства апиксабан был отменен, получала НМГ. Выполнена герниопластика в условиях комби в - пациентка беспокойна, жалуется на онемение губ, головокружение. Наблюдаются судороги.","question":"Какая тактика введения жировой эмульсии наиболее верная в данном случае?","correct":"Введение начального болюса 20% жировой эмульсии - 100 мл за 1 минуту","distractors":["Начать введение 20% жировой эмульсии со скоростью 200 мл/час","Введение начального болюса 20% жировой эмульсии - 10 мл за 1 минуту"]},{"id":251,"scenario":"Пациентке 37 лет планируется проведение плановой операции по поводу множественных миоматозных узлов матки. Планируется лапаротомия, миомэктомия. Известно, что пациентка с детства страдает эпилепсией, постоянно принимает вальпроевую кислоту. По ЭКГ - синусовый ритм, ЧСС 64 уд/мин.","question":"Какое исследование является оптимальным в данной ситуации?","correct":"Коагулограмма","distractors":["ЭХОКГ","Общий анализ мочи"]},{"id":252,"scenario":"Пациенту 50-ти лет проведена экстренная операция - пластика ущемленной паховой грыжи. Из анамнеза известно, что пациент длительное время принимает пирлиндол (ингибитор моноаминоксидазы). В предоперационном периоде выполнена гастроскопия, обнаружены множественные эрозии желудка. После операции пациент жалуется на выраженную боль в паховой области.","question":"Какой препарат выбора для обезболивания?","correct":"Морфин","distractors":["Кетопрофен","Трамадол"]},{"id":253,"scenario":"Пациенту 50-ти лет проведена экстренная операция - пластика ущемленной паховой грыжи. Из анамнеза известно, что пациент длительное время злоупотребляет алкоголем, последний прием накануне госпитализации. Послеоперационное обезболивание адекватное. Ночью после операции отмечено развитие беспокойства, тремор, пациент не может заснуть, тревожен.","question":"Какой препарат из перечисленных является препаратом выбора в данной ситуации?","correct":"Диазепам","distractors":["Пропофол","Галоперидол"]},{"id":254,"scenario":"Пациенту 46-ти лет по экстренным показаниям выполнена аппендэктомия в условиях общей анестезии. Из анамнеза известн
