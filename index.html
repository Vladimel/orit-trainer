ерез 40 минут отмечено появление одышки, снижение АД до 80/46 мм рт. ст., на ЭКГ неэффективная желудочковая стимуляция. При фокусном ЭХО-КГ: сепарация листков перикарда до 1,7 см, коллабирование стенки правого предсердия.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Перфорация ПЖ электродом ЭКС","distractors":["Спонтанный разрыв миокарда ЛЖ","Острый перикардит"]},{"id":272,"scenario":"Пациент 62 лет, поступил в ОРИТ после экстренного вмешательства по поводу перфоративной язвы желудка, перитонита. В анамнезе хронический алкоголизм.  ИМТ  2 . На следующий день после оперативного вмешательства начато проведение парентерального питания в объеме обеспечивающем количество энергии 25 ккал/кг и белка 1,5 г/кг. Через трое суток отмечено ухудшение состояния — спутанность сознания, слабость конечностей, тенденция к артериальной гипотензии, одышка, нарушения ритма сердца. В качестве одной из причин ухудшения рассматривается развитие рефидинг-синдрома (синдром возобновления питания).","question":"Снижение уровня каких электролитов определит патогенез рефидинг-синдрома у данного пациента?","correct":"Фосфат, калий, магний","distractors":["Натрий, хлор, сульфат","Хлор, кальций, калий"]},{"id":273,"scenario":"Пациент, 65 лет, готовится к проведению оперативного вмешательства по поводу стенозирующей опухоли пилорического отдела желудка. В течение нескольких недель потребление пищи значительно снижено, часто возникает рвота. У пациента отмечаются признаки недостаточности питания. Масса тела 68 кг, рост 183 см. За последние 6 мес масса тела снизилась на 12 кг. В анамнезе длительное злоупотребление алкоголем. Пациенту планируется начать проведение парентерального питания.","question":"Дополнительное введение какого витамина необходимо для предотвращения развития энцефалопатии Гайе-Вернике при начале проведения нутритивной поддержки у данного пациента?","correct":"Витамин В1","distractors":["Никотиновая кислота","Витамин В6"]},{"id":274,"scenario":"Мужчина 52 лет. Находится в отделении реанимации в течение 2 суток с диагнозом: ЗЧМТ: Острая субдуральная гематома правой теменной области объемом 50 см3. Состояние после удаления гематомы. В настоящий момент: уровень сознания кома II. Зрачки D\\=S. Реакция на свет сохранена. Гемодинамика стабильная. Тоны сердца ритмичные АД 135/88 мм.рт.ст. ЧСС 132 в минуту. По ЭКГ: синусовая тахикардия. Дыхание ИВЛ, в режиме BIPAP, проводится равномерно, хрипов нет. Мокрота слизистая. ЧДД 18 в минуту SpO2 99 % FiO2 40 %. Живот мягкий, перистальтика выслушивается. Диурез достаточный. В течение суток гипертермия до 39,2-40,4 *С. На КТ-головного мозга: гематома удалена полностью, остаточного объема не наблюдается, смещение срединных структур до 4 мм. В общем анализе крови: лейкоцитоз 9,3*109 г/л; нейтрофилы палочкоядерные 7 %. СРБ 14 мкг/л, РСТ 0,2 нг/мл. P/F 325. pH 7.11, pCO2-118 мл/с, SvO2-43 %, Na-138 ммоль/л, лактал-1.3 ммоль/л, Ликвор: цитоз-14/3. Глюкоза крови-5.3 ммоль/л. Мочевина-9,1 ммоль/л, креатинин-94 ммоль/л.","question":"По какой причине у пациента появилась клиническая картина отека головного мозга?","correct":"Нарастающая клиника отека головного мозга на фоне гиперкапнии","distractors":["Если имеются бесспорные доказательства факта смерти, зафиксированного консилиумом","луковица внутренней яремной вены"]},{"id":275,"scenario":"Мужчина 62 лет доставлен в многопрофильный стационар. При беседе с сопровождавшей его женой выяснилось, что пациент, выходя из подъезда, поскользнулся и упал, ударившись затылком. Кратковременно терял сознание. При поступлении уровень сознания - 13 баллов по ШКГ. Отмечается анизокория OS > OD и правосторонний гемипарез до 3 баллов. По данным единой электронной истории болезни ЕМИАС, у пациента пароксизмальная форма фибрилляции предсердий, сахарный диабет,  гипертоническая болезнь. Перенес ОНМК два года назад с хорошим восстановлением. Со слов жены, регулярно принимает бисопролол 5 мг утром, дабигатран 150 мг утром и вечером, метформин 1000 мг  утром и вечером, лозартан 100 мг вечером.  На ЭКГ - фибрилляция предсердий с ЧСС 80 - 120 в мин. На КТ головного мозга: субдуральная гематома в левой теменно-затылочной области объемом около 60 мл.","question":"Какая терапия показана перед экстренным хирургическим вмешательством?","correct":"Идаруцизумаб в дозе 5 мг","distractors":["Транексамовая кислота 15-25 мг/кг","Концентрат протромбинового комплекса 15 МЕ/кг"]},{"id":276,"scenario":"Пациентка 40 лет, в анамнезе 4 случая перелома костей в течение 18 месяцев, желчекаменная болезнь, мочекаменная болезнь, в анамнезе оперативное вмешательство по поводу гиперплазии щитовидной железы около 5 лет назад.   Поступила с признаками острого панкреатита.  Пациентка дезориентирована, заторможена. В дальнейшем у пациентки кома, а так же анурия.   На электрокардиограмме у пациентки укорочение интервала QT, AB-блокады. При эзофагогастродуоденоскопии язвенные повреждения слизистой желудка.   В анализе крови на электролиты определяется: калий 3,3 ммоль/д, натрий 142 ммоль/л, кальций 4,1 ммоль/л, хлор 94 ммоль/л.","question":"С каким клинически схожим состоянием наиболее значимо провести дифференциальную диагностику в данном случае?","correct":"передозировка витамина D","distractors":["Во время масочной вентиляции","Легкая воспламеняемость"]},{"id":277,"scenario":"Женщина 58 лет доставлена в многопрофильный стационар после ДТП. При поступлении уровень сознания - 13 баллов по ШКГ. Отмечается анизокария OS > OD и правосторонний гемипарез до 3 баллов. Клинически перелом правой бедренной кости. По данным системы ЕМИАС у пациентки в анамнезе протезирование митрального клапана в связи с ревматическим проком сердца, сахарный диабет, и гипертоническая болезнь. На момент осмотра АД 100/60 мм рт. ст. ЭКГ - фибрилляция предсердий, ЧСС 100-140 в мин. Температура тела 36,2 градусов. В лабораторных анализах имеется отклонение Нв до 100 г/л, глюкозы до 8 ммоль/л, МНО - 2,4 По данным КГ головного мозга субдуральная гематома в левой теменнозатылочной области объемом около 70 мл. По данным рентгенографии - перелом правой бедренной кости со смещением отломков.","question":"Какой вариант нормализации МНО наиболее оптимален в данной клинической ситуации?","correct":"Трансфузия одногруппной СЗП в дозе 15-20 мл/кг","distractors":["Инфузия фитоменадиона 10 мг в/в капельно","Введение криопреципитата 1-2 ед на каждые 10 кг массы тела"]},{"id":278,"scenario":"Женщина 57 лет поступает в ОРИТ в связи с тяжелым острым отечным панкреатитом (клинически и инструментально). В анамнезе у пациентки постоянная форма фибрилляции предсердий. \nВ ОРИТ начата инфузионная терапия. Обезболивание ненаркотическими, наркотическими анальгетиками - без значимого эффекта на протяжение 2 ч. Решено установить эпидуральный катетер и проводить продленную эпидуральную анальгезию.","question":"В какие сроки после прекращения приема ривароксабана может быть выполнена пункция и катетеризация эпидурального пространства?","correct":"72 ч","distractors":["12 ч","24 ч"]},{"id":279,"scenario":"Мужчина 68 лет поступил в операционную для экстренной диагностической лапароскопии. Сбит скутеристом на тротуаре. По данным УЗИ: свободная жидкость в брюшной полости. Состояние тяжелое. Сознание ясное. Не принимал пищу в течении 7 часов. Не имеет известных ему аллергических реакций. Страдает ишемической болезнью сердца, постоянной формой фибрилляции предсердий. Постоянно принимает варфарин и конкор. Принято решение применить протромбиновый комплекс для реверсии действия варфарина.","question":"Какие факторы свертывания, с наибольшей вероятностью, входят в протромбиновый комплекс?","correct":"II, VII, IX ,X","distractors":["III, IV, V, VI","I,III, IX,X"]},{"id":280,"scenario":"Мужчина 65 лет находится в ОРИТ с диагнозом \"Повторное ОНМК по ишемическому типу в бассейне ПСМА\" (по данным КТ ГМ). Был найден дома в бессознательном состоянии соседями, уточнить давность начала заболевания невозможно. предшествующая медицинская документация отсутствует. Со слов соседей, больно проживал одиноко, несколько лет назад перенес ОНМК, сам себя обслуживал, злоупотреблял алкоголем. При поступлении неврологический дефицит глубокий: сознание угнетено до сопора, левосторонний гемипарез, сенсомоторная афазия. Пищу не глотает, жидкость выливается изо рта.  АД 150/85 мм рт.ст., ЧСС 80-90/мин, фибрилляция предсердий. Дыхание самостоятельное, без дополнительной оксигенации SatO2 97%  при ЧДД 17/мин. При осмотре: рост 170 см, масса тела 51 кг, толщина кожной складки над бицепсом 2 мм тургор кожи снижен, язык сухой, изо рта запах ацетона.  В биохимическом анализе крови: натрий 145 ммоль/л, калий 4, 1 ммоль/л, глюкоза 3, 1 ммоль/л, общий белок 45 г/л, альбумин 17 г/л. В анализе мочи кетоновые тела +++. На вторые сутки в ОРИТ установлен назогастральный зонд, начато энтеральное кормление - 1000 мл изокалорической питательной смеси за сутки, дополнительно 500 мл воды в зонд. На третьи сутки (через 30 ч после начала кормления) отмечено значительное ухудшение состояния: падение сатурации, влажные дистантные хрипы, одышка, тахикардия до 160/мин, снижение уровня сознания. Больной интубирован, переведен на ИВЛ. В б/х анализе крови: натрий 165 ммоль/л, глюкоза 17 ммоль/л, калий 2,6 ммоль/л. Уменьшена до 500 ккал/мут в виде капельного введения 25 мл/ч доза питательной смеси. Начата инфузия препаратов калия, магния. Проводится частый контроль и коррекция гипергликемии. К терапии добавлены диуретики.","question":"Какой препарат еще необходимо добавить в лечение?","correct":"Тиамин","distractors":["Цианкобаламин","Альбумин"]},{"id":281,"scenario":"Мужчина 65 лет поступает в ОРИТ из отделения кардиологии в связи с выраженной, стремительно нарастающей одышкой. В отделении кардиологии находится со вчерашнего дня, поступал по поводу пароксизма фибрилляции предсердий неизвестной давности, тахисистолии. Кардиологом принято решение о ритм-урежающей терапии, назначено 5 мг бисопролола 2 р/сут. Сегодня утром в 10-00 получил вторую дозу, через 1 ч после этого пожаловался на резкое нарастание одышки, чувства нехватки воздуха, появились дистантные свистящие хрипы. Объективно – больной в сознании, контактен, ориентирован верно, предъявляет вышеописанные жалобы, сообщает, что с детства страдает бронхиальной астмой, иногда (несколько раз в неделю)пользуется ингалятором (название указать не может), базисной терапии в настоящее время не получает. Артериальное давление 125/60 мм рт.ст., ЧСС 80/мин, на ЭКГ – фибрилляция предсердий.   Дышит самостоятельно, одышка 32/мин, в дыхании участвуют мышцы плечевого пояса. Сатурация 85%  при дыхании комнатным воздухом. При аускультации – жесткое дыхание, свистящие экспираторные хрипы над всеми легочными полями. Налажена инсуффляция кислорода через носовые канюли 2 л/мин.","question":"С какого лекарственного средства надо начинать терапию в этом случае?","correct":"Ипратропиум","distractors":["Сальбутамол","Глюкокортикостероиды"]},{"id":282,"scenario":"Пациентке 34 лет в условиях общей анестезии выполняется ринопластика в плановом порядке. На 20 минуте от начала операции вы отметили падение артериального давления до 70/30 мм рт. ст., при осмотре кожных покровов выявлена крапивница на животе и передней поверхности бедер. Незамедлительно был введен эпинефрин, гемодинамика стабилизирована. Однако, сохраняются явления бронхоспазма.","question":"Какие дополнительные действия наиболее целесообразно предпринять в данном случае для купирования бронхоспазма?","correct":"Применить сальбутамол","distractors":["Ввести эуфилин","Применить ингаляции с глюкокортикостероидами"]},{"id":283,"scenario":"Мужчина 55 лет доставлен в ОРИТ. Диагноз СПМ: Тяжелое обострение бронхиальной астмы. Страдает бронхиальной астмой много лет, постоянно использует ингаляторные формы бета2-адреномиметиков и глюкокортикостероидов. Курит до 2 пачек сигарет в день. Ухудшение состояния в течение недели. При осмотре: в ясном сознании, несколько возбужден. Т тела 36,7 С. Артериальное давление 155/90 мм рт.ст., ЧСС 110/мин, на ЭКГ – синусовая тахикардия. Одышка 32/мин, в дыхании участвуют мышцы плечевого пояса. Сатурация 86%. При аускультации – жесткое дыхание, свистящие экспираторные хрипы над всеми легочными полями. Налажена инсуффляция кислорода через носовые канюли 7 л/мин. Проведена небулайзерная ингаляция сальбутамол, пульмикорт,  эффект частичный, одышка 28/мин, сохраняются хрипы, сатурация 91% на 15 л/мин. КОС: рН 7,28, рСО2 74 мм рт. ст., раО2 64 мм рт.ст.","question":"Какова дальнейшая тактика терапии?","correct":"К проводимой терапии добавить преднизолон 120 мг внутривенно","distractors":["Выполнить интубацию трахеи, начать ИВЛ","Добавить диуретическую терапию"]},{"id":284,"scenario":"Мужчина 55 лет доставлен в ОРИТ. Диагноз СПМ: Тяжелое обострение бронхиальной астмы. Страдает бронхиальной астмой много лет, постоянно использует ингаляторные формы бета2-адреномиметиков и глюкокортикостероидов. Курит до 2 пачек сигарет в день. Ухудшение состояния в течение недели, на фоне ОРВИ. При осмотре: в ясном сознании, несколько возбужден. Т тела 37,9 С.  Артериальное давление 155/90 мм рт.ст., ЧСС 110/мин, на ЭКГ – синусовая тахикардия. Одышка 32/мин, в дыхании участвуют мышцы плечевого пояса. Сатурация 86%. При аускультации – жесткое дыхание, свистящие экспираторные хрипы и единичные жужжащие хрипы над всеми легочными полями. При кашле небольшое количество трудноотходящей слизисто-гнойной мокроты. Налажена инсуффляция кислорода через носовые канюли 7 л/мин. Проведена небулайзерная ингаляция сальбутамол, пульмикорт, преднизолон 120 мг внутривенно. Эффект частичный, одышка 26/мин, сохраняются хрипы, сатурация 93% на 15 л/мин. Лабораторно: рН 7,3, рСО2 74 мм рт. ст., раО2 64 мм рт.ст. Лейкоциты 12*10^9/л, С-реактивный белок 43 мг/л. По даннвм рентгенографии органов грудной клетки инфильтративных измененийне выявлено, усиление легочного рисунка.","question":"Какова дальнейшая тактика терапии?","correct":"Назначить антибактериальную терапию","distractors":["Выполнить интубацию трахеи, начать ИВЛ","Добавить диуретическую терапию"]},{"id":285,"scenario":"Мужчина 55 лет доставлен в ОРИТ. Диагноз СПМ: Тяжелое обострение бронхиальной астмы. Страдает бронхиальной астмой много лет, постоянно использует ингаляторные формы бета2-адреномиметиков и глюкокортикостероидов. Курит до 2 пачек сигарет в день. Ухудшение состояния в течение недели, на фоне ОРВИ. При осмотре: в ясном сознании, несколько возбужден.  Артериальное давление 155/90 мм рт.ст., ЧСС 120/мин, на ЭКГ – синусовая тахикардия, частые наджелудочковые экстрасистолы. Одышка 32/мин, в дыхании участвуют мышцы плечевого пояса. Сатурация 86 %. При аускультации – жесткое дыхание, свистящие экспираторные хрипы над всеми легочными полями. Налажена инсуффляция кислорода через носовые канюли 7 л/мин. Проведена небулайзерная ингаляция сальбутамол, пульмикорт, в/в 120 мг преднизолона  - с эффектом, одышка 24/мин, дистантные хрипы исчезли, сатурация 96%. КОС: рН 7,32, рСО2 64 мм рт. ст., раО2 76 мм рт.ст. РТерапия продолжена в прежнем объеме, через 4 часа снижение уровня сознания до оглушения, крайне вял, адинамичен. Частота дыхания 18/мин, сатурация 98%.  КОС: рН 7,15, рСО2 109 мм рт. ст., раО2 98 мм рт.ст.","question":"В чем причина ухудшения состояния?","correct":"Кислород-индуцированная гиперкапния","distractors":["Острый инфаркт миокарда","Тромбоэмболия легочной артерии"]},{"id":286,"scenario":"У пациента 47 лет, хронические заболевания: гипертоническая болезнь, дислипидемия, принимает статины и гипотензивные препараты. В анамнезе аппендэктомия в детстве, аллергическая реакция на препараты группы сульфаниламидов и Диакарб, проявляется в виде анафилактического шока.  Пациенту недавно установлен диагноз: \"Сахарный диабет 2 типа, инсулиннезависмый\", эндокринологом подобрана медикаментозная терапия, препараты принимает не системно, только симптоматически.   Поступил в стационар в связи с развитием анафилактической реакции. Установлено, что перед ухудшением состояния принимал гипотензивные препараты, препараты группы статинов и гипогликемические. Названия препаратов точно не может указать.","question":"Прием какого препарата, с наибольшей вероятностью, вызвал у данного пациента развитие анафилактической реакции?","correct":"глимепирид","distractors":["метформин","акарбоза"]},{"id":287,"scenario":"Мужчина 67 лет поступил в плановом порядке для выполнения эндопротезирования тазобедренного сустава в условиях спинально-эпидуральной анестезии. Аллергоанамнез спокоен. Хирургических вмешательств в анамнезе не было. Хронические заболевания: ИБС, постоянная форма фибрилляции предсердий. Постоянно принимает метопролол и дабигатран (отменен 72 часа назад).  Оперативное вмешательство перенес удовлетворительно.","question":"Какие сроки возобновления терапии дабигатраном наиболее уместны в данном случае после удаления эпидурального катетера?","correct":"Через 6 часов","distractors":["Через 2 часа","Через 4 часа"]},{"id":288,"scenario":"Пациент 85 лет доставлен в операционную для выполнения витрэктомии. Контакт затруднен, когнитивно снижен. Хронические заболевания: цереброваскулярная болезнь, хроническая ишемия головного мозга, гипертоническая болезнь, ИБС, желчекаменная болезнь. Постоянно принимает атенолол, аторвастатин, аспирин, дабигатран. АД 143/75 мм рт. ст., ЧСС 65-68 в минуту, ЧДД 15 в минуту, сатурация 99%.","question":"Какой вид анестезии наиболее предпочтителен у данного пациента?","correct":"Общая анестезия","distractors":["Ретробульбарная блокада","Субтеноновая блокада"]},{"id":289,"scenario":"Пациентка 55 лет поступила в экстренную операционную с диагнозом: \"Стеноз гортани\". Из анамнеза известно, что данное заболевание развилось остро. АД 153/76 мм рт. ст., ЧСС 90 в минуту, сатурация 91%. Признаки трудной интубации трахеи. Хронические заболевания - гипертоническая болезнь. Интубации в анамнезе были без особенностей. Во время попытки провести интубацию трахеи в сознании с помощью бронхоскопа вы увидели данную картину:","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Острый эпиглоттит","distractors":["Заглоточный абсцесс","Полипы голосовых связок"]},{"id":290,"scenario":"Мужчине 45 лет планируется выполнить эндоскопическое удаление злокачественной опухоли голосовых связок. Аллергоанамнез спокоен. Хронические заболевания - гипертоническая болезнь, мочекаменная болезнь, подагра. АД 143/71 мм рт. ст., ЧСС 78 в минуту, ЧДД 18 в минуту, сатурация 95%. Лабораторно без особенностей. Планируется проведение комбинированного эндотрахеального наркоза  поливинилхлоридной трубкой. Риск  ASA 2.","question":"Какой недостаток имеет интубационная трубка из поливинилхлорида в данной ситуации?","correct":"Легкая воспламеняемость","distractors":["Низкая передача тепла","Высокая передача тепла"]},{"id":291,"scenario":"БСМП был доставлен в шоковый зал мужчина 76 лет с направительным диагнозом: (ЖКК). Со слов родственников пациент в последнее время стал забывчивым и рассеянным,  два дня назад начал жаловаться на шум в ушах и повышение температуры. Сегодня у пациента отмечалась рвота с прожилками крови. Из единой медицинской карты известно, что у пациента постинфарктный кардиосклероз и последствия перенесенного острого нарушения мозгового кровообращения, атеросклероз брахиоцефальных артерии. Терапию получает: глицин, аспирин, мемантин, аспаркам, когитум. Объективно: пациент в сознании, когнитивно снижен, дезориентирован в пространстве. Кожный покров обычного цвета, ИМТ 21 кг\\м3. Температура тела 38 градусов. Очаговой неврологической симптоматики не выявлено. Зрачки равные, средней величины, реагируют на свет. Мышечный тонус нормальный. Дыхание самостоятельное,  ЧД 28 в мин. При аускультации дыхание везикулярное, хрипов нет. АД 112\\63 мм рт.ст., ЧСС 114 в мин. Живот мягкий, не вздут, безболезненный при пальпации, перистальтика выслушивается. Катетеризирован мочевой пузырь, выделилось 250 мл желтой мочи. На ЭКГ: синусовая тахикардия. Выполнено УЗИ органов брюшной полости: изменений нет. Выполнена ЭГДС: эрозивно-геморрагический гастрит. По лабораторным данным:  лейкоциты 6,7х10\\9\\л, гемоглобин 130 г\\л, калий 3.8 ммоль\\л, натрий 132 ммоль\\л,  мочевина 5,6 ммоль\\л, креатинин 61 мкмоль\\л, билирубин общий 11 мкмоль\\л, АЛТ 10 Ед\\л, АСТ 20 Ед\\л, коагулограмма в норме.","question":"Какой диагноз наиболее вероятен?","correct":"Отравление аспирином","distractors":["Отравление глицином","Отравление мемантином"]},{"id":292,"scenario":"Больная, 42 лет, находится в ОРИТ 3 сутки в связи с тяжелой сочетанной травмой, полученной вследствие падения с высоты (перелом V-VIII ребер слева, перелом левой бедренной кости, разрыв селезенки, внутрибрюшное кровотечение геморрагический шок, ОРДС). Выполнена спленэктомия, стабилизация перелома бедренной кости аппаратом внешней фиксации.  Проводилась массивная инфузионно-трансфузионная терапия, явления шока купированы, проводится ИВЛ. Отмечаются явления гастростаза (по назогастральному зонду сброс 1000 мл застойного отделяемого), начато проведение парентерального питания. Пациентке показано проведение прокинетической терапии.","question":"Какой из перечисленных препаратов обладает также прокинетической активностью и наиболее опитимален для применения в данном клиническом случае?","correct":"Эритромицин","distractors":["Оксациллин","Рифампицин"]},{"id":293,"scenario":"Женщина 26 лет находится в отделении реанимации более 30 дней по поводу разрыва аневризмы головного мозга. Сознание угнетено, атония, арефлексия, адинамия. Продленная ИВЛ. Гемодинамика стабильная на фоне внутривенной инфузии норадреналина 0,1 мкг/кг/мин. Констатирована смерть мозга.","question":"При каком условии в данном случае органы или ткани могут быть изъяты для трансплантации?","correct":"Если имеются бесспорные доказательства факта смерти, зафиксированного консилиумом","distractors":["Если есть письменное прижизненное согласие на изъятие органов потенциального донора","Только при наличии экстренной ситуации с угрозой жизни для реципиента"]},{"id":294,"scenario":"Пациент 18 лет находится в отделении реанимации более 50 дней после вой пузырь, моча темная, 150 мл.","question":"Какой диагноз наиболее вероятен?","correct":"Отравление опиоидными наркотическими веществами","distractors":["Отравление каннабиоидами","Отравление ГОМК"]},{"id":307,"scenario":"Мужчина 46 лет доставлен бригадой СМП с тяжелым отравлением угарным газом, топил дровяную печь и почувствовал ухудшение состояния.  Уровень сознания- оглушение, SpO2 -93%, отмечается одышка, головокружение,  шум в ушах, краснота лица. Экстренно переведен в ОРИТ для получения лечения гипербарическим кислородом.","question":"Какое из следующих физиологических изменений произойдет у пациента в гипербарической камере?","correct":"уменьшение легочного сосудистого сопротивления","distractors":["уменьшение системного сосудистого сопротивления","увеличение кислородного обмена вследствие увеличения SaO2"]},{"id":308,"scenario":"Пациентка  62 лет. Поступила в операционную а для проведения планового оперативного вмешательства - лапороскопия холецистэктомия в условяих общей анестезии с ИВЛ.\nВ анамнезе: 12 лет пациентка страдает сахарным диабетом 2 типа, инсулиннезависимым с множественными осложнениями. Целевой уровень глюкозы крови 5-7 ммоль/л на фоне постоянного приема пероральных сахароснижающих препаратов. Также из хронических заболеваний пациентка отмечает гипертоническую болезнь с подъемами артериального давления до 160/100 мм.рт.ст. при волнении. На фоне терапии адаптирована к АД 130/80мм. рт. ст. \nУровень гликированного гемоглобина 9,0% на момент госпитлизации. Гликемический профиль в стационаре от 4,5 до 11 ммоль/л. \nНа момент осмотра анестезиологом отмечается гипергликемия 18 ммоль/л.","question":"Какова оптимальная дальнейшая анестезиологическая тактика?","correct":"Отложить плановую операцию до достижения целевых значений гликемии и уровня гликированного гемоглобина","distractors":["глюкагон 1 мг","Инсулин"]},{"id":309,"scenario":"Пациент 52 лет, поступил в стационар по каналу СМП в связи с комой.  Жалобы при вызове бригады СМП на постоянную жа е обращает на себя внимание распространенная петехиальная сыпь.","question":"Что являлось наиболее вероятной причиной возникновения патологии?","correct":"Отсроченная репозиция перелома","distractors":["Жировая эмболия","Интратекальное введение анестетика"]},{"id":376,"scenario":"Пациентка 20 лет, в анамнезе сахарный диабет 1 типа, инсулинзависимый. Доставлена в стационар в связи с нарушением уровня сознания, комой, гипогликемией.","question":"Какие исследования и консультации необходимы пациентке в первые 10 минут от поступления следуя приказу Министерства здравоохранения от 10.05.2017 N 203н «Об утверждении критериев оценки качества медицинской помощи»?","correct":"Электрокардиография, осмотр врача анестезиолога-реаниматолога","distractors":["Жировая эмболия","Небулайзерная терапия сальбутамолом"]},{"id":377,"scenario":"Пациент 45 лет. У пациента цирроз печени и напряженный асцит. Поступил в ОРИТ после проведения парцентеза с эвакуацией асцитической жидкости. Клинически состояние стабильное , витальные параметры удовлетворительны, жалобы отрицает","question":"Какова тактикатерапи у пациента для предотвращения циркуляторных расстройств?","correct":"назначение альбумина","distractors":["одномоментная инфузия большого объема альбумина","Галотан"]},{"id":378,"scenario":"Пациент 45 лет. У пациента цирроз печени и напряженный асцит. Выполнен парацентез в условиях местной анестезии. Эвакуировано 1200 мл асцитической жидкости.\nПоступил в ОРИТ после проведения парцентеза с эвакуацией асцитической жидкости. Пациенту проведена инфузия Альбумина 20% в объеме 1200 мл. Назначена антикоагулянтная терапия. \nВ динамике в следующие сутки менен чем через 48 часов от поступления у пациента развилась дыхательная недостаточность, сатурация на атмосферном воздухе 80%, одышка, напряжение кислорода в КОС артериальной крови 48 мм рт. ст., ацидоз. Электролиты плазмы в пределах референтных значений. В общем анализе крови тромбоцитопения, анемия легкой степени, остальные параметры в предела  терапия, вазопрессорная поддержка, Нустановлен уретральтный катетер, эвакуировано 900 мл мочи. Эхо-КГ: ФВ 63%, нижняя полая вена коллабирует на вдохе более чем на 50%, клапаны сердца без особенностей.","question":"Какая причина гемодинамических нарушений наиболее вероятна в данном случае?","correct":"Спинальная травма, спинальный шок","distractors":["Септический шок, неустановленный источник инфекции","Цирроз печени, декомпенсация"]},{"id":18,"scenario":"Женщина 30 лет поступила в ОРИТ с диагнозом \"Острая сердечная недостаточность\". В течение 5 дней нарастали слабость, одышка в положении лежа на спине, отеки нижних конечностей, кистей рук, некоторое увеличение живота, боль в животе, тошноту, жажду, головокружение. Хронические заболевания отрицает, проходит подготовку к ЭКО. Объективно: кожный покров умеренно бледный, гипергидроз, постпункционные гематомы верхних конечностей. Отеки нижних конечностей симметричные, по типу пастозности. Температура тела 36,7 С. ЧД 22 в мин, SpО2 94 %, ортопноэ, аускультативно жесткое дыхание, ослабленное в задне-базальных отделах. АД 90/59 мм рт. ст., ЧСС 100 в мин. Живот увеличен, вздут, болезненный при пальпации во всех отделах. Язык сухой, чистый. Рвота желудочным содержимым на догоспитальном этапе. Нарушения стула пациентка отрицает. Мочеиспускание самостоятельное, произвольное, отмечает снижение частоты мочеиспускания, последнее мочеиспускание более 12 часов назад. По данным предварительных исследований: ЭКГ без патологии, синуосвая тахикардия, ЭОС норма. УЗИ органов брюшной полости: свободная жидкость в брюшной полости, вероятно, соответствует асциту, жидкость в плевральных полостях до 5 см. С-реактивный белок 15 мг/л, лейкоциты 12*10^9, гемоглобин 125 г/л.","question":"Какой диагноз наиболее вероятен в данном случае у пациентки?","correct":"Синдром гиперстимуляции яичников","distractors":["Миокардит","Сепсис"]},{"id":19,"scenario":"Женщина 30 лет поступила в ОРИТ с диагнозом \"Острая сердечная недостаточность\". В течение 5 д nario":"Пациенту 6 2 лет предстоит плановая операция - лапароскопическая герниопластика. Вам необходимо провести предоперационную оценку состояния пациента. При осмотре: АД 140/90 мм рт.ст., ЧСС 74 ударов в минуту, по ЭКГ - синусовый ритм, ИМТ 30. Перенес аппендэктомию и тотальное эндопротезирование тазобедренного сустава. Из лекарственных препаратов принимает ацетилсалициловую кислоту в дозе 75мг и бисопролол 5 мг в сутки, жалоб активно не предъявляет. Некоторое время назад был установлен диагноз - ИБС кардиологом в районной поликлинике. Пациент поднимается на 4 этаж без остановки, после чего должен остановиться, из-за усталости, одышки и ощущения учащенного сердцебиения.","question":"Какому классу по NYHA соответсвует данная клиническая ситуация?","correct":"Класс II","distractors":["Класс I","Класс III"]},{"id":22,"scenario":"Пациенту 70 лет предстоит плановая операция - лапароскопическая герниопластика. Вам необходимо провести предоперационную оценку состояния пациента. При осмотре: АД 140/90 мм рт.ст., ЧСС 62 ударов в минуту, по ЭКГ - БЛНПГ, ИМТ 30. Перенес аппендэктомию и тотальное эндопротезирование тазобедренного сустава. Из лекарственных препаратов принимает ацетилсалициловую кислоту в дозе 75мг и бисопролол 5 мг в сутки, применяет нитраты при боли за грудиной. Некоторое время назад был установлен диагноз - ИБС: стенокардия напряжения. Пациент старается самостоятельно ходить в магазин за продуктами, однако должен останавливаться из-за боли за грудиной, усталости, одышки и ощущения учащенного сердцебиения. В покое чувствует себя хорошо.","question":"Какому классу по NYHA соответсвует данная клиническая ситуация?","correct":"Класс III","distractors":["Класс I","Класс II"]},{"id":23,"scenario":"Пациенту 75 лет предстоит плановая операция - лапароскопическая герниопластика. Вам необходимо провести предоперационную оценку состояния пациента. При осмотре: АД 140/90 мм рт.ст., ЧСС 60 ударов в минуту, по ЭКГ - БЛНПГ, ИМТ 30. Перенес аппендэктомию и тотальное эндопротезирование тазобедренного сустава. Из лекарственных препаратов принимает ацетилсалициловую кислоту в дозе 75мг и бисопролол 5 мг в сутки, применяет нитраты при боли за грудиной. Некоторое время назад был установлен диагноз - ИБС: стенокардия напряжения. Пациент не может самостоятельно ходить в магазин за продуктами из-за боли в области сердца, одышки и ощущения учащенного сердцебиения. Периодически боли за грудиной возникают в покое.","question":"Какому классу по NYHA соответсвует данная клиническая ситуация?","correct":"Класс IV","distractors":["Класс I","Класс II"]},{"id":24,"scenario":"Пациент 38 лет, хронические заболевания в анамнезе отсутствуют, вредные привычки отрицает, прием лекарственных препаратов отрицает. Находится в стационаре в связи с черепно-мозговой травмой, проведено нейрохирургическое оперативное вмешательство, 7-е сутки наблюдения в ОРИТ. У пациента жалобы на жажду, поведение беспокойное, прерывистый сон. Объективно: кожа сухая, сухость слизистых. Респираторных нарушений нет, гемодинамика без вазопрессорной поддержки, АД 100/60 мм рт. ст., ЧСС 107 в мин, ритм синусовый. Ортостатическая проба положительная. Органы ЖКТ - без особенностей. Мочеиспускание частое, темп диуреза увеличен, суточный диурез 9 литров. Общий анализ крови: признаки системной воспалительной реакции не выявлены, гемоглобин 160 г/л, гематокрит 52%. Биохимический анализ крови: без патологии, глюкоза 5,1 ммоль/л. В общем анализе мочи: снижение плотности мочи, другой патологии не выявлено. Осмолярность мочи снижена. Анализ КЩС: лактат 0,4 ммоль/л, глюкоза 5,1 ммоль/л, pH 7,36, натрий 151 ммоль/л, калий 4,0 ммоль/л, кальций 1,2 ммоль/л. Осмолярность крови повышена.","question":"Какое состояние наиболее вероятно в данном случае у пациента?","correct":"центральный несахарный диабет","distractors":["впервые выявленный сахарный диабет","феохромоцитома"]},{"id":25,"scenario":"Мужчина 67 лет, на консультацию в отделение вызван реаниматолог ввиду развития гипотонии, одышки. При осмотре: scenario":"Мужчина, 49 лет. В анамнезе: хронический гепатит В и С, ВИЧ-инфекция. Доставлен в операционную с ущемленной паховой грыжей. Рост 170 см, вес 50 кг. Объективно: пациент в сознании, заторможен, АД 110/70 мм рт. ст., ЧСС 92 уд/мин. Дыхание адекватное, ЧДД 14 в минуту, SpO2 99%. При осмотре: видимая венозная сеть передней брюшной стенки. Лабораторно: гемоглобин 100 г/л, тромбоциты 100*10^9 /л. Биохимический анализ крови: билирубин 97 мкмоль/л, креатинин 110 мкмоль/л, АлАт, АсАТ - до 4 N, альбумин 27 г/л. Показатели КОС, электролиты - без существенных изменений. В коагулограмме: ПТИ 39%, АЧТВ 33 сек, фибриноген 1,9 г/л. Планируется проведение герниопластики в условиях эндотрахеальной анестезии с последующим переводом в отделение интенсивной терапии.","question":"Какая тактика периоперационного ведения наиболее целесообразна с целью сохранения почечной функции в данном случае?","correct":"Постепенный подбор дозы диуретиков","distractors":["Раннее назначение петлевых диуретиков в максимально переносимых дозировках","Интраоперационная внутривенная инфузия 10% натрия хлорида в объеме 200 мл"]},{"id":30,"scenario":"Мужчина, 53 года. Планируется герниопластика. Хронические заболевания отрицает. Рост 170 см, вес 57 кг. АД 110/70 мм рт. ст. ЧСС 100 ударов в минуту. Объективно: обращают внимание сосудистые звездочки в области лица, верхней части грудной клетки. Лабораторно: в ОАК гемоглобин 120 г/л, тромбоциты 160*10^9/л. Биохимический анализ крови: билирубин 23 мкмоль/л, АлАт 80 Ед/л, АсАТ 110 Ед/л, альбумин 32 г/л, в коагулограмме МНО 1,2 Ед, АЧТВ 33 сек, фибриноген 2,2 г/л.","question":"Какой диагностический нструмент наиболее уместен для верификации алкогольной болезни печени у пациента?","correct":"Тест AUDIT","distractors":["Критерии West-Haven","Классификация Child-Turcotte"]},{"id":31,"scenario":"Мужчина, 49 лет. В анамнезе хронический гепатит В и С, ВИЧ-инфекция, алкогольная зависимость. Рост 170 см, вес 47 кг. АД 110/70 мм рт. ст., ЧСС 100 ударов в минуту. Объективно: пациент заторможен, также обращает внимание видимая венозная сеть передней брюшной стенки. Лабораторно: гемоглобин 100 г/л, тромбоциты 100х10^9/л, билирубин 49 мкмоль/л, АлАт 80 Ед/л, АсАТ 110 Ед/л, альбумин 27 г/л, МНО 1,7, фибриноген - 1,9 г/л.","question":"Какой диагностический инструмент наиболее целесообразно использовать для прогнозирования трехмесячной выживаемости у данного пациента?","correct":"Шкала MELD","distractors":["Тест AUDIT","Классификация Child-Turcotte"]},{"id":32,"scenario":"Пациент 65 лет подается в рентгеноперационную с диагнозом: Острая расслаивающая аневризма аорты. При осмотре сознание ясное, кожный покров бледный, АД 160/100 мм рт. ст., ЧСС 100 уд/мин. Живот мягкий, болезненный в мезогастрии, определяется передаточная пульсация аорты.","question":"Какая тактика по контролю артериального давления будет наиболее верной?","correct":"Немедленное снижение САД ниже 120 мм.рт.ст. и ЧСС менее 60 уд/мин","distractors":["Снижение АД на 20% в течение 2 часов","Не снижать АД ниже 160/90мм рт. ст."]},{"id":33,"scenario":"Пациент 75 лет на лечении в ОРИТ с диагнозом: \"Расслаивающая аневризма инфраренального отдела аорты с распространением на общие подвздошные артерии\". Начата консервативная терапия внутривенно бета-блокаторами, статинами, ацетилсалициловой кислотой. При осмотре сознание ясное, кожные покровы физиологической окраски, АД 118/70 мм рт. ст., ЧСС 76 /мин. Живот мягкий, умеренно болезненный в мезогастрии, определяется передаточная пульсация аорты. За последние 12 часов отмечено снижение темпа диуреза до 15 мл/ч. Лабораторно: нарастание креатинина с 70 мкмоль/л до 150мкмоль/л, калий 4,7 ммоль/л, уровень гемоглобина стабилен в пределах 122-126 мг/дл., прокальцитонин менее 0.5 нг/мл.","question":"Какое исследование является наиболее целесообразным для верификации причины олигурии?","correct":"МСКТ аотрография","distractors":["УЗИ почек","Сцинтиграфия почек"]},{"id":34,"scenario":"Пациент 50 лет с ОКС с подъемом ST подан в операционную для выполнения коронароангиографии. Со слов, ранее повышения артериального давления не отмечал. При осмотре сознание ясное, кожные покровы бледные, влажные, АД 200/120 мм рт. ст., ЧСС 120 уд/мин. Живот мягкий, безболезненный. Жалоб на боль за грудиной на момент осмотра не предъявляет, болевой синдром купирован морфином на догоспитальном этапе.","question":"Какая тактика по контролю артериального давления будет наиболее верной в данном случае?","correct":"Немедленное снижение АД менее 140/90 мм рт. ст.","distractors":["Снижение АД на 20% в течение 2 часов","Не снижать АД ниже 160/90мм рт. ст."]},{"id":35,"scenario":"Пациентка 37 лет с известным диагнозом феохромоцитомы поступила в шоковый зал ввиду повышения артериального давления до 220/100 мм рт. ст., что сопровождалось рвотой, головной болью, шаткостью походки. При осмотре сознание ясное, кожные покровы бледные, АД 250/140 мм рт. ст., живот мягкий, безболезненный. Сохраняются жалобы на головную боль, тошноту.","question":"Какой препарат, примененный на догоспитальном этапе бригадой СМП, с наибольшей вероятностью, мог вызвать повышение АД вместо его снижения?","correct":"Метопролол","distractors":["Верапамил","Нитроглицерин"]},{"id":36,"scenario":"Пациент 55 лет доставлен в шоковый зал бригадой СМП с направительным диагнозом \"ОНМК\". По данным МСКТ ГМ верифицирован инфаркт головного мозга по ишемическому типу в бассейне левой СМА, планируется проведение ТЛТ. При осмотре ШКГ 14 б, правосторонний гемипарез, кожные покровы бледные, АД 220/114 мм рт. ст., ЧСС 88 уд/мин. Живот мягкий, безболезненный.","question":"Какая тактика по контролю артериального давления перед проведением ТЛТ будет наиболее верной в данном случае?","correct":"Снижение АД менее 185/110 мм рт. ст.","distractors":["Снижение АД на 20% в течение 2 часов","Немедленное снижение АД менее 140/90 мм рт. ст."]},{"id":37,"scenario":"Пациент 51 года поступил в операционную для планового удаления 3 моляров в условиях внутривенной анестезии. Из анамнеза известно, что у пациента постоянная форма фибрилляции предсердий, находится на терапии варфарином (МНО 1,8).","question":"Какая тактика наиболее предпочтительна в отношении приема варфарина в данном случае?","correct":"Терапия не должна прерываться","distractors":["Отмена за 5 дней до операции","Инфузия протромплекса"]},{"id":38,"scenario":"Пациент 45 лет поступил в операционную для выполнения остеосинтеза стержнем в условиях спинальной анестезии по поводу чрезвертельного перелома бедренной кости. Анамнез спокоен, известных аллергий нет. Хронические заболевания- гастрит. ЭКГ - синусовый ритм без очаговой патологии. После выполнения репозиции бедреной кости, пациент пожаловался на затруднение дыхания и потерял сознание. По кардиомонитору - ЧДД 0, АД не определяется, ЭКГ - электромеханическая диссоциация.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Тромбоэмболия легочной артерии","distractors":["Воздушная эмболия легочной артерии","Высокий спинальный блок"]},{"id":39,"scenario":"Пациентке 70 лет выполняется экстренное оперативное вмешательство - остеосинтез лодыжек с наложением жгута. Известно, что пациентка длительное время страдает ишемической болезнью сердца, постоянно принимает бисопролол.","question":"Какой значимый риск, с наибольшей вероятностью, несет в данном случае использование жгута в оперативной травматологии?","correct":"Тромбоэмболия легочной артерии","distractors":["Дефицит объема циркулирующей крови","Кожный зуд"]},{"id":40,"scenario":"Пациент 45 лет поступил в операционную для выполнения остеосинтеза лодыжек в условиях спинальной анестезии. Анамнез спокоен, известных аллергий нет. Хронические заболевания- гастрит. ЭКГ - синусовый ритм без очаговой патологии. После снятия жгута (время использования 113 минут) пациент резко потерял сознание. Артериальное давление не определяется, ЭКГ- фибрилляция желудочков.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Тромбоэмболия легочной артерии","distractors":["Острый инфаркт миокарда","Острое нарушение мозгового кровобращения"]},{"id":41,"scenario":"Пациент 23 лет, мотоциклист, доставлен в операционную из шокового зала с диагнозом: \"Политравма: ЧМТ, тупая травма живота, перелом правого бедра в средней трети, травматическая ампутация пальцев левой верхней конечности\", для выполнения экстренной лапаротомии после обнаружения большого количества свободной жидкости в брюшной полости. Объективно: АД 74/56 мм рт. ст., ЧСС 120 в минуту, Рс 120 в минуту, сатурация 91%, ИП 0,01. Кожные покровы бледные, липкие.","question":"Какая степень кровопотери наиболее вероятна у данного пациента?","correct":"4","distractors":["1","2"]},{"id":42,"scenario":"Больной 45 лет с диагнозом острый деструктивный панкреатит, забрюшинная флегмона, сепсис, септический шок, находится в ОРИТ 5-е сутки. Состояние тяжелое. 4-е сутки ИВЛ с протективными параметрами. Респираторный индекс 220. SOFA 7 баллов. Проводится вазопрессорная поддержка норадреналином 0,5 мкг/кг/мин. В течение 3-х суток получает цефеперазон/сульбактам и линезолид. На этом фоне сохраняется лихорадка до 38,5 С, нарастает лейкоцитоз с 12 до 21*10^9/л, 2 % метамиелоцитов, прокальцитонин 19 пг/мл. Флегмона дренирована, в повторной операции не нуждается. Проводится сеанс продленной вено-венозной гемодиафильтрации. Результаты бактериологических анализов в работе.","question":"Какая тактика антимикробной терапии наиболее целесообразна в данной ситуации?","correct":"Смена антимикробной терапии с учетом риска наличия полирезистентных возбудителей","distractors":["Продолжение проводимой антимикробной терапии под контролем лабораторных показателей","Смена антимикробной терапии после получения результатов посевов биосред и определения чувствительности к антибиотикам"]},{"id":43,"scenario":"Больной 45 лет, рост 180 см, масса тела 91 кг. С диагнозом острый деструктивный панкреатит, забрюшинная флегмона, сепсис, септический шок, находится в ОРИТ 5-е сутки. Состояние тяжелое. 4-е сутки ИВЛ с протекти ","distractors":["100 мл за 2 часа","300 мл за 2 часа"]},{"id":48,"scenario":"Пациент 56 лет находится в отделении реанимации после оперативного вмешательства по поводу тупой травмы живота в следствии ДТП. Сознание ясное. Гемодинамика стабильная. АД 130/85 мм рт.ст. ЧСС 80 в минуту. Диурез по катетеру Фолея. Моча светлая, прозрачная. Темп диуреза составляет 15 мл/ч. Планируется остеосинтез костей таза. С целью определения риска прогрессирования ОПП планируется провести стресс - тест фуросемидом. Ранее терапию диуретиками пациент не получал.","question":"Какая дозировка фуросемида необходима данному пациенту для проведения стресс - теста, с учетом анамнеза?","correct":"1 мг/кг","distractors":["0.5 мг/кг","1.5 мг/кг"]},{"id":49,"scenario":"Пациент 70 лет. В анамнезе: острый инфаркт миокарда 2016 года, гипертоническая болезнь, хроническая язва 12-перстной кишки. 2-е суток назад после погрешности в диете появилась резкая боль в верхних отделах живота, рвота, субфебрильная температура. Сегодня выраженная слабость, нарушение сознания. При поступлении: заторможен, кожные покровы мраморные, акроцианоз, прохладные, симптом \" белого пятна\" 4 сек, ЧД 24 в мин, сатурация пульсоксиметром не определяется, АД 70/40 мм рт. ст., ЧСС 124 в мин, ритм синусовый, единичные желудочковые экстрасистолы. Живот напряжен, вздут, болезненный при пальпации во всех отделах, при катетеризации мочевого пузыря мочи не получено. Лабораторно: гемоглобин 165 г/л, гематокрит 58%, лейкоциты 22*10^9/л, п/я 14 %, лактат 12 ммоль/л, рН 7,2, ВЕ -16 ммоль/л, НСО3- 10 ммоль/л, рСО2 28 мм рт ст, раО2 75 мм рт ст, прокальцитонин 12,8 нг/мл, креатинин 560 мкмоль/л, мочевина 22 ммоль/л, калий 5,4 ммоль/л. По результатам обследования перфорация двенадцатиперстной кишки, выполнено оперативное лечение, в послеоперационном периоде ИВЛ, норадреналин 0,9 мкг/кг/мин, мочи 200 мл.","question":"Какая тактика экстракорпоральной терапии наиболее целесообразна?","correct":"ЛПС- сорбция + продленная гемодиафильтрация","dist ует использовать для расчета нутриционных потребностей у данного пациента?","correct":"Скорректированная масса тела","distractors":["Идеальная масса тела","Фактическая масса тела"]},{"id":102,"scenario":"Пациент 18 лет. Вес при поступлении 75 кг, ИМТ 19,9. Поступил с диагнозом ОРВИ, респираторный дистресс-синдром, ДН 3 ст. Интубирован в течение 1-го часа пребывания, переведен на ИВЛ. FiO2 85%, раО2 54 мм рт. ст. SaО2 94%. Гемодинамика поддерживается норадреналином 0,25 мкг/кг/мин. Гипертермия 38-39 °С.","question":"Какая программа нутритивной поддержки наиболее рациональна в данном случае?","correct":"Проводить нутритивную поддержку после достижения paO2>60 в виде зондового питания","distractors":["Проводить энтеральное зондовое питание со стандартных объемов, вне зависимости от FiO2","Проводить нутритивную поддержку в стандартных дозах только после отмены дофамина"]},{"id":103,"scenario":"Мужчина 42 лет, доставлен в ОРИТ с направительным диагнозом: кома неясного генеза. Найден в подъезде, рядом использованные шприцы. Доставлен на ИВЛ. Объективно: уровень сознания по ШКГ 5 баллов, кожный покров бледный, влажный, прохладный на ощупь. Инъекционные свищи в обеих паховых областях. Зрачки равные, узкие, не реагируют на свет. Мышечный тонус диффузно снижен. АД 65\\20 мм рт. ст., ЧСС 40 в мин. Живот не вздут, перистальтика замедленная. Катетеризирован мочевой пузырь, моча темная, 150 мл.","question":"Какой диагноз наиболее вероятен?","correct":"Отравление опиоидными наркотическими веществами","distractors":["Отравление каннабиоидами","Отравление ГОМК"]},{"id":104,"scenario":"Мужчина 42 лет, доставлен в ОРИТ с направительным диагнозом: Токсическое действие неуточненного вещества. Со слов прохожих, найден на лавке около подъезда, рядом использованные шприцы. Объективно: уровень сознания по ШКГ 10 баллов, кожный покров бледный, акроцианоз, влажный. Инъекционные свищи в обеих паховых областях. Зрачки равные, узкие, не реагируют на свет. ЧД 10 в минуту, SpO2 91%, на фоне инсуффляция увлаженного кислорода 96%, АД 95/20 мм рт. ст., ЧСС 62 в мин. Живот не вздут, перистальтика замедленная. Катетеризирован мочевой пузырь, моча темная, 200 мл.","question":"Определите тактику лечения?","correct":"Внутривенно ввести налокосон 0,4 мг","distractors":["Налоксон противопоказан, инфузионная терапия","Интубация трахеи, ИВЛ"]},{"id":105,"scenario":"У мужчины 40 лет появилась слабость в ногах и мышечные боли. В течение нескольких дней слабость в ногах усилилась, возникло онемение в конечностях по типу \"носков\" и \"перчаток\". На четвертый день заболевания пациент не смог встать с кровати, после чего вызвал скорую и был госпитализирован в отделение нейрореанимации с подозрением на ОНМК. При осмотре 15 баллов по ШКГ, менингеальной симптоматики нет, нижний глубокий парапарез, сухожильные рефлексы с ног не вызываются, а с рук угнетены, нарушение чувствительности верхних и нижних конечностей. Трехглотковую пробу выполнил, но, по словам пациента, глотает с трудом. При прицельном сборе анамнеза удалось выяснить, что примерно 10 дней назад переболел вирусной инфекцией. В лабораторных показателях без отклонений. На КТ головного мозга - без отклонений от нормы.","question":"Какая терапия наиболее показана данному пациенту?","correct":"Человеческий иммуноглобулин","distractors":["Применение пульсовых доз кортикостероидов","НПВС и плазмаферез"]},{"id":106,"scenario":"Мужчина 34 года, заболел вчера, когда повысилась температура тела 39,4°С, появилась головная боль, боли в мышцах и суставах, боли в горле при глотании, дважды была рвота, нарастала слабость. К вечеру появились боли в правой половине живота, метеоризм. Стул 3 раза, кашицеобразный. Сегодня лихорадка до 39°С, боли в животе усилились и локализовались в правой подвздошной области. При осмотре: напряжение мышц передней брюшной стенки и нечетко выраженные симптомы раздражения брюшины. Определяется легкая желтушность склер, увеличение печени на 1,5 см и ее болезненность. АД 90/45 мм рт. ст., ЧСС 126 в мин. Лабораторно: лейкоциты 14*10^9/л, нейтрофилез с палочкоядерным сдвигом. Эпидемиологический анамнез: проживает в собственном доме сельского типа, часто употребляет салаты из овощей, хранящиеся в погребе, где обитают мыши.","question":"Какой диагноз наиболее вероятен?","correct":"Иерсиниоз, абдоминальная форма","distractors":["Острый аппендицит","Кишечная инфекция неясной этиологии"]},{"id":107,"scenario":"Мужчина 40 лет, доставлен в отделение реанимации инфекционной больницы. Из анамнеза (со слов жены): заболел остро, 11 дней назад. Сухой кашель, сухость во рту, резь в глазах, лихорадка до 39,2°С. За помощью не обращался, принимал парацетамол. На 4 сутки появилась сыпь на лице, затем распространившись по всему телу за два дня. Сегодня утром перестал вступать в контакт. За пределы города не выезжал. Работает электриком в детском саду. Сведений о прививках нет. При поступлении: состояние тяжелое. По всему телу элементы угасающей сыпи. Температура 39,0°С. ЧСС 134 в мин., АД 100/52 мм рт. ст. Анализ ликвора: бесцветный, цитоз 652 клетки в мкл, нейтрофилы 14 %, лимфоциты 82 %, лактат 4 ммоль/л, белок 2,2 г/л.","question":"Какой диагноз наиболее вероятен?","correct":"Корь, осложненная энцефалитом","distractors":["Менингококковая инфекция, менингит","Клещевой энцефалит"]},{"id":108,"scenario":"Мужчина 32 года, доставлен в отделение реанимации. Из анамнеза (со слов скорой помощи): найден вечером дома без сознания, соседями по общежитию. Утром жаловался на боли в горле, головную боль, боль в шее. Работает на стройке. Сведений о прививках нет. При поступлении: состояние крайне тяжелое. Уровень сознания 9 баллов по ШКГ. Ригидность затылочных мышц. По всему телу геморрагическая, звездчатая сыпь, неправильной формы, с уплотнением в центре. Температура 39,4. ЧСС 142 в мин., АД 104/52 мм рт. ст. Исследование спинномозговой жидкости: цвет - белесоватый, прозрачность - мутный. Белок 2,6 г/л, цитоз 3200 в мкл, нейтрофилы 98 %, лимфоциты 2 %, лактат 4,05 ммоль/л, глюкоза 0,2 ммоль/л.","question":"Какое дополнительное исследование необходимо для наиболее быстрого установления этиологии?","correct":"Реакция латекс-агглютинации ликвора","distractors":["Полимеразная цепная реакция крови","Бактериологическое исследование ликвора"]},{"id":109,"scenario":"Женщина 35 лет. Поступила в реанимационное отделение с жалобами на одышку, гипертермию до 38,0 С, кашель с трудноотходящей мокротой. Заболела 14 дней назад, ухудшение состояния постепенное, самостоятельно принимала парацетамол, ацетилцистеин, в течение последних 5 дней начала прием амоксициллина, без эффекта. В связи с нарастанием одышки и слабости вызвала СМП. За пределы России не выезжала, контакты с больными людьми отрицает. Из анамнеза: ВИЧ инфекция в течении 8 лет. На учете в МГЦ СПИД в течение 7 лет. Со слов больной: иммунный статус сдавала давно. Низкая приверженность к АРТ. Объективно: АД 115/80 мм рт.ст. ЧСС 122 в мин., ЧД 30 в мин., SpO2 - 88%, температура тела 37,2. По данным рентгенографии ОГК: двусторонняя интерстициальная пневмония. Экспресс тест на Covid19 - отрицательно.","question":"Какой диагноз наиболее вероятен?","correct":"Пневмоцистная пневмония","distractors":["Пневмококковая пневмония","Вирусная пневмония"]},{"id":110,"scenario":"Мужчина 36 лет. Доставлен в ОРИТ, без сознания, после серии судорожных припадков. Из анамнеза со слов сопровождающих: ВИЧ инфекция в течение 12 лет. Низкая приверженность к АРТ. Объективно: уровень сознания 9 баллов по ШКГ. Снижение сухожильных рефлексов справа. АД 115/80 мм рт. ст., ЧСС 102 в мин, ЧД 20 в мин, SpO2 97 %. Температура тела 38,0 °С. Лабораторное исследование спинномозговой жидкости: цвет опалесцирующий, прозрачность неполная. Цитоз 6 клеток в мкл, белок 0,9 г/л, лактат 2,4 ммоль/л. По данным МРТ головного мозга: объемные образования неоднородной структуры в левой лобно-теменной области в базальных структурах слева, неправильной округлой формы, размерами 2,2х1,8х1,8 см и 1,3х1,4х1,1 см с неровными и нечеткими контурами, левый боковой и 3 желудочки с выраженной зоной перифокального отека, смещение срединных структур вправо на 0,3 см.","question":"Какой диагноз наиболее вероятен?","correct":"Токсоплазмоз","distractors":["Менингит","Субарахноидальное кровоизлияние"]},{"id":111,"scenario":"Мужчина 38 лет, доставлен в отделение реанимации инфекционной больницы. Из анамнеза (со слов скорой помощи): заболел 6 дней назад, остро, когда появилась головная боль, тошнота, рвота, жидкий стул, озноб с подъемом температуры до 39,0 °С. Принимал парацетамол, с неудовлетворительным эффектом. Подъемы температуры до 39,0-39,5 °С, чаще во второй половине дня в течение 6 дней. Отмечал сильную потливость при снижении температуры. Эпидемиологический анамнез: 10 дней назад вернулся из Танзании. Сведений о прививках нет, профилактическое лечение не получал. При поступлении: состояние тяжелое. Уровень сознания 12 баллов по ШКГ. Кожные покровы бледные, чистые, лимфоузлы без особенностей. Температура 37,5°С. ЧСС 126 в мин., АД 100/52 мм прт. ст.. Живот умеренно вздут, увеличение печени +5 см и селезенки +3 см. Моча концентрированная, темп диуреза снижен.","question":"Какой диагноз наиболее вероятен?","correct":"Тропическая малярия","distractors":["Лептоспироз","Менингит"]},{"id":112,"scenario":"Женщина 57 лет 2 сутки находится в отделении терапии с диагнозом внебольничная пневмония, получает терапию левофлоксацином в комбинации с кларитромицином. В течение дня пациентка стала отмечать опущение век, двоение, нарушение речи, слюнотечение и поперхивание. Пациентке была выполнена компьютерная томография головного мозга, на которой очагов патологической плотности вещества мозга выявлено не было. С подозрением на стволовой инсульт пациентка была переведена в отделение реанимации. При прицельном распросе выяснилось, что подобная симптоматика, только менее выраженная, отмечалась и вчера вечером, а к утру все регрессировало.","question":"Какой лабораторный анализ поможет установить диагноз?","correct":"Определение уровня аутоантител к ацетилхолиновым рецепторам","distractors":["Исследование сыворотки на наличие антител к ADAMTS–13","Определение уровня натрийуретического пептида типа В"]},{"id":113,"scenario":"Больная 38 лет, в ОРИТ 11-е сутки. Болезнь Крона, перфорация язвы тонкой кишки, было выполнено ушивание острой язвы тонкой кишки. За время лечения трижды выполнялась релапаротомия по поводу новых эпизодов перфорации тонкой кишки. Проводилась интенсивная терапия, парентеральное питание. Накануне интраоперационно положительная динамика, вялая перистальтика, стихающий перитонит, лапаростома ликвидирована. В послеоперационном периоде пациентка переведена на самостоятельное дыхание. На утро сознание ясное. АД 110/58 мм рт.ст., синусовый ритм, ЧСС 110/мин. ЧД 18 в мин, инсуффляция увлажненного кислорода через носовые канюли 2 л/мин, SpO2 97%. Температура тела 37,2. Диурез за последние 6 часов 120 мл/ч. По дренажам скудное серозно-геморрагическое отделяемое. В зонд введено 800 мл глюкозо-солевой смеси, оттекло 200 мл светлого желудочного отделяемого.","question":"Какова тактика нутритивной поддержки на момент осмотра?","correct":"Начать введение питательной смеси в назогастральный зонд, продолжить парентеральную нутритивную поддержку","distractors":["Начать введение питательной смеси энтерально, продолжить парентеральную нутритивную поддержку","Энтерально голод, продолжить парентеральное кормление"]},{"id":114,"scenario":"Больная 38 лет, в ОРИТ 11-е сутки. Болезнь Крона, перфорация язвы тонкой кишки, было выполнено ушивание острой язвы тонкой кишки. За время лечения трижды выполнялась релапаротомия по поводу новых эпизодов перфорации тонкой кишки. Проводилась интенсивная терапия, парентеральное питание. Накануне интраоперационно положительная динамика, вялая перистальтика, стихающий перитонит, лапаростома ликвидирована. В послеоперационном периоде пациентка переведена на самостоятельное дыхание. На утро сознание ясное. АД 110/58 мм рт.ст., синусовый ритм, ЧСС 110/мин. ЧД 18 в мин, инсуффляция увлажненного кислорода через носовые канюли 2 л/мин, SpO2 97%. Температура тела 37,2. Диурез за последние 6 часов 120 мл/ч. По дренажам скудное серозно-геморрагическое отделяемое. В зонд введено 800 мл глюкозо-солевой смеси, оттекло 200 мл светлого желудочного отделяемого.","question":"С какого питательного субстрата надо начинать энтеральное кормление в этом случае?","correct":"Полуэлементная питательная смесь","distractors":["Высококалорическая питательная смесь, обогащенная фармаконутриентами","Питательная смесь с пищевыми волокнами"]},{"id":115,"scenario":"Больная 38 лет, в ОРИТ 11-е сутки. Болезнь Крона, перфорация язвы тонкой кишки, было выполнено ушивание острой язвы тощей кишки. За время лечения четыре раза выполнялась релапаротомия по поводу новых эпизодов перфорации тонкой кишки. Проводилась интенсивная терапия, парентеральное питание. С учетом рецидивирующих перфораций острых язв, дальнейшее оперативное лечение признако есперспективным, принято решение формировать наружный кишечный свищ. В послеоперационном периоде пациентка переведена на самостоятельное дыхание. На утро сознание ясное. АД 110/58 мм рт.ст., синусовый ритм, ЧСС 110/мин. ЧД 18 в мин, инсуффляция увлажненного кислорода через носовые канюли 2 л/мин, SpO2 97%. Температура тела 37,2. Диурез за последние 6 часов 120 мл/ч. По дренажу, подведенному к зоне перфорации тощей кишки отделяемое с примесью тонкокишечного.","question":"Какова тактика нутритивной поддержки на момент осмотра?","correct":"Начать энтеральное питание через интенстинальный зонд, установленный дистальнее зоны перфорации, продолжить парентеральное питание","distractors":["Энтерально голод, продолжить парентеральное кормление","Начать кормление по щадящему столу"]},{"id":116,"scenario":"Пациентка 37 лет, беременность 34 нед., Направительный диагноз: Инсульт, не уточненный как кровоизлияние или инфаркт. Жалобы: тошнота, слабость усилились, отметила затруднение глотания твердой и жидкой пищи, затруднение речи. При распросе родственников выяс решении путем Кесарева сечения под эпидуральной анестезией. На 5 минуте от начала операции у пациентка пожаловалась на головокружение, чувство нехватки воздуха, стала беспокойной. По кардиомонитору ЧСС 127, АД 90/63 мм рт. ст. Одышка до 30 в минуту, цианоз. SpO2 87% . При аускультации-влажные хрипы. Атония матки.","question":"Какие изменения, с наибольшей вероятностью, будут выявлены при проведении чреспищеводной эхокардиографии?","correct":"Выраженная легочная гипертензия","distractors":["Вегетации на клапанах","Отрыв хорды митрального клапана"]},{"id":123,"scenario":"Женщина 36 лет, беременность 39 недель, первая. Со слов пациентки - во время беременности отмечалось многоводие. Принято решение о родоразрешении путем Кесарева сечения под эпидуральной анестезией. На 5 минуте от начала операции у пациентка пожаловалась на головокружение, чувство нехватки воздуха, стала беспокойной. По кардиомонитору ЧСС 127, АД 90/63 мм рт. ст. Одышка до 30 в минуту, цианоз. SpO2 87% . При аускультации-влажные хрипы. Атония матки. По данным КОС: рН 7,19, PaO2 60 мм рт. ст., PaCO 2 59 мм рт. ст.","question":"Какой из перечисленных методов респираторной поддержки наиболее применим в данной ситуации?","correct":"ИВЛ","distractors":["Инсуфляция увлаженного кислорода, прон-позиция","Высокопоточная оксигенотерапия"]},{"id":124,"scenario":"Женщина 27 лет, доставлена в ОРИТ. Анамнез со слов бригады: заболела остро 6 дней назад, когда появилась слабость, тошнота, головная боль, лихорадка до 39°С, озноб, потливость. Стул кашицеобразный, дважды в день, темно-зеленого цвета. Саомтоятельно принимала парацетамол, смекту. Состояние не улучшилось. Сегодня усилилась головная боль, рвота, не приносящая облегчения, неадекватное поведение. Эпидемиологический анамнез: до начала болезни употребляла в пищу яйца, купленные у частных лиц. При осмотре: состояние тяжелое, уровень сознания 11 баллов по ШКГ, периодически эпизоды психомоторного возбуждения. Ригидность затылочных мышц, положительный симптом Кернига. Кожные покровы бледные, сухие. Следы рвоты желчью. Язык сухой, обложен белым налетом. Живот мягкий, пальпируется вздутая урчащая слепая кишка, симптомов раздражения брюшины нет. ЧД 24 в мин., ЧСС 128 в мин., АД 90/45 мм рт. ст.","question":"Какой диагноз наиболее вероятен?","correct":"Генерализованный сальмонеллез, осложненный развитием менингита","distractors":["Менингококковая инфекция, менингит","Инфекционный эндокардит, вторичный гнойный менингит"]},{"id":125,"scenario":"Родственниками была вызвана скорая медицинская помощь к больной 30 лет. К приеду скорой помощи пациентка была без сознания. Со слов родственников: неделю назад больная отметила слабость, головную боль, боли в мышцах, озноб, насморк, светобоязнь, температура до 38,2°С. Принимала парацетамол, пять дней назад появилась сыпь на лице, туловище и конечностях, к вечеру сыпь стала более обильная, появилась боль в затылочной области. На фоне приема антигистаминных препаратов сыпь постепенно исчезла. Сегодня утром вновь поднялась температура до 38,8°С, появилась неадекватность поведения, рвота, судороги. При осмотре: состояние тяжелое, сознание: кома. Кожа чистая. Увеличены затылочные и заднешейные лимфатические узлы. Дыхание самостоятельное, гемодинамика нестабильная, 80/50 мм рт. ст. Живот мягкий. Реакция зрачков на свет снижена, легкая сглаженность носогубной складки слева, ригидность затылочных мышц, положительный симптом Кернига.","question":"Какой предварительный диагноз наиболее вероятен?","correct":"Краснуха, менингоэнцефалит, тяжелое течение","distractors":["Менингококковая инфекция, менингококцемия","Бактериальный менингит"]},{"id":126,"scenario":"Больная 38 лет, в течение двух месяцев, предшествующих заболеванию, находилась в Забайкалье. Заболела на 7-й день после возвращения домой: температура тела до 40°С, появились головная боль, рвота, озноб. На 2-й день озноб повторился, сохранялась высокая лихорадка до 41°С, нарастала слабость. На 6-й день болезни появилась боль в грудной клетке, кровохарканье. При осмотре: состояние тяжелое, оглушение, речь невнятная. Кожный покров бледный, множественные точечные кровоизлияния. Тоны сердца глухие, пульс 140/минуту, АД 70/40 мм рт. ст. Одышка до 45 в минуту, аускультативно жесткое дыхание. Кашель с обильной геморрагической мокротой. Язык обложен густым белым налетом. На левой голени резко болезненная язва размером 3,0-4,0 см, покрытая темным струпом с красно-багровым воспалительным валом вокруг. Из-под струпа проступают скудные гнойно-серозные выделения. В правой паховой области резкая болезненность на месте увеличенного до размера 3,0*4,0 см лимфатического узла.","question":"Какой предварительный диагноз наиболее вероятен?","correct":"Чума, вторично-легочная форма, тяжелое течение","distractors":["Менингококковая инфекция, менингококцемия","Серозный менингит"]},{"id":127,"scenario":"Пациент 69 лет, получает лечение в инфекционном отделении с диагнозом: Грипп, средне-тяжелая форма. Острый бронхит. Фоновое заболевание: последствия ОНМК по ишемическому типу. Проводится противовирусная, антимикробная терапия (Осельтамивир, Левофлоксацин). Исходный неврологический дефицит: левосторонний гемипарез и нарушение речи и глотания. Питание зондовое. Несмотря на терапию отмечено дальнейшее ухудшение состояния: рвота, одышка. Объективно: температура 39,0 °С, сознание глубокое оглушение, струкутра неврологического дефицита прежняя, ЧД 25 в минуту, SpO2 90 %, аускультативно крепитирующие хрипы, больше справа. АД 110/65 мм рт. ст., ЧСС 111 в минуту. Осмотрен реаниматологом, выполнен газовый анализ крови: рН 7,36; РаСО2 32 мм рт. ст; РаО2 65 мм.рт.ст; ВЕ -5 ммоль/л; НСО3 22 ммоль/л; SaO2 91%; лактат 1,7 ммоль/л; Hb 118 г/л; глюкоза 7,0 ммоль/л.","question":"Какое нарушение кислотно-основного состояния возникло в данном случае?","correct":"Компенсированный метаболический ацидоз","distractors":["Частично компенсированный дыхательный ацидоз","Дыхательный алкалоз"]},{"id":128,"scenario":"Пациент 69 лет, 7-е сутки в инфекционном отделении с диагнозом: Внебольничная пневмония. Фоновое заболевание: последствия ОНМК по ишемическому типу. Проводится антимикробная терапия (Амоксициллин/клавулонат, Левофлоксацин). Исходный неврологический дефицит: левосторонний гемипарез и нарушение речи и глотания. В течение 3 дней отмечено появление диареи по 10-15 раз в сутки, зеленый, пенистый. Объективно: температура 37,8 °С, сознание глубокое оглушение, струкутра неврологического дефицита прежняя, ЧД 23 в минуту, SpO2 95 % на фоне низкопоточной оксигенации 10 л/мин. АД 110/65 мм рт. ст., ЧСС 111 в минуту. Вас вызвали на консультацию, вы выполнили газовый анализ крови: рН 7,32; РаСО2 28 мм рт. ст; РаО2- 75 мм.рт.ст; ВЕ - 6 ммоль/л; НСО3- 18 ммоль/л; лактат 3,5 ммоль/л, глюкоза 7,0 ммоль/л.","question":"Какое нарушение кислотно-основного состояния возникло в данном случае?","correct":"Частично компенсированный метаболический ацидоз","distractors":["Частично компенсированный дыхательный ацидоз","Дыхательный алкалоз, компенсированный метаболическим ацидозом"]},{"id":129,"scenario":"Пациент 69 лет, 7-е сутки в инфекционном отделении с диагнозом: Внебольничная пневмония. Фоновое заболевание: последствия ОНМК по ишемическому типу. Проводится антимикробная терапия (Амоксициллин/клавулонат, Левофлоксацин). Исходный неврологический дефицит: левосторонний гемипарез и нарушение речи. В течение 2 дней отмечено появление диареи до 5 раз в сутки. Объективно: температура 38,5 °С, сознание глубокое оглушение, струкутра неврологического дефицита прежняя, ЧД 25 в минуту, SpO2 94 % на фоне низкопоточной оксигенации 10 л/мин. АД 95/55 мм рт. ст., ЧСС 115 в минуту. Живот умеренно вздут, урчание. Лабораторно: лейкоциты 22*10^9/л, гемоглобин 100 г/л, тромбоциты 120*10^9/л, СРБ 301 мг/л, рН 7,32; РаСО2 28 мм рт. ст; РаО2- 75 мм.рт.ст; ВЕ - 6 ммоль/л; НСО3- 18 ммоль/л; лактат 4,5 ммоль/л.","question":"Какое исследование нужно выполнить для подтверждения диагноза?","correct":"Исследование кала на токсины A и B клостридии (Clostridium difficile)","distractors":["Определить концентрацию прокальцитонина","Определить активность эндотоксина в крови"]},{"id":130,"scenario":"Пациент 69 лет, 7-е сутки в инфекционном отделении с диагнозом: Внебольничная пневмония. Фоновое заболевание: последствия ОНМК по ишемическому типу. Проводится антимикробная терапия (Амоксициллин/клавулонат, Левофлоксацин). Исходный неврологический дефицит: левосторонний гемипарез и нарушение речи. В течение 2 дней отмечено появление диареи до 5 раз в сутки. Объективно: температура 38,5 °С, сознание глубокое оглушение, струкутра неврологического дефицита прежняя, ЧД 25 в минуту, SpO2 94 % на фоне низкопоточной оксигенации 10 л/мин. АД 95/55 мм рт. ст., ЧСС 115 в минуту. Живот умеренно вздут, урчание. Лабораторно: лейкоциты 22*10^9/л, гемоглобин 100 г/л, тромбоциты 120*10^9/л, СРБ 301 мг/л, рН 7,32; РаСО2 28 мм рт. ст; РаО2- 75 мм.рт.ст; ВЕ - 6 ммоль/л; НСО3- 18 ммоль/л; лактат 4,5 ммоль/л.","question":"Как изменится режим терапии?","correct":"Добавить Ванкомицин перорально/в зонд","distractors":["Добавить Ванкомицин внутривенно","Добавить метронидазол внутрь"]},{"id":131,"scenario":"В отделение интенсивной терапии поступил пациент 60 лет с гиперазотемией, гиперкалиемией на фоне терминальной стадии хронической болезни почек, у пациента имеется гипертоническая болезнь 3 степени, сахарный диабет, ранее сеансов заместительной почечной терапии не проводилось. Пациенту был начат гемодиализ. В связи с сохраняющейся гиперкалиемией процедура была пролонгирована до 5 часов. Через 5 часов высокопоточного диализа у пациента возникли генерализованные судороги.","question":"С чем вероятнее всего связан судорожный приступ?","correct":"Дизэквилибриум синдром","distractors":["Эпилепсия","Острое нарушение мозгового кровообращения"]},{"id":132,"scenario":"Пациентка 76 лет весом 50 кг с хронической болезнью почек 5 ст., уремической интоксикацией на фоне гипертонической нефропатии. Клинически - энцефалопатия, одышка до 35 в мин, АД 140/90 мм рт. ст., ЧСС 1
