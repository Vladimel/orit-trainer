<title>Тренажёр ОРИТ</title>
<style>
:root{--bg:#F4F2EC;--panel:#fff;--ink:#16262A;--soft:#4B5B5E;--line:#DDD8CB;--teal:#0E6E64;--deep:#0A4F49;--bad:#A93B2B;--badbg:#FBEAE6;--good:#1E7A4C;--goodbg:#E7F3EA;--mono:'SFMono-Regular',Consolas,monospace;--serif:Georgia,'Times New Roman',serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{background:radial-gradient(1200px 600px at 100% -10%,rgba(14,110,100,.08),transparent),var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;min-height:100vh;padding:32px 16px 80px}.wrap{max-width:760px;margin:0 auto}header.top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:28px;border-bottom:1px solid var(--line);padding-bottom:16px;gap:15px}header.top h1{font-family:var(--serif);font-size:22px;margin:0;color:var(--deep)}header.top .sub{font-size:12px;color:var(--soft);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;text-align:right}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px;box-shadow:0 1px 2px rgba(20,30,30,.04),0 8px 24px -18px rgba(20,30,30,.25)}.menu-title{font-family:var(--serif);font-size:25px;margin:0 0 8px;color:var(--deep)}.menu-text{color:var(--soft);margin:0 0 24px}.menu-grid{display:grid;gap:14px}.menu-btn{width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:20px;cursor:pointer}.menu-btn:hover{border-color:var(--teal);background:#F5FAF9}.menu-btn strong{display:block;font-family:var(--serif);font-size:20px;color:var(--deep);margin-bottom:4px}.menu-btn span{color:var(--soft);font-size:14px}.statbar{display:flex;gap:10px;margin-bottom:22px;font-family:var(--mono);font-size:12px;color:var(--soft);flex-wrap:wrap}.chip{background:#fff;border:1px solid var(--line);border-radius:100px;padding:5px 12px}.chip b{color:var(--deep)}.progress-track{height:4px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:28px}.progress-fill{height:100%;background:var(--teal);transition:width .3s}.qnum{font-family:var(--mono);font-size:12px;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}.scenario{font-size:14.5px;color:var(--soft);background:#FAF9F5;border-left:3px solid var(--teal);padding:14px 16px;border-radius:4px;margin-bottom:20px;white-space:pre-wrap}.question{font-family:var(--serif);font-size:19px;font-weight:700;margin:0 0 20px;line-height:1.4}.options{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}.opt{width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:13px 16px;font-size:15px;color:var(--ink);cursor:pointer;font-family:var(--sans);display:flex;gap:10px;align-items:flex-start}.opt:hover:not(:disabled){border-color:var(--teal);background:#F5FAF9}.opt:disabled{cursor:default}.letter{font-family:var(--mono);font-weight:700;color:var(--teal);flex-shrink:0}.opt.correct{border-color:var(--good);background:var(--goodbg)}.opt.correct .letter{color:var(--good)}.opt.wrong{border-color:var(--bad);background:var(--badbg)}.opt.wrong .letter{color:var(--bad)}.opt.dim{opacity:.55}.feedback{display:none;font-size:14px;padding:12px 14px;border-radius:8px;margin-bottom:16px;font-weight:600}.feedback.show{display:block}.feedback.good{background:var(--goodbg);color:var(--good)}.feedback.bad{background:var(--badbg);color:var(--bad)}.controls{display:flex;justify-content:space-between;gap:10px}.control-btn{border-radius:8px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)}.back{background:#fff;border:1.5px solid var(--deep);color:var(--deep)}.next{background:var(--deep);color:#fff;border:none;display:none}.next.show{display:inline-block}.end-card{text-align:center;padding:30px 10px}.score{font-family:var(--serif);font-size:52px;font-weight:700;color:var(--deep);margin:6px 0 4px}.score-label{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);margin-bottom:24px}.end-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.end-actions button{background:#fff;border:1.5px solid var(--deep);color:var(--deep);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer}.end-actions .primary{background:var(--deep);color:#fff}.review-list{text-align:left;margin-top:32px;border-top:1px solid var(--line);padding-top:20px}.review-item{padding:10px 0;border-bottom:1px dashed var(--line);font-size:13.5px;display:flex;gap:10px}.review-item .mark{font-family:var(--mono);font-weight:700;width:18px}.review-item.ok .mark{color:var(--good)}.review-item.no .mark{color:var(--bad)}footer{text-align:center;margin-top:24px;font-size:11.5px;color:var(--soft);font-family:var(--mono)}@media(max-width:560px){body{padding:18px 12px 50px}.card{padding:20px 16px}header.top{align-items:flex-start}.controls{flex-wrap:wrap}.control-btn{flex:1}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style></head><body><div class="wrap"><header class="top"><h1>Тренажёр ОРИТ</h1><div class="sub" id="headerSub">Анестезиология и реаниматология</div></header><div id="stats" style="display:none"><div class="statbar"><div class="chip">Верно: <b id="statCorrect">0</b></div><div class="chip">Неверно: <b id="statWrong">0</b></div><div class="chip">Осталось: <b id="statLeft">0</b></div></div><div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div></div><div class="card" id="app"></div><footer>автономный тренажёр · работает без интернета после загрузки страницы</footer></div>
<script>
const ANESTHESIA_DATA=[{"id":1,"scenario":"Пациент 32 лет, мотоциклист, доставлен в операционную из шокового зала с диагнозом: \"Политравма, ЧМТ, тупая травма живота, перелом правого бедра в средней трети, травматическая ампутация пальцев левой верхней конечности\", для выполнения экстренной лапаротомии после обнаружения большого количества свободной жидкости в брюшной полости.  Объективно: АД 74/56 мм рт. ст., ЧСС 120 в минуту, PS 120 уд/мин, SpO2 91%, ИП 0,01, температура тела 35,2С. Проводится инсуффляция О2 5 л/мин, инфузионная терапия (суммарно 2500 мл). Данные КЩС: рН 7,21, рСО2 26,4 мм рт. ст., АВ 12 ммоль/л,  BE -13,5 ммоль/л, Na 135 ммоль/л, K  5,5 ммоль/л, НСО3 12,0 ммоль/л, лактат 3,2, глюкоза 2,9 ммоль/л.","question":"Какие компоненты, входящие в понятие летальной триады, присутствуют у данного пациента с наибольшей вероятностью?","correct":"Ацидоз, гипотермия, коагулопатия","distractors":["Гипотермия, гипергликемия, тромбоцитоз","Ацидоз, гипертермия, гиперкоагуляция"]},{"id":2,"scenario":"Мужчина 72 лет поступил в операционную для эндопротезирования тазобедренного сустава по причине перелома шейки бедра 16 часов назад. Состояние средней степени тяжести. Сознание ясное. Не принимал пищу в течении 7 часов. Не имеет известных ему аллергических реакций. Страдает ИБС, постоянной формой фибрилляции предсердий. Постоянно принимает ривараксобан и конкор (не принимал терапию последние двое суток).  АД 145/76 мм рт. ст., ЧСС 82-86 в минуту, сатурация 99%.","question":"Какой метод анестезии наиболее безопасен в данном случае?","correct":"Комбинированный эндотрахеальный наркоз","distractors":["Спинальная анестезия","Изолированная блокада бедренного нерва без седации"]},{"id":3,"scenario":"Мужчина 24 лет доставлен в операционную из шокового зала с тяжелой сочетанной травмой. Из анамнеза известно, что пациент сбит автомобилем на пешеходном переходе. Состояние крайне тяжелое, ШКГ 13 баллов, ЧДД 25/мин с инсуффляцией кислорода 8 л/мин, ЧСС 136 уд/мин, АД 68/28 мм рт. ст., SpO2 не определяется. Кожные покровы бледные, правая нижняя голень травматически ампутирована на уровне средней трети - наложен жгут на правое бедро. По данным УЗИ ОБП: большое количество свободной жидкости в брюшной полости. По данным рентгенографии ОГК: перелом 7, 8, 9 ребра справа, легкие без признаков пневмоторакса. В левом предплечье установлен венозный катетер, с момента поступления в стационар введено 3500 мл кристаллоидов, морфин 10 мг, транексамовая кислота 1000 мг. Общий анализ крови: гемоглобин 51 г/л, гематокрит 15%, тромбоциты 20х10^9/л.  Определена группа крови А+. Принято решение выполнить хирургическое вмешательство на брюшной полости и первичную хирургическую обработку культи правой голени по экстренным показаниям.","question":"Какая коррекция тактики ведения пациента до подачи в операционную наиболее уместна в данном случае?","correct":"Ограничить инфузию кристаллоидных растворов","distractors":["Увеличить объем инфузии кристаллоидов до полной нормализации АД","Начать инфузию вазопрессоров для быстрой нормализации АД до операции"]},{"id":4,"scenario":"Пациент 46 лет с диагнозом ЧМТ поступил в ОРИТ, где проводилась седация и ИВЛ в режиме гипервентиляции в течение одного часа, после чего для проведения экстренной декомпрессивной трепанации черепа пациент подан в операционную. Показатели электролитов крови:  K + 2,2 ммоль/л,  Na + 136 ммоль/л и  Cl  - 115 ммоль/л. Газовый состав артериальной крови:   PaO  2  – 95  мм рт. ст.  PaCO  2  – 25 мм рт. ст. На ЭКГ, снятой перед подачей в операционную:уплощение зубца Т, депрессия сегмента ST, увеличение амплитуды зубца Р и удлинение интервала PQ.","question":"Что является наиболее вероятной причиной изменений ЭКГ?","correct":"Гипокалиемия","distractors":["Гиперкалиемия","Гипомагниемия"]},{"id":5,"scenario":"Пациенту 44 лет, находящемуся на стационарном лечении в отделении неврологии выставлен диагноз Острый аппендицит. Предстоит экстренная операция Аппендэктомия. При осмотре анестезиологом АД \\=110/60 мм рт.ст., ЧСС\\=88 уд/мин., ЧД\\=18, SpO2\\=98%. Из анамнеза известно, что пациент длительное время страдает от дистрофической миотонии, кардиомиопатиии. Вы планируете проведение комбинированной общей анестезии.","question":"Какой вид интраоперационного гемодинамического мониторинга наиболее целесообразен в данной ситуации?","correct":"Инвазивное измерение артериального давления","distractors":["Неинвазивное измерение АД осциллометрическим методом","Катетеризация легочной артерии (катетер Свана-Ганца)"]},{"id":6,"scenario":"Женщине 41 года произведено удаление невриномы слухового нерва под тотальной внутривенной анестезией пропофолом. Операция длилась 12 часов, кровопотеря составила 500 мл. После операции она переведена в ОРИТ, экстубирована, дыхание адекватное, неврологического дефицита нет. Витальные функции в норме. Анализ КОС показывает pH\\= 7,30, PaCO 2   42 мм рт. ст., PaO 2  150 мм рт. ст., на ингаляции кислорода, BE\\= – 4, Na\\=143 мэкв /л, K\\=3 мэкв / л, Cl\\=115 мэкв / л, HCO 3 \\=20 мэкв /л.","question":"Что из перечисленного является наиболее вероятной причиной изменений кислотно-основного состояния у данной пациентки?","correct":"Интраоперационная инфузия 0,9% раствора NaCl","distractors":["Гиповентиляция во время анестезии","Лактат-ацидоз на фоне гиповолемии"]},{"id":7,"scenario":"Пациенту 59 лет проводится операция – верхняя лобэктомия слева по поводу образования легкого. Из анамнеза известно, что пациент страдает хронической обструктивной болезнью легких, постоянно получает бронхолитическую терапию, курит более 40 пачка-лет. Операция проходит в условиях однолегочной вентиляции, состояние пациента во время операции стабильное. По окончании операции, пациент экстубирован в операционной. После экстубации пациент дышит самостоятельно, адекватно,  SpO 2 при дыхании атмосферным воздухом 95%.  Сразу после пробуждения на кардиомониторе отмечается фибрилляция предсердий с частотой 140-170 ударов/минуту, АД снижается до 70/30 мм.рт.ст. Пациент заторможен, перестал отвечать на вопросы.","question":"Какая оптимальная тактика лечения пациента?","correct":"Проведение синхронизированной кардиоверсии","distractors":["Введение амиодарона внутривенно капельно","Выполнение вагусных проб"]},{"id":8,"scenario":"Женщина, 53 года, на протяжении последних 2х лет страдает биполярным расстройством, постоянно принимает препараты лития. Ей проводится операция – тотальное эндопротезирование тазобедренного сустава под спино-эпидуральной анестезией. Во время операции пациентка в сознании. Интраоперационно она начинает жаловаться на дискомфорт за грудиной. По кардиомонитору ЭКГ отмечаются нерегулярные расширенные комплексы – полиморфная желудочковая тахикардия (  Torsade  de  pointes  ). АД 110/70 мм.рт.ст.","question":"Введение какого препарата оптимально в этой ситуации?","correct":"Магния сульфат","distractors":["Атропин внутривенно","Верапамил внутривенно"]},{"id":9,"scenario":"Планируется проведение лапароскопической аднексэктомии женщине 32 лет. Пациентка наблюдается у кардиолога по поводу синдрома удлиненного  QT , принимает ежедневно 5 мг бисопролола. Из анамнеза известно, что у женщины в прошлом была остановка кровообращения, за последний год отмечает два эпизода синкопальных состояний.","question":"Какова оптимальная тактика ведения пациентки перед операцией?","correct":"Имплантация кардиовертера-дефибриллятора","distractors":["Отмена бисопролола перед операцией","Проведение операции без предоперационной консультации кардиолога"]},{"id":10,"scenario":"Пациент 43 лет, 70 кг плановая холецистэктомия. Наркозный аппарат (с поднимающимися мехами) проверен, прошел все тесты, включая тест утечки. После индукции анестезии и интубации трахеи установлены параметры ИВЛ: дыхательный объем - 600 мл  и частота дыхания - 10/мин., PEEP\\=+4 см Н2О. Показатели газообмена после интубации: SpO2 100%, etCO2 35 мм рт. ст. Давление в системе разводки газов нормальное. Спустя несколько минут анестезиолог заметил, что во время выдоха   мехи в прозрачном цилиндре не поднимаются до необходимого уровня. Вскоре сработала тревожная сигнализация разгерметизации","question":"Какова наиболее вероятная причина?","correct":"Недостаточный поток свежего газа","distractors":["Утечка в дыхательном контуре наркозного аппарата","Неисправность клапана вдоха"]},{"id":11,"scenario":"Мужчине 55 лет с недавно возникшей резистентной к терапии артериальной гипертензией проводится  плановое вмешательство по поводу стеноза левой почечной артерии. Комбинированный эндотрахеальный наркоз. АД  135/  90 мм рт. ст.,ЧСС 72 в мин, диурез по катетеру Фолея, моча светлая, прозрачная. Хирург сообщает, что собирается наложить зажим на аорту в супраренальном отделе.","question":"Какие эффекты следует ожидать?","correct":"Брадикардия, гипертензия, уменьшение скорости диуреза","distractors":["Тахикардия, гипотензия, увеличение диуреза","Брадикардия, гипотензия, полиурия"]},{"id":12,"scenario":"Пациент 37 лет доставлен в операционную для выполнения остеосинтеза локтевой кости пластиной верхней конечности. После проведенной блокады плечевого сплетения надключичным доступом появились жалобы на затруднение дыхания. Объективно: АД 147/78 мм рт. ст. Сатурация 91%. ЧДД 25 в минуту. По УЗИ грудной клетки определяется  бар код в М-режиме  над поверхностью левого легкого и \"морской берег\" справа.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Пневмоторакс слева","distractors":["Правосторонний парез диафрагмального нерва","Синдром Горнера"]},{"id":13,"scenario":"Мужчина 65 лет поступил в стационар для планового некардиохирургического вмешательства. Сопутствующий диагноз: ИБС. СН 3 ФК, ХСН 2а ФК 2. Гипертоническая болезнь 2 стадии, 2 степени, риск ССО 4.","question":"Какое исследование необходимо провести для оценки риска неблагоприятных кардиальных событий в периоперационном периоде?","correct":"Определение натрийдиуретического пептида типа В","distractors":["Определение уровня тропонина Т исходно","Проведение стресс-ЭхоКГ с добутамином"]},{"id":14,"scenario":"Мужчина, 50 лет. В анамнезе: ожирение  II  степени, выполнена герниопластика в условиях анестезии с применением севофлюрана, фентанила и рокурония в стандартных дозировках. Течение операции и анестезии - без особенностей. При пробуждении пациент удерживает голову в приподнятом состоянии в течение 5 секунд.","question":"Какому индексу  TOF  соответствует способность выполнения пациентом указанного маневра?","correct":"0,6","distractors":["0,4","0,9"]},{"id":15,"scenario":"Мужчина, 20 лет. Выполена аппендэктомия, после экстубации развился выраженый ларингоспазм, успешно купированный введением сукцинилхолина. Сознание ясное, активных жалоб нет. Сложение атлетическое. Показатели гемодинамики, сатурация в пределах нормы, дыхание адекватное.","question":"Повышение настороженности в отношении какого осложнения, обусловленного обструкцией дыхательных путей, является целесообразным в данном случае?","correct":"Отек легких","distractors":["Аспирационная пневмония","Бронхоспазм"]},{"id":16,"scenario":"Мужчина, 60 лет. Данные предоперационного осмотра, анамнез - без существенных особенностей, результаты лабораторно-инструментальных данных - в референтных значениях. Анестезия с применением десфлюрана, фентанила и рокурония в стандартных дозировках, течение анестезии гладкое. Находится в палате пробуждения после выполнения плановой резекции желудка.","question":"Оценка состояния пациента на сколько баллов по шкале  Aldrete  является наиболее убедительным показанием для перевода в хирургическое отделение в данном случае?","correct":"9","distractors":["7","5"]},{"id":17,"scenario":"Пациентка 27 лет с диагнозом: беременность 36 недель. Доставлена в стационар бригадой скорой медицинской помощи с  жалобами на головную боль, повышение артериального давления до 160/100 мм.рт.ст. Артериальное давление 160/95 мм.рт.ст, пульс 76 уд\\мин, сатурация 98%. В общем анализе мочи общий белок  3,5 г/л.  В приемное отделение вызван анестезиолог-реаниматолог. Выставлен диагноз: Тяжелая преэклампсия, пациентка госпитализирована в отделение анестезиологии и реанимации, назначена регламентированная клиническим протоколом терапия (магния сульфат 25% - 48,0 мл со скоростью 4 мл\\час, нифедипин 10 мг 2 раза в сутки, метилдопа 500 мг 4 раза в сутки).","question":"Какова цель назначения пациентке сульфата магния?","correct":"Профилактика судорог","distractors":["Снижение артериального давления","Токолиз (расслабление миометрия)"]},{"id":18,"scenario":"Пациентка 26 лет поступила в акушерский стационар с диагнозом 38 недель и регулярной родовой деятельностью. Для проведения эпидуральной аналгезии вызван анестезиолог. Сопутствующих заболеваний нет, в общем анализе крови гемоглобин 123 г\\л, эритроциты 3,48 10х12\\л, гематокрит 37%, тромбоциты 89 х10х9\\л. С первой попытки выполнена установка эпидурального катетера. Течение родов без осложнений. На 2 сутки после родов пациентка предъявила жалобы на непроизвольное неконтролируемое мочеиспускание, парестезии и слабость в обеих нижних конечностях.","question":"Какой диагноз наиболее вероятен у данной пациентки?","correct":"Эпидуральная гематома","distractors":["Транзиторный неврологический синдром (TNS)","Постпункционная головная боль"]},{"id":19,"scenario":"У пациентки 42 лет произошли 4 роды через естественные родовые пути, в 3 периоде родов в связи с задержкой частей последа развилось кровотечение, вызван анестезиолог, проведено ручное отделение плаценты и выделение последа, объем кровопотери составил 1000 мл. Начата инфузионная терапия, утеротоники. Консервативная терапия без эффекта, кровотечение продолжается,  принято решение о хирургическом гемостазе. На момент оперативного вмешательства объем кровопотери составил 1500 мл, выполнен хирургический гемостаз.","question":"Какой объем свежезамороженной плазмы необходим в данной ситуации?","correct":"15-20 мл\\кг","distractors":["5-10 мл/кг","25-30 мл/кг"]},{"id":20,"scenario":"Пациентка 38 лет с диагнозом: 1 своевременные роды в головном предлежании на 1 сутки после родов предъявляет жалобы на головную боль, невозможность встать с кровати, парестезии в нижних конечностях. Сопутствующих заболеваний нет. Лабораторные данные в пределах референсных значений. АД 90/62 мм рт ст, пульс 72 уд\\мин, сатурация 98%, температура 36,8С. Из анамнеза: метод обезболивания родов эпидуральная аналгезия. Ввиду технических сложностей пункция выполнена с 3 попытки.","question":"Какой диагноз наиболее вероятен у данной пациентки?","correct":"Постпункционная головная боль","distractors":["Тяжелая преэклампсия","Тромбоз венозного синуса головного мозга"]},{"id":21,"scenario":"Пациентка 32 года, беременность 29 недель. Доставлена бригадой скорой медицинской помощи  из дома с жалобами на головную боль, повышение артериального давления до 150/90 мм.рт.ст., выраженную боль в эпигастральной области, носовое кровотечение. Из анамнеза известно о приеме препарата кардиомагнил в дозе 75 мг -1 раз сутки в течении 45 дней  по назначению врача женской консультации.  При поступлении в стационар АД-170/100 мм.рт.ст, ЧСС-85 уд.мин., SpO2-98%.   Лабораторно в ОАК отмечается снижение  PLT-76-10*9/л.","question":"Какой диагноз наиболее вероятен у данной пациентки?","correct":"Тяжелая преэклампсия","distractors":["HELLP-синдром","Острый жировой гепатоз беременных"]},{"id":22,"scenario":"У пациента 25 лет (ASA I) во время плановой лапароскопической герниопластики на фоне стабильного течения анестезии севофлураном (1,0 МАК), АД \\= 110/70 мм рт. ст.; ЧСС \\= 72 уд в 1 мин; SpO2 \\= 100% , ETCO2\\=35 мм рт.ст. возникло резкое снижение SpO2 до 90%. Аускультативная картина над легкими – без изменений.  Вы попросили хирурга временно приостановить операцию и десуфлировать газ из брюшной полости. Одновременно с этим, взяли пробу артериальной крови для определения газового состава.","question":"Какому PaO2 может соответствовать данный показатель SpO2?","correct":"60-64 мм рт. ст.","distractors":["80-85 мм рт. ст.","40-45 мм рт. ст."]},{"id":23,"scenario":"Вы проводите общую анестезию пациенту 65 лет во время операции каротидной эндартеректомии. Витальные показатели: АД \\=110/60 мм рт.ст., ЧСС 68 уд в 1 мин,, ЭКГ - синусовый ритм, SpO2 \\=100%, ,ETCO2\\=35 мм рт.ст. (кривая капнограммы нормальной формы) t тела \\=36,7 град. по Цельсию. Кроме стандартного мониторинга Вы используете мониторинг неивназивной оксиметрии головного мозга. Этот вид мониторинга определяет насыщение гемоглобина кислородом.","question":"В каком из перечисленных видов крови церебральный оксиметр определяет насыщение гемоглобина кислородом?","correct":"В артериальной, венозной и капиллярной крови","distractors":["Только в артериальной крови","Только в венозной крови"]},{"id":24,"scenario":"Вы проводите общую анестезию пациенту 70 лет во время операции каротидной эндартеректомии. Показатели витальных функций стабильные АД \\=110/60 мм рт.ст. (интервал автоматического измерения АД \\=5 мин.), ЧСС 68 уд в 1 мин, ЭКГ - синусовый ритм, SpO2 \\=100%, ,ETCO2\\=35 мм рт.ст. (кривая капнограммы нормальной формы) t тела \\=36,7 град. по Цельсию. Кроме стандартного мониторинга Вы используете неинвазивную оксиметрию головного мозга. Этот вид мониторинга определяет насыщение гемоглобина кислородом (rSo2). Во время данной анестезии этот монитор показывает нормальное значение.","question":"Какой показатель rSo2 соответствует нормальному значению?","correct":"70%","distractors":["95%","40%"]},{"id":25,"scenario":"Пациентка 19 лет. Плановое оперативное вмешательство по поводу коррекции сколиоза. Анестезия поддерживается севофлураном. Всего было введено 0,3 мг фентанила. Примерно через 30 мин от начала операции у пациентки развилась тахикардия, которая не реагирует на болюс внутривенных жидкостей или внутривенное введение фентанила. EtCO2 составляет 54 мм рт. ст., несмотря на достаточную вентиляцию, а температура зарегистрирована как 39°C. Подозревается злокачественная гипертермия. Препарат дантролен не доступен.","question":"Что из перечисленного ниже, с наибольшей вероятностью, является первым шагом в немедленном лечении данного пациента?","correct":"Прекратить подачу севофлурана, гипервентилировать 100% О2","distractors":["Введение дантролена внутривенно 2,5 мг/кг","Наружное охлаждение пациента"]},{"id":26,"scenario":"Пациентка 29 лет. Страдает ожирением (ИМТ 41). Указаний на сопутствующую патологию сердечно-сосудистой или дыхательной систем нет. Проведена плановая бариатрическая операция (лапароскопия, гастрошунтирование). Вскоре после экстубации у пациентки развился тяжелый ларингоспазм, который был купирован внутривенным введением пропофола и CPAP через лицевую маску. Несмотря на то, что проходимость верхних дыхательных путей восстановлена SpO2  не поднималась выше 88-90%, при подаче 100% кислорода через лицевую маску.  SpO2 поднялась до 99% через 2 часа СРАР-терапии и применения диуретиков.","question":"Что из перечисленного ниже является наиболее вероятным диагнозом в данном случае?","correct":"Постобструктивный отек легких","distractors":["Анафилактический отек Квинке","Кардиогенный отек легких"]},{"id":27,"scenario":"Пациентка 53 лет. Экстренная лапаротомия по поводу внутрибрюшного кровотечения. Пациентка страдает ожирением с ИМТ 42. После индукции центральный венозный катетер вводят через правую подключичную вену после двух неудачных попыток катетеризации внутренней яремной вены. Примерно через 30 минут от начала процедуры наблюдается повышение  Ppeak  с 21 до 40 см  H  2  O  и ЧСС до 128 уд. в мин, а насыщение кислородом снижается с 99% до 88%. При аускультации: ослабление дыхательных шумов справа. При осмотре обращает на себя внимание выбухание вен шеи.","question":"Какая тактика в лечении этой пациентки наиболее предпочтительна?","correct":"Пункция и дренирование плевральной полости","distractors":["Экстренная санационная бронхоскопия","Углубление анестезии и усиление миорелаксации"]},{"id":28,"scenario":"Пациент 68 лет. Планируется остеосинтез локтевого отростка. Пациент страдает инсулинозависимым сахарным диабетом, гипертонией и хронической обструктивной болезнью легких. Последние 6 месяцев дома проводится оксигенотерапия - 4 л/мин 5-6 часов в день. При осмотре: АД 150/92 мм рт. ст., ЧСС 88 уд/мин, SpO2 92% при дыхании атмосферным воздухом.","question":"Какой вид анестезиологического пособия из перечисленных ниже нежелателен для данного пациента?","correct":"Блокада плечевого сплетения межлестничным доступом","distractors":["Спинальная анестезия","Тотальная внутривенная анестезия с ИВЛ"]},{"id":29,"scenario":"Пациент 30 лет. Рост 175 см, вес 85 кг. Подан в операционную для проведения плановой лапароскопической холецистэктомии. В анамнезе аллергическая реакция на антибиотики пенициллинового ряда, характер реакции уточнить не может. После постановки периферического венозного катетера с целью антибиотикопрофилактики введено внутривенно Цефазолин – 2 гр. Через 5 мин пациент жалуется на головокружение, затруднение дыхания. АД снижается со 110/70 мм рт. ст. до 70/40 мм рт. ст., ЧСС 130 уд. в мин, SpO 2  снижается до 90%. Подозревается анафилактический шок. Налажена подача 100% О 2  через лицевую маску. Введено внутримышечно 0,5 мг эпинефрина.","question":"Какая тактика инфузионной терапии наиболее предпочтительна в данном случае?","correct":"Внутривенное введение 1500 мл стерофундина","distractors":["Ограничение объема инфузии до 250 мл","Введение 5% раствора глюкозы 1000 мл"]},{"id":30,"scenario":"Пациентка 37 лет. Соматически не отягощена, физический статус по ASA - I. Планируется комбинированная флебэктомия в амбулаторных условиях. После поступления в стационар отмечается повышенный уровень тревоги.","question":"Какой препарат наиболее предпочтителен для снижения тревоги у данной пациентки?","correct":"Мидазолам 3 мг внутривенно","distractors":["Диазепам 10 мг внутримышечно","Пропофол 20 мг внутривенно"]},{"id":31,"scenario":"Пациентка 31 года. Планируется лапароскопическая герниопластика в амбулаторных условиях. Рост 165, вес 55 кг. 2 года назад перенесла лапароскопическую ап латорных условиях.","question":"Какая тактика, с наибольшей вероятностью, приведет к снижению риска послеоперационной тошноты и рвоты?","correct":"Тотальная внутривенная анестезия пропофолом","distractors":["Ингаляционная анестезия севофлураном","Применение опиоидов длительного действия для анальгезии"]},{"id":35,"scenario":"Мужчина, 25 лет. Поступил в связи с плановым оперативным вмешательством по удалению металлоконструкции из правой ключицы. Выполнена проводниковая анестезия плечевого сплетения межлестничным доступом, введено 20 мг лидокаина. Через 8 минут пациент проявляет беспокойство, предъявляет жалобы на шум в ушах, неприятный привкус во рту, онемение губ и языка.","question":"Что могло послужить повышению концентрации анестетика в плазме крови?","correct":"недиагностированная печеночная недостаточность","distractors":["Случайное внутрисосудистое введение анестетика","Повышенная васкуляризация места инъекции"]},{"id":36,"scenario":"Женщина, 65 лет. В анамнезе: постоянная форма фибрилляции предсердий, нормосистолия. Постоянно принимает апиксабан. За трое суток до оперативного вмешательства апиксабан был отменен, получала НМГ. Выполнена герниопластика в условиях комбинированной эндотрахеальной анестезии, в послеоперационном периоде проводилась продленная эпидуральная анальгезия. Послеоперационное течение гладкое, эпидуральный катетер удален на третьи сутки после оперативного вмешательства.","question":"Через сколько часов после удаления катетера возможно возобновление приема апиксабана пациенткой?","correct":"6","distractors":["24 часа","2 часа"]},{"id":37,"scenario":"Вы проводите плановую анестезию севофлураном пациентке 55 лет (масса тела 75 кг) по поводу лапароскопической холецистэктомии. Течение анестезии стабильное: АД \\=110/60 мм рт.ст., ЧСС \\=68 уд в 1 мин, SpO2 \\=100%, ETCO2 \\=33 мм рт ст, Параметры ИВЛ: ДО \\=500 мл, МВ \\=6 л/мин, ПДКВ \\=5 см водн.ст. На 30-й минуте от начала анестезии вы обратили внимание на внезапный акроцианоз, при  этом пока . Реаниматолог экстренно произвел вмешательство первой линии.","question":"Каково наиболее частое осложнение этого вмешательства?","correct":"Желудочковая тахикардия","distractors":["Острая надпочечниковая недостаточность","Травма легкого"]},{"id":62,"scenario":"Женщина 55 лет находится в  в ОРИТ, в раннем послеоперационном периоде в ответ на введение антибиотика развился анафилактический шок, врач установил диагноз, ввел 1 мл 0,1% р-ра адреналина в/в струйно. У больной развилось нарушение сердечного ритма  - см. ЭКГ. Пульс на крупных сосудах отсутствует. АД не поддается измерению.","question":"Каков первоочередный метод купирования данного  состояния?","correct":"Электроимпульсная терапия","distractors":["Введение атропина 1 мг в/в струйно","Установка временного водителя ритма"]},{"id":63,"scenario":"Мужчина 35 лет доставлен в стационар с диагнозом: \"Анафилактический шок 2 степени\". Через 15-20 минут после употребления в пищу пиццы с морепродуктами у пациента развилось удушье, отек языка, лица, головокружение, слабость. Бригада скорой медицинской помощи зафиксировала АД 70/40 мм рт. ст., ввели в/м адреналин. Через 5 минут АД 100/75 мм рт. ст., синусовая тахикардия 120/мин, удушье менее выражено, в периферический венозный катетер провели инфузию Стерофундина 500 мл.  Доставлен в ОРИТ через 15 минут. При осмотре: возбужден, дезориентирован, АД 110/60 мм рт.ст., ЧСС 110/мин, синусовая тахикардия на ЭКГ, SpO2 90 %, частота дыхательных движений 26/мин, при аускультации - свистящие хрипы. Налажена кислородотерапия.","question":"Что из нижеперечисленного необходимо сделать в первую очередь?","correct":"Начать терапию глюкокортикостероидами: преднизололон 90-120 мг или дексаметазон 8-32 мг в/в капельно","distractors":["Небулайзерная ингаляция раствора адреналина","Повторное введение адреналина в/в 0,01 мг/кг, не более 0,5 мг суммарно в условиях мониторинга сердечной деятельности"]},{"id":64,"scenario":"Женщина 45 лет доставлена бригадой скорой медицинской помощи в стационар с направительным диагнозом: анафилактический шок. Через 15-20 минут после употребления в пищу пирога с орехами у пациентки развилось удушье, отек языка, лица, головокружение, слабость. Бригада скорой медицинской помощи зафиксировала АД 80/55 мм рт. ст., ввели в/м адреналин. Через 5 минут АД 105/75 мм рт. ст., синусовая тахикардия 120/мин, удушье менее выражено, в периферический венозный катетер провели инфузию кристаллоидов 500 мл. Доставлена в стационар через 15 минут. При осмотре в ОРИТ: возбуждена, дезориентирована, АД 80/50 мм рт. ст., ЧСС 120/мин, синусовая тахикардия на ЭКГ, SpO2 90 %, ЧД 28/мин, дистантные свистящие хрипы. Налажена кислородотерапия. Повторно в/в медленно введено 300 мкг адреналина, проведена быстрая в/в инфузия 500 мл кристаллоидов - артериальное давление 110/70 мм рт. ст., ЧСС 100/мин. Введено 120 мг преднизолона в/в капельно в течение 30 минут. Сохраняется одышка до 24/мин, свистящие хрипы по всем легочным полям при аускультации. SpO2 94 % на фоне инсуффляции О2 5 л/мин. КОС: рН 7,44, рСО2 50 мм рт. ст, раО2 68 мм рт. ст.","question":"Какая тактика ведения пациента наиболее правильная в данной ситуации?","correct":"Небулайзерная терапия сальбутамолом","distractors":["Небулайзерная ингаляция раствора адреналина","Небулайзерная ингаляция раствора м-холиномиметиков"]},{"id":65,"scenario":"Больной 65 лет обратился в приемное отделение стационара самотеком с жалобами на выраженную одышку, удушье. Со слов сопровождающей дочери, состояние ухудшилось внезапно: накануне пациент отмечал першение в горле и заложенность носа, сегодня во время прогулки закашлялся и решил использовать подаренный соседкой ингалятор, после ингаляции развилось резкое удушье, отек лица, свистящее дыхание. Ингалятор предоставлен для осмотра – биологически активный препарат, сбор трав. Ранее пациент переносил инфаркт миокарда, страдает гипертонической болезнью, принимает рекомендованную кардиологом терапию, не курит, занимается спортом. Страдает аллергическим ринитом с обо rrect":"Наследственный ангиоотек","distractors":["Ларингоспазм","Бронхиальная астма, тяжелое обострение"]},{"id":76,"scenario":"Больная 24 лет, доставлена в стационар с рнаправительным диагнозом \"Отек Квинке\". На приеме у стоматолога  развились отек лица и шеи, удушье и осиплость голоса при осмотре ротовой полости,  лекарственные средства при этом не вводили. Со слов сопровождающей матери: хроническими заболеваниями не страдает, аллергических реакций не было, но мать больной страдает холодовой крапивницей. При осмотре – больная в сознании, несколько возбуждена, некритична. Выраженный плотный бледный безболезненный отек шеи, лица, век, губ. Кожные покровы бледные, высыпаний нет. Дышит самостоятельно, 24/мин, дистантные шумы на вдохе и выдохе. Сатурация 95% без дополнительной оксигенации. Артериальное давление 100/70 мм рт.ст., ЧСС 110/мин, синусовая тахикардия.","question":"Какой препарат первой линии в данном случае?","correct":"Блокатор рецепторов к брадикинину","distractors":["Глюкокортикостероид","Блокатор Н2-гистаминовых рецепторов"]},{"id":77,"scenario":"Больная 48 лет доставлена в стационар бригадой СМП с направляющим диагнозом (острый живот). Боли в животе схваткообразного характера беспокоят на протяжение 6 часов, начались после удара мячом в живот, стихают и снова усиливаются. Рвота \"зеленью\" 4 раза за 2 предшествующих часа. Никаких лекарств постоянно не принимает, хронические заболевания – артериальная гипертензия, сообщает об  аллергии на капотен в виде отека лица, языка. В приемном отделении осмотрена хирургом, направлена в экстренную операционную. Интраоперационно – плотный отек участка тонкой кишки с полным перекрытием ее просвета, дилятация выше расположенных участков тонкой кишки, асцитический выпот. Выполнена резекция измененного участка, энтероэнтеростомия \"бок-в-бок\". Для послеоперационного наблюдения переведена в ОРИТ.","question":"Какой наиболее вероятный диагноз?","correct":"Наследственный ангиоотек","distractors":["Мезентериальный тромбоз","Периодическая болезнь"]},{"id":78,"scenario":"Пациенту 56 лет проводится операция - верхняя лобэктомия слева под общей анестезией. Выполнена индукция, установлена двухпросветная трубка без технических сложностей. Перед началом операции пациента поворачивают на правый бок. Проводится вентиляция обоих легких. Витальные показатели - АД 128/70 мм.рт.ст, ЧСС 70 ударов/мин, SatO2 - 99%, ЭКГ- ритм синусовый.","question":"Какое утверждение касательно перфузии легких в положении на боку в условиях общей анестезии верно в данном случае?","correct":"Перфузия правого легкого увеличивается","distractors":["Угнетение гипоксической легочной вазконстрикции, увеличение легочного шунта","Альвеолярно-артериальная разница по кислороду (РА-а) увеличится"]},{"id":79,"scenario":"Пациентка 28 лет, беременность 40 недель. Доставлена в операционную для проведения планового оперативного родоразрешения. За сутки проведен остмор анестезиологом-реаниматологом, сопутствующих заболеваний нет, в лабораторных анализах отклонений от нормы нет. Метод анестезиологического пособия - спинальная анестезия.  В операционной у пациентки  АД-124/63 мм.рт.ст, ЧСС-87 уд.мин., SpO2-98%. С техническими сложностям, не с первой попытки анестезиолог выполняет пункцию спинального пространства  на уровне L2-L3, в павильоне спинальной иглы получен ликвор с примесью крови. Введен бупивакаин -5мг\\мл- 11мг\\2.1 мл.  После выполнения анестезии пациентка укладывается на операционный стол. Пациентка предъявляет жалобы на шум в ушах, чувство нехватки воздуха, сердцебиение. После развиваются тонико-клонические судороги. Выставлен диагноз: токсическое действие местным анестетиком. Начата сердечно-легочная реанимация и интенсивная терапия.","question":"Какова продолжительность сердечно-легочная реанимации у данной пациентки?","correct":"60 минут","distractors":["30 минут","40 минут"]},{"id":80,"scenario":"Пациентка 32 лет с диагнозом: беременность 39 недель доставлена в операционную с признаками дистресса плода в экстренном порядке. Сопутствующих заболеваний нет. Лабораторные данные в пределах референсных значений. АД 100/62 мм рт.ст, пульс 98 уд\\мин, сатурация 97%, температура 36,8С. С целью профилактики гнойно-септических осложнений до извлечения плода введен амоксиклав. Выполнена спинальная анестезия, сенсорный и моторный блок адекватный. Начата операция кесарево сечение. После извлечения плода и отделения плаценты пациентка отмечает чувство нехватки воздуха, резкое головокружение. Врач анестезиолог зафиксировал цианоз кожных покровов, диспноэ, гипотонию до 60/30 мм рт.ст., развилось массивное акушерское кровотечении, произошла остановка сердечной деятельности.","question":"Наиболее вероятны диагноз?","correct":"Эмболия околоплодными водами","distractors":["Разрыв матки","Отслойка плаценты"]},{"id":81,"scenario":"Пациентка 29 лет наблюдается в палате интенсивной терапии после плановой операции кесарево сечение под ЭТН с применением опиодов, миорелаксантов, летучих анестетиков. АД-100/70 мм.рт.ст, ЧСС-72 уд.мин., SpO2-99%. Через 2 часа после операции отмечается повышение температуры тела до 39,5 С, введение антипиретиков без эффекта. Лабораторные показатели биохимического анализа крови: К -8,1 ммоль\\л, КФК 1500 МЕ. КОС: смешанный ацидоз. При макроскопической оценке мочи отмечается окраска цвета \"мясных помоев\".","question":"Наиболее вероятный диагноз?","correct":"Злокачественная гипертермия","distractors":["Рабдомиолиз","Сепсис"]},{"id":82,"scenario":"Пациент 60 лет (ASA III) поступает в операционную с диагнозом - абсцесс легкого.  Планируется экстренная санационная операция. В операционной состояние пациента тяжелое, АД 100/60мм.рт.ст, ЧСС 110 ударов в минуту, по ЭКГ - синусовый ритм, SatO2- 91%. Вы проводите быструю последовательную индукцию.","question":"Какое положение наиболее оптимально для эндобронхиальной интубации больного в данном случае?","correct":"Полусидя, пораженная сторона ниже здоровой","distractors":["Лежа на спине, пораженная сторона ниже здоровой","Положение stion":"Какая тактика стартовой терапии наиболее предпочтительна в данном случае?","correct":"В течение 48 часов постельный режим, инфузионная терапия, кофеин","distractors":["Назначение наркотических анальгетиков","В течение 48 часов постельный режим, инфузионная терапия, дексаметазон"]},{"id":92,"scenario":"Пациент 55 лет. Проводится плановая операция на задней черепной ямке в положении сидя. Соматически не отягощен. Через 40 минут от начала операции наблюдается повышение Ppeak с 15 до 40 см H2O, АД снижается со 110/70 мм рт. ст. до 70/40 мм рт. ст. В анализе газов артериальной крови pCO2 62 mmHg. В течение предыдущих 20 минут пациенту не вводили никаких лекарств.","question":"Какова наиболее вероятная причина внезапного снижения АД у этого пациента?","correct":"Воздушная эмболия","distractors":["Инфаркт миокарда","Высокая концентрация ингаляционного анестетика"]},{"id":93,"scenario":"Пациент 55 лет. Проводится плановая операция на задней черепной ямке в положении сидя. Соматически не отягощен. Через 40 минут от начала операции наблюдается повышение  Ppeak  с 15 до 40 см  H  2  O , АД снижается со 110/70 мм рт. ст. до 70/40 мм рт. ст., при аускультации легких – свистящие хрипы. В анализе газов артериальной крови pCO2 62 mmHg. В течение предыдущих 20 минут пациенту не вводили никаких лекарств. Подозревается воздушная эмболия.","question":"Что из перечисленного ниже наиболее целесообразно сделать в первую очередь?","correct":"Сообщить хирургу","distractors":["Катетеризировать центральную вену","Начать проведение массивной инфузии"]},{"id":94,"scenario":"Мужчина 65 лет с трансплантацией сердца по поводу дилатационной кардиомиопатии в анамнезе поступает для экстренной открытой герниопластики. В предоперационном периоде гемодинамика стабильная. АД 130/75 мм рт ст, ЧСС 70 в мин. Ритм синусовый. SpO2 99%.  После выполнения спинальной анестезии отмечается нестабильность гемодинамики с тенденцией к гипотензии.","question":"Какой препарат является препаратом выбора в данной ситуации?","correct":"Норадреналин","distractors":["Эфедрин","Атропин"]},{"id":95,"scenario":"В отделение нейрореанимации многопрофильного стационара переведена женщина 41 года. Поводом для перевода послужило развитие тонико-клонических судорог с кратковременной потерей сознания. Известно, что 4 дня назад пациентка родила доношенный живой плод с тазовым предлежанием после плановой операции Кесарева сечения под эпидуральной анестезией. Беременность вторая, протекала с тенденцией к гипертензии. При осмотре пациентка в сознании. События, связанные с переводом в реанимацию, амнезирует. Жалобы на тошноту, головокружение, сильную головную боль, усиливающуюся в горизонтальном положении. Боль возникла внезапно и была интенсивной с тенденцией к нарастанию за последние два дня. Прием анальгетиков боль практически не купирует. При неврологическом осмотре менингеальной и очаговой неврологической симптоматики выявлено не было. АД 150/90 мм рт. ст. ЭКГ - синусовый ритм. Температура тела 36,7С. Клинический и биохимический анализы крови – без особенностей. Коагулограмма в норме, за исключением D-димера - 2500 нг/мл. Пациентке была выполнена нативная компьютерная томография головного мозга, на которой были выявлены признаки отека головного мозга. Очагов патологической плотности вещества мозга выявлено не было.","question":"Какой диагноз наиболее вероятен?","correct":"Венозный церебральный тромбоз","distractors":["Постпункционная головная боль","Субарахноидальное кровоизлияние"]},{"id":96,"scenario":"Пациент 55 лет. Проводится плановая операция на задней черепной ямке в положении сидя. Соматически не отягощен. Через 40 минут от начала операции наблюдается повышение Ppeak с 15 до 40 см  H  2  O , АД снижается со 110/70 мм рт. ст. до 70/40 мм рт. ст., при аускультации легких – свистящие хрипы. Подозревается венозная воздушная эмболия.","question":"Какое клиническое исследование наиболее информативно в данной ситуации?","correct":"Чреспищеводная допплерография","distractors":["Аускультация","Капнометрия"]},{"id":97,"scenario":"Пациентка 50 лет поступила в приемное отделение в связи с гипотонией. Объективно: сознание -  поверхностное оглушение, ЧД 22 в мин., АД 85/45 мм рт. ст., ЧСС 92 в мин. Из анамнеза известно,  что пациентка ограничено питалась, последний месяц принимала регулярно кеторолак,  диклофенак, ибупрофен в связи с сильными артралгиями. В последние 3 дня объем суточного диуреза уменьшился до 500 мл.","question":"Какой раствор для восполнения объема циркулирующей крови будет предпочтительным в этой ситуации?","correct":"Сбалансированные кристаллоиды","distractors":["Растворы гидроксиэтилкрахмала","Препараты альбумина"]},{"id":98,"scenario":"Женщина 63 лет поступила в отделение реанимации из операционной после оперативного вмешательства – двусторонняя чрескожная пункционая нефростомия. Диагноз: опухоль матки,  сдавление обоих мочеточников извне, двусторонний уретерогидронфроз. При поступлении отмечалась уремия: креатинин 800 мкмоль/л, мочевина 40 ммоль/л, калий 6,4 ммоль/л.  В первые и вторые сутки было проведено 2 сеанса гемодиализа, достигнуты показатели: креатинин 400 мкмоль/л, мочевина 24 ммоль/л, калий 4,2 ммоль/л. Вы осматриваете пациентку на 3-й сутки. Больная в ясном сознании. Кожные покровы бледные с землистым оттенком, отеки голеней, кистей рук, поясничной области. Дышит самостоятельно, ЧД 18/мин, сатурация 18/мин, при аускультации дыхание жесткое, единичные влажные хрипы в базальных отделах с обеих сторон. АД 170/95 мм рт.ст., ЧСС 110/мин, по монитору – синусовый ритм. Живот мягкий, безболезненный при пальпации.","question":"Какому из нижеперечисленных препаратов отдать предпочтение в лечении артериальной гипертензии у данной пациентки?","correct":"Амлодипин","distractors":["Валсартан","Бисопролол"]},{"id":99,"scenario":"Пациентка 82 лет поступает для выполнения экстренной герниопластики. Сопутствующие заболевания: Ишемическая болезнь сердца, Стенокардия напряжения 2 ФК, Гипертоническая болезнь 3 ст 3ст.  В предоперационном периоде состояние средней тяжести, стабильное. АД 145/75 мм рт ст. Ритм синусовый, ЧСС 70 в мин. Дыхание свободное через нос. ЧДД 18 в мин, SpO2 98%.   Планируется комбинированный эндотрахеальный наркоз. Анестезиолог приготовил для индукции фентанил, пропофол, рокурония бромид.","question":"Как меняется скорость действия внутривенных анестетиков с учетом возраста пациента?","correct":"Действие замедленно.","distractors":["Действие замедленно","Действие ускорено"]},{"id":100,"scenario":"Пациентке 80 лет планируется проведение правосторонней гемиколэктомии по поводу опухоли восходящего отдела толстой кишки. При предоперационном осмотре: сознание ясное, отмечаются мнестические нарушения, АД 145/90, ЧСС 57 ударов в минуту, по ЭКГ - синусовый ритм. Во время беседы с пациенткой вы отмечаете эмоциональную лабильность и когнитивные нарушения.","question":"Какой тест оптимален для скрининга деменции в предоперационном периоде у данной пациентки?","correct":"Mini-cog (Мини-Ког) тест","distractors":["Тест на когнитивные способности (Cognitive Reflection Test, CRT)","Тест Sage (Self Administrated Gerocognitive Exam)"]},{"id":101,"scenario":"Пациентке 80 лет планируется проведение правосторонней гемиколэктомии по поводу опухоли восходящего отдела толстой кишки. При предоперационном осмотре: сознание ясное, отмечаются мнестические нарушения, АД 145/90 мм рт.ст, ЧСС 57 уд/мин., по ЭКГ - синусовый ритм. Во время беседы с пациенткой отмечается эмоциональная лабильность. Пациентка отмечает отсутствие аппетита, ИМТ 17 кг/м2.","question":"С помощью какого метода оптимально оценить нутритивный статус у данной пациентки на предоперационном этапе?","correct":"Шкала MNA (mini-nutritional assessment)","distractors":["Шкала MUST (Multinutritional Universal Screening Tool)","Шкала NRS-2002 (Nutritional Risk Screening)"]},{"id":102,"scenario":"Пациенту 72 лет предстоит операция по поводу опухоли сигмовидный кишки. При предоперационном осмотре: АД 140/90 мм рт.ст., ЧСС 62 удара в минуту, ЭКГ - синусовый ритм, рубцовые изменения задней стенки левого желудочка. По данным ЭХОкг, фракция выброса 52%. Пациент сообщает, что перенес инфаркт миокарда 10 месяцев назад. Принимает метопролол, прасугрел и ацетилсалициловую кислоту.","question":"За сколько дней оптимальна отмена тикагрелора до операции?","correct":"За 7 дней до операции","distractors":["За 10 дней до операции","За 5 дней до операции"]},{"id":103,"scenario":"В операционную для проведения экстренной лапаротомии по поводу перитонита поступил пациент 48 лет с жалобами на боль в животе, многократную рвоту. При осмотре состояние тяжелое, АД \\=90/60 мм рт. ст., ЧСС\\=120/мин, ЧД\\=20/мин., SpO2\\=96%. В анализах крови: Hb\\=160 г/л, Ht\\=0,45; pH\\=7,5, BE\\=+7,1 мМоль/л, , HCO 3  −  \\=34 ммоль/л, Cl − \\=92 мМоль/л,  K− \\=3,4 мМоль/л, Na+\\=130 мМоль/л. Медсестра-анестезист установила венозный катетер в кубитальную вену. Вы начинаете инфузионную подготовку.","question":"Какому варианту кислотно-основного состояния наиболее вероятно соответствет данная клиническая ситуация?","correct":"Декомпенсированный метаболический алкалоз","distractors":["Компенсированный респираторный ацидоз","Декомпенсированный респираторный алкалоз"]},{"id":104,"scenario":"Пациентка 70 лет поступила в операционную с гипотензией (АД\\=90/60 мм рт.ст., ЧСС\\= 106/мин) и в состоянии дегидратации. На протяжении недели наблюдалась тяжелая диарея. Жалобы на боль в животе, положительные симптомы раздражения брюшины. После интенсивной инфузионной подготовки планируется диагностическая лапароскопия. Исследовании крови: Na+ 134 ммоль/л, К+ 2,5 ммоль/л, Cl– 122 ммоль/л, мочевина 15,4 ммоль/л, креатинин 280 мкмоль/л. При исследовании газового состава артериальной крови: рН\\=7,21; РаСО 2  \\=22 мм рт. ст.,РаО 2 \\=146 мм рт. ст.  НСО -  3 \\=6,4 ммоль/л","question":"Какому варианту кислотно-основного состояния(КОС) наиболее вероятно соответствет данная клиническая ситуация?","correct":"Метаболический ацидоз","distractors":["Респираторный алкалоз","Компенсированный метаболический ацидоз"]},{"id":105,"scenario":"В операционную для проведения экстренной лапаротомии по поводу перитонита поступил пациент 48 лет с жалобами на боль в животе, многократную рвоту. При осмотре состояние тяжелое, АД \\=90/60 мм рт. ст., ЧСС\\=120/мин, ЧД\\=20/мин., SpO2\\=96%. В анализах крови: Hb\\=160 г/л, Ht\\=0,45; pH\\=7,5, BE\\=+7,1 мМоль/л, HCO 3  −  \\=34 ммоль/л, Cl − \\=92 мМоль/л,  K− \\=3,4 мМоль/л, Na+\\=130 мМоль/л. Медсестра-анестезист установила венозный катетер в кубитальную вену. Вы начинаете инфузионную подготовку.","question":"Какой из вариантов больше всего подходит к описанию иона натрия?","correct":"Основной внеклеточный катион","distractors":["Основной внеклеточный анион","Второстепенный внеклеточный катион"]},{"id":106,"scenario":"Мужчина, 40 лет. Поступил в операционную с переломом хирургической шейки левого плеча. Анамнез, объективный осмотр и лабораторные данные - без существенных особенностей. Проводится блокада плечевого спелетения межлестничным доступом с использованием нейростимуляции. Получено сокращение грудных мышц на ток силой 0,1 мА.","question":"Что из перечисленного ниже является наиболее целесообразным в данном случае?","correct":"Медленное подтягивание иглы до получения ответа на ток более 0,2 мА","distractors":["Введение запланированной дозы местного анестетика","Увеличение силы тока до 1 мА"]},{"id":107,"scenario":"Мужчина, 35 лет. Поступил в операционную с переломом костей правого предплечья, планируется выполнение остеосинтеза в условиях проводниковой анестезии плечевого сплетения подмышечным доступом с использованием  нейростимуляции. Анамнестические сведения, лабораторно-инструментальные данные - без особенностей.","question":"Блокада какого нерва при данной методике потребует отдельной инъекции?","correct":"Мышечно-кожный","distractors":["Лучевой","Локтевой"]},{"id":108,"scenario":"Мужчина 33 лет доставлен в экстренную операционную с диагнозом разрыв ахиллового сухожилия. Из анамнеза известно, что пациент получил данную травму несколько часов назад во время игры в футбол. В приемном отделении выполнены следующие исследования:   ЭКГ- синусовый ритм. ЧСС 80, без острой патологии.   Рентген грудной клетки: без особенностей.   Общий анализ крови: без особенностей.   Пациент не сообщил о приеме каких-либо медицинских препаратов на постоянной основе. Хронические заболевания отсутствуют, операций не было. За 20 минут до подачи в операционную введен цефазолин 2 г. После выполнения субарахноидальной анестезии на уровне  L 3- L 4 изобарическим раствором бупивакаина в дозировке 15 мг параметры мониторинга, следующие: АД 123/74 мм рт. ст. ЧСС 78 в минуту. Сатурация 99%. Через несколько минут пациент отметил нарастающее чувство беспокойства, зуд по всему телу. Проступил холодный липкий пот и наступила потеря сознания. АД 60/19 мм рт. ст., ЧСС 119 в минуту, сатурация не определяется.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Анафилактический шок","distractors":["Острый коронарный синдром","Рефлекс Берцольда-Яриша"]},{"id":109,"scenario":"Пациентке 34 лет в условиях общей анестезии выполняется ринопластика в плановом порядке. На 20 минуте от начала операции вы отметили падение артериального давления до 70/30 мм рт. ст., при осмотре кожных покровов выявлена крапивница на животе и передней поверхности бедер. Незамедлительно был введен эпинефрин, гемодинамика стабилизирована. Однако, сохраняются явления бронхоспазма.","question":"Какие дополнительные действия наиболее целесообразно предпринять в данном случае для купирования бронхоспазма?","correct":"Применить сальбутамол","distractors":["Ввести эуфилин","Применить ингаляции с глюкокортикостероидами"]},{"id":110,"scenario":"Пациенту 19 лет (ASA I) в условиях КЭТН (индукция - тиопентал натрия, рокуроний, фентанил, поддержание анестезии - севофлуран)  проведена плановая гайморотомия. Течение анестезии - без особенностей.  В раннем послеоперационном периоде появились жалобы на плохое самочувствие, тошноту, рвоту, острую боль в животе. Консультирован хирургом - данных за хирургическую патологию не выявлено. По данным УЗИ брюшной полости - без патологии. При осмотре АД 139/89 мм рт. ст., ЧСС 135 уд/мин, ЧДД 19 в минуту, SpO2 96%. По ЭКГ - синусовая тахикардия. Выявлены электролитные нарушения: Na 128 ммоль/л, K 2,8 ммоль/л.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Порфирия","distractors":["Синдром Гийена – Барре","Мезентериальный тромбоз"]},{"id":111,"scenario":"Мужчина, 38 лет. ASA I класс. В плановом порядке проводится оперативное вправление вывиха плечевого сустава в условиях проводниковой анестезии плечевого сплетения из межлестничного доступа. При выполнении кожного разреза болевая и тактильная чувствительность отсутствуют. По ходу операции пациент предъявляет жалобы на тупую боль и неприятные ощущения при давлении хирургом на руку в области подмышечной впадины.","question":"Блокада какой анатомической структуры позволит обеспечить оптимальную анестезию в данном случае?","correct":"Межреберно-плечевой нерв","distractors":["Локтевой нерв","Лучевой нерв"]},{"id":112,"scenario":"Женщина, 55 лет. Планируется оперативное лечение по поводу переломов 1, 2, 3 плюсневых костей. В анамнезе: пломбирование эпидурального пространства аутокровью после СМА при кесаревом сечении, в связи с постпункционными головными болями. В остальном анамнез - без особенностей. Объективно: рост - 150 см, вес - 100 кг, обращает внимание дистальный прикус, тироментальное расстояние менее 5 см, 3 класс по Маллампати. Лабораторные данные - без особенностей.  Принято решение о проведении блокады периферических нервов на уровне голеностопного сустава.","question":"Блокада какой анатомической структуры позволит обеспечить оптимальную анестезию кожи медиальной лодыжки и внутреннего края стопы пациента?","correct":"Подкожный нерв","distractors":["Общий малоберцовый нерв","Глубокий малоберцовый нерв"]},{"id":113,"scenario":"Пациент 48 лет. Поступил трокардиографии неспецифические изменения реполяризации.\nПациент готовится к операции, вы его консультируете перед операцией.","question":"Что из перечисленного ниже наиболее целесообразно выполнить в данном случае для подтверждения диагноза миокардита?","correct":"Тропонин I или Т","distractors":["Молекулярно-биологическое исследование (полимеразная цепная реакция и полимеразная цепная реакция в реальном времени) на кардиотропные вирусы в сыворотке крови","Профиль кардиоспецифических аутоантител"]},{"id":132,"scenario":"Пациент 32 лет, с указанием в анамнезе на повышение цифр артериального давления с 14 лет, имеет избыточную массу тела, нарушение толерантности к углеводам, гипоальфахолестеринемию (холестерин липопротеидов высокой плотности - 0,7 ммоль/л). Заболел остро: лихорадка до 38 °С, диарея. Госпитализирован с интенсивным болевым синдромом за грудиной в течение 1,5 ч. Тропонин I при поступлении - 15 нг/мл, через 6 часов 16 нг/мл, через 12 часов 15 нг/мл. При коронароангиографии: коронарные артерии без патологических изменений, замедление кровотока по правой коронарной артерии (TIMI II). На электрокардиографии синусовая тахикардия, отклонение ЭОС влево, блокада передней ветви левой ножки пучка Гиса, отрицательные зубцы Т в отведениях  II ,  III ,  V 4- V 6, сегмент  ST  на изолинии. При эхокардиографии: фракция выброса - 42%, гипокинез задней стенки и гипокинез боковой стенки. При магнитно-резонансной томографии сердца с контрастным усилением выявлено снижение глобальной сократительной способности левого желудочка (фракция выброса - 46%) с зонами гипокинезии в области задней и боковой стенок левого желудочка, субэпикардиально расположенные признаки раннего и позднего контрастного усиления, а также отека миокарда на Т2-взвешенных изображениях в вышеперечисленных областях.Данные магнитно-резонансной томографии сердца с контрастным усилением: а - признаки позднего контрастного усиления; б - признаки раннего контрастного усиления; в - признаки отека миокарда на Т o":"Пациентке 70 лет выполняется экстренное оперативное вмешательство - остеосинтез лодыжек с наложением жгута. Известно, что пациентка длительное время страдает ишемической болезнью сердца, постоянно принимает бисопролол.","question":"Какой значимый риск, с наибольшей вероятностью, несет в данном случае использование жгута в оперативной травматологии?","correct":"Тромбоэмболия легочной артерии","distractors":["Дефицит объема циркулирующей крови","Кожный зуд"]},{"id":184,"scenario":"Пациент 45 лет поступил в операционную для выполнения остеосинтеза лодыжек в условиях спинальной анестезии. Анамнез спокоен, известных аллергий нет. Хронические заболевания- гастрит.  ЭКГ - синусовый ритм без очаговой патологии. После снятия жгута (время использования 113 минут) пациент резко потерял сознание. Артериальное давление не определяется, ЭКГ- фибрилляция желудочков.","question":"Какой диагноз наиболее вероятен в данном случае?","correct":"Тромбоэмболия легочной артерии","distractors":["Острый инфаркт миокарда","Острое нарушение мозгового кровобращения"]},{"id":185,"scenario":"Пациент 23 лет, мотоциклист, доставлен в операционную из шокового зала с диагнозом: \"Политравма: ЧМТ, тупая травма живота, перелом правого бедра в средней трети, травматическая ампутация пальцев левой верхней конечности\", для выполнения экстренной лапаротомии после обнаружения большого количества свободной жидкости в брюшной полости.  Объективно: АД 74/56 мм рт. ст., ЧСС 120 в минуту, Рс 120 в минуту, сатурация 91%, ИП 0,01. Кожные покровы бледные, липкие.","question":"Какая степень кровопотери наиболее вероятна у данного пациента?","correct":"4","distractors":["1","2"]},{"id":186,"scenario":"Пациент 28 лет поступил в операционную для резекции полипов носовой полости. Артериальное давление 123/74 мм рт. ст.,  ЧСС 75 в минуту, сатурация 97%. Известно. что пациент с 8 лет страдает бронхиальной астмой. Планируется проведение комбинированного эндотрахеального наркоза.","question":"Какой препарат из перечисленных ниже, с наибольшей вероятностью, противопоказан для проведения индукции в общую анестезию у данного пациента?","correct":"Тиопентал","distractors":["Пропофол","Кетамин"]},{"id":187,"scenario":"Больной 45 лет с диагнозом острый деструктивный панкреатит, забрюшинная флегмона, сепсис, септический шок,  перенесший несколько оперативных вмешательств находится в ОРИТ 5-е сутки. Состояние тяжелое. 4-и сутки ИВЛ в режиме SIMV+PS. Респираторный индекс 220. SOFA 7  баллов. Проводится вазопрессорная поддержка норадреналином 0,5 мкг/кг/мин. В течение 3-х суток получает меропенем и линезолид. На этом фоне сохраняется лихорадка до 38,5 С, нарастает лейкоцитоз с 12 до 21 тыс/мл и п/я сдвиг  до 15,  ПКТ до 19 нг\\мл. Флегмона эффективно дренирована. В повторной операции не нуждается.  Проводится сеанс ГДФ по внепочечным ( сепсис) показаниям. Результаты посевов в работе.","question":"Какая тактика антимикробной терапии наиболее целесообразна в данной ситуации?","correct":"Смена антимикробной терапии с учетом риска наличия полирезистентных возбудителей","distractors":["Продолжение проводимой антимикробной терапии под контролем лабораторных показателей","Смена антимикробной терапии после получения результатов посевов биосред и определения чувствительности к антибиотикам"]},{"id":188,"scenario":"Пациент 56 лет находится в отделении реанимации после оперативного вмешательства по поводу тупой травмы живота в следствии ДТП. Сознание ясное. Гемодинамика стабильная. АД 130/85 мм рт.ст. ЧСС 80 в минуту. Диурез по катетеру Фолея. Моча светлая, прозрачная. Темп диуреза составляет 15 мл/ч. Планируется остеосинтез костей таза. С целью определения риска прогрессирования ОПП планируется провести стресс - тест фуросемидом. Из анамнеза известно, что пациент ранее получал терапию диуретиками.","question":"Какую дозировку фуросемида необходимо назначить данному пациенту для проведения стресс  - теста?","correct":"1.5 мг/кг","distractors":["0.5 мг/кг","1 мг/кг"]},{"id":189,"scenario":"Пациент 56 иорганная недлостаточность, нарастает дозировка норэпинефрина до 0,5 мкг/кг/мин, SOFA 10 баллов, креатинин 630 мкмоль/л, мочевина 27 ммоль/л, калий 5,5 ммоль/л, EAA 0,9, ПКТ  14 нг/мл.","question":"Какая тактика экстракорпоральной терапии наиболее целесообразна?","correct":"ЛПС- сорбция + продленная гемодиафильтрация","distractors":["Терапевтический плазмообмен+ продленная гемодиафильтрация","Селективная плазмосепарация"]},{"id":192,"scenario":"Женщина 63 лет переведена в ОРИТ после краниотомии и удаления опухоли задней черепной ямки - краниофарингиомы. Проводится продленная ИВЛ. АД 150/96 мм рт. ст., Ps 102 уд/мин. Лабораторный данные: Na 120 ммоль/л. Реаниматолог подозревает развитие церебрального синдрома солевой недостаточности.","question":"Какой маркер следует назначить для подтверждения диагноза?","correct":"общий натрий в суточной моче","distractors":["концентрация натрия в моче","осмоляльность плазмы"]},{"id":193,"scenario":"Женщина 59 лет доставлена в ОРИТ с субарахноидальным кровоизлиянием. Уровень сознания  8 баллов по шкале комы Глазго. Выполнена интубация трахеи, начата ИВЛ. Лабораторно: Na+ 116 ммоль/л, осмоляльность плазмы 270 мОсм/л.","question":"Какой объем натрия в сутки необходимо вводить данной пациентке для коррекции состояния?","correct":"10 ммоль/л","distractors":["20 ммоль/л","40 ммоль/л"]},{"id":194,"scenario":"Пациент 67 лет доставлен в шоковый зал бригадой СМП с направительным диагнозом (ОНМК). По данным МСКТ ГМ верифицирован инфаркт головного мозга по ишемическому типу в бассейне левой СМА, планируется проведение ТЛТ. При осмотре ШКГ 15б, правосторонний нижний монопарез, кожные покровы физиологической окраски, АД 150/80 мм рт. ст., ЧСС 122 уд/мин, ритм фибрилляция предсердий. Живот мягкий, безболезненный. Лабораторно  креатинин 71 мкмоль/л, СКФ 92 мл/мин*1,73 м2., МНО 1,01, в ОАК тромбоциты 270 10*9/л, фибриноген 3,5 г/л. При расспросе пациент сообщил, что постоянно принимает апиксабан, последний прием препарата 15 часов назад.","question":"Какое лабораторное исследование, с наибольшей вероятностью, определит возможность проведения пациенту ТЛТ?","correct":"Определение активности Xa фактора","distractors":["Определение тромбинового времени","Проведение ТЛТ невозможно вне зависимости от лабораторных данных"]},{"id":195,"scenario":"Пациентка 68 лет доставлена в шоковый зал бригадой СМП с направительным диагнозом (ОНМК). По данным МСКТ ГМ верифицирован инфаркт головного мозга по ишемическому типу в бассейне левой СМА, планируется проведение ТЛТ. При осмотре ШКГ 15б, правосторонний гемипарез, кожные покровы физиологической окраски, АД 130/80 мм рт. ст., ЧСС 98 уд/мин, ритм синусовый. Живот мягкий, безболезненный. Лабораторно  креатинин 68 мкмоль/л, в ОАК тромбоциты 265 10*9/л, фибриноген 3,2 г/л. При расспросе пациентка сообщила, что постоянно принимает варфарин по поводу механического протеза митрального клапана. Выполнена фокусная ЭХО-КГ, функция протеза митрального клапана не нарушена.","question":"Какое лабораторное исследование, с наибольшей вероятностью, определит возможность проведения пациентке ТЛТ?","correct":"Определение уровня МНО","distractors":["Определение тромбинового времени","Определение активности Xa фактора"]},{"id":196,"scenario":"Пациентка 24 лет доставлена в шоковый зал бригадой СМП с направительным диагнозом (ОНМК). По данным МСКТ ГМ верифицирован инфаркт головного мозга по ишемическому типу в бассейне левой СМА, планируется проведение ТЛТ. При осмотре ШКГ 15б, правосторонний гемипарез, кожные покровы бледные, следы после внутривенных инъекций в локтевых сгибах. АД 134/80 мм рт. ст., ЧСС 82 уд/мин, ритм синусовый, при аускультации систолический шум в области мечевидного отростка. Живот мягкий, безболезненный. Выполнена фокусная ЭХО-КГ, на передней створке трикуспидального клапана выявлена дополнительная структура с элементами флотации общим размером 12*8 мм.","question":"Какое лабораторное исследование, с наибольшей вероятностью, определит возможность проведения пациентке ТЛТ?","correct":"Проведение ТЛТ невозможно","distractors":["Определение тромбинового времени","Определение активности Xa фактора"]},{"id":197,"scenario":"Осмотр анестезиологом пациента 45 лет накануне планового оперативного вмешательства по поводу резекции почки. Риск ASA 2, обнаружены возможные трудности в обеспечении проходимости дыхательных путей в результате теста Патилла.","question":"Что из перечисленного ниже наиболее достоверно характеризует тест Патилла?","correct":"Расстояние от щитовидной вырезки до кончика подбородка","distractors":["Задержка дыхания на вдохе","Расстояние между подбородком и яремной вырезкой"]},{"id":198,"scenario":"Мужчина, 45 лет. В течение пяти часов выполнена плановая двухсторонняя лапароскопическая герниопластика паховых грыж. Интраоперационно - технические сложности в связи со спаечным процессом. Анестезия ингаляционная, миорелаксация посредством продленной инфузии рокурония. Течение анестезии гладкое, гемодинамика и показатели газообмена в оптимальных пределах.","question":"Какой показатель TOF-теста m.abductor pollicis может указывать на нормализацию мышечного тонуса глотки в данном случае?","correct":"0,91","distractors":["0","0,3"]},{"id":199,"scenario":"Мужчина, 48 лет. В течение пяти часов выполнена плановая лапароскопическая гемиколэктомия. За 30 минут до кожного разреза введено 2 г цефтриаксона, интраоперационно внутривенно капельно 500 мг метронидазола. Интраоперационно: технические сложности в связи со спаечным процессом. Анестезия ингаляционная, миорелаксация посредством продленной инфузии рокурония. Проводилась премедикация: внутривенно 10 мг метоклопрамида, 4 мг одансентрона. Течение анестезии гладкое, гемодинамика и показатели газообмена - в оптимальных пределах, однократно было введено 1 мг внутривенно атропина для коррекции брадикардии.","question":"Какой лекарственный препарат из примененных у пациента может способствовать пролонгированию недеполяризующей нервно-мышечной блокады?","correct":"Метронидазол","distractors":["Атропин","Цефтриаксон"]},{"id":200,"scenario":"Мужчина, 48 лет. В течение пяти часов выполнена плановая лапароскопическая гемиколэктомия. Интраоперационно: технические сложности в связи со спаечным процессом. Анестезия ингаляционная, миорелаксация посредством продленной инфузии рокурония. Течение анестезии гладкое, гемодинамика и показатели газообмена - в оптимальных пределах. После экстубации пациент предъявляет жалобы на дрожь, отмечается периодическое дрожание конечностей, нижней челюсти.","question":"Измерение температуры в каком месте является наиболее подходящим для уточнения механизма развития данного состояния?","correct":"На барабанной перепонке","distractors":["В подмышечной впадине","В прямой кишке"]},{"id":201,"scenario":"Пациентка 50 лет доставлена в шоковый зал бригадой СМП, поводом к вызову которой послужило появления и нарастания одышки. Из анамнеза известно, что пациентка постоянно принимает варфарин по поводу механического протеза митрального клапана, последнее МНО 2,5, измерено 7 дней назад. При осмотре сознание ясное, кожные покровы бледные, варикозно расширены поверхностные вены нижних конечностей, отек левой нижней конечности до уровня колена. При аускультации дыхание жесткое, хрипов нет. SpO2 97%. ЧДД 28/мин, АД 144/88 мм рт. ст., ЧСС 118 уд/мин, ритм синусовый, выслушивается мелодия протеза в проекции митрального клапана. Живот мягкий, безболезненный, не увеличен в объеме. На ЭКГ ритм синусовый, блокада правой ножки пучка Гиса. УЗДС вен нижних конечностей – тромбоз суральных вен левой голени.","question":"Какое исследование наиболее целесообразно для постановки диагноза в данном случае?","correct":"МСКТ ангиопульмонография","distractors":["ЭХО-КГ","МСКТ ОГК"]},{"id":202,"scenario":"Пациентка 52 лет доставлена в шоковый зал бригадой СМП, поводом к вызову которой послужило появления и нарастания одышки. Из анамнеза известно, что пациентка постоянно принимает варфарин по поводу механического протеза митрального клапана, последнее МНО 2,7, измере  с ИВЛ  (севофлуран+фентанил+рокуроний) стабильное:  АД \\=110/60 мм рт. ст., ЧСС 64 /мин, ЭКГ - синусовый ритм, SpO2 \\=100%,  t тела \\=36,7  0 С. После катетеризации внутренней яремной вены(под УЗ навигацией) проводится инфузионная терапия кристаллоидными растворами. Проводится лабораторный мониторинг кислотно-основного состояния и уровня электролитов плазмы крови.","question":"Какая доля объема кристаллоидов (солевых растворов), вероятнее всего, остается в сосудистом пространстве?","correct":"20%","distractors":["10%","40%"]},{"id":217,"scenario":"Пациенту 60 лет (рост 175 см, масса тела 80 кг,  ASA II) выполняется панкреатодуоденальная резекция по поводу рака головки поджелудочной железы. Течение комбинированной общей анестезии с ИВЛ (севофлуран+фентанил+рокуроний) стабильное:  АД 110/60 мм рт. ст., ЧСС 64 уд/мин, ЭКГ - синусовый ритм, SpO2 100%,  t тела 36,7С. После катетеризации внутренней яремной вены проводится инфузионная терапия кристаллоидными растворами.","question":"Какой период времени, вероятнее всего, занимает перераспределение кристаллоидов из сосудистого русла в интерстиций?","correct":"30 мин","distractors":["10 мин","60 мин"]},{"id":218,"scenario":"Женщина, 35 лет. В анамнезе - выраженная послеоперационная тошнота и рвота после лапароскопической аппендэктомии два года назад. Хронические заболевания отрицает. Рост - 170 см, вес - 65 кг. Данные объективного осмотра и лабораторных данных - без особенностей. Проведена лапароскопия, адгезиолизис маточных труб. Анестезия с применением севофлюрана, фентанила и рокурония в стандартных дозировках. Длительность оперативного вмешательства - 30 минут, через пять минут после окончания операции пациентка экстубирована. После экстубации жалобы на выраженную тошноту. С целью профилактики ПОТР до операции введено 4 мг одансентрона и 8 мг дексаметазона внутривенно.","question":"Применение какого лекарственного препарата для лечения послеоперационной тошноты и рвоты явдяется наиболее целесообразным в данном случ нта наиболее верное?","correct":"BIS мониторинга не эффективен при использовании закиси азота","distractors":["Требуется проведение BIS мониторинга с целевыми значениями 80-100","Требуется проведение BIS мониторинга с целевыми значениями 60-80"]},{"id":228,"scenario":"В больницу доставлен мужчина 48 лет. Со слов сопровождающего, мужчина был найден без сознания во время ремонта автомобиля в закрытом гараже. На момент осмотра: в умеренном оглушении, на вопросы отвечает с задержкой, отмечает резкую слабость, шум в ушах, сонливость, чувство тошноты, не помнит, как потерял сознание. Кожные покровы гиперемированы, без признаков повреждения. Реакция зрачков на свет живая. Дыхание везикулярное, проводится во все отделы. ЧДД 20 в минуту. SpO2 96%. АД 95/60 мм рт. ст., ЧСС 110 уд/минуту, пульс слабого наполнения, тоны сердца приглушены. При заборе крови из периферической вены медсестрой отмечено, что кровь ярко-красного цвета.","question":"Какой антидот является специфическим в данном случае?","correct":"Ацизол","distractors":["Этанол","Атропин"]},{"id":229,"scenario":"Пациентка 66 лет, анамнез хронических заболеваний неизвестен. Поступила в стационар по каналу СМП в ОРИТ с подозрением на ОКС, фибрилляцией предсердий, пароксизм менее 24 часов. Выполнена диагностическая коронарография, гемодинамически значимого сужения коронарных артерий не выявлено. С целью восстановления ритма выполнена медикаментозная кардиоверсия (Амиодарон) с последующим назначением Амиодарона перорально. Так же пациентке назначена антикоагулянтная терапия с целью профилактики тромбоэмболических осложнений.  Через 10 дней после госпитализации и выписки у пациентки развились жалобы на снижение аппетита, запоры, нерегулярный стул, отеки лица и конечностей, слабость, сонливость, мерзлявость. Объективно выявлено: брадикардия, сухость кожи, отеки по типу пастозности нижних и верхних конечностей, лица.","question":"Какое состояние, с наибольшей вероятностью, развилось в данном случае у пациентки?","correct":"снижение функционирования щитовидной железы","distractors":["триада Протопопова при депрессии","гипоактивный делирий, связанный с нахождением в ОРИТ"]},{"id":230,"scenario":"Пациентка 66 лет, анамнез хронических заболеваний неизвестен. Поступила в стационар по каналу СМП в ОРИТ с фибрилляцией предсердий, пароксизм менее 24 часов. Выполнено лабораторное обследование пациентки, электрокардиография и Эхо-КГ, рентгенография легких. С целью восстановления ритма выполнена медикаментозная кардиоверсия (Амиодарон) с последующим назначением Амиодарона перорально. Так же пациентке назначена антикоагулянтная терапия с целью профилактики тромбоэмболических осложнений.   Через 10 дней после госпитализации и выписки у пациентки развились жалобы на снижение аппетита, запоры, нерегулярный стул, отеки лица и конечностей, слабость, сонливость, мерзлявость. Объективно выявлено: брадикардия, сухость кожи, отеки по типу пастозности нижних и верхних конечностей, лица. По результатам анализов крови у пациентки выявлено повышение тиреотропного гормона и снижение тироксина и трийодтиронина.","question":"Что из перечисленного ниже является наиболее вероятной причиной возникновения у пациентки данного состояния?","correct":"кардиоверсия с использованием Амиодарона","distractors":["прием амиодарона","нахождение в отделении реанимации с депривацией сна"]},{"id":231,"scenario":"В отделение нейрореанимации многопрофильного стационара поступила девушка 20 лет. Доставлена бригадой СМП из ночного клуба. При поступлении жалобы на сильную головную боль, возникшую внезапно, нарушения зрения. Прием анальгетиков боль практически не купировал. При беседе пациентка постоянно повторяла, что у нее невыносимо болит голова. Известно, что для бодрости принимала \"спиду\" в ночном клубе, а примерно через час почувствовала резкую, \"громоподобную\" головную боль, через 30 минут отметила нарушение зрения. При неврологическом осмотре: ШКГ 15 баллов, умеренный мидриаз, реакция зрачков на свет сохранена. Менингеальной ены признаки отека головного мозга. Очагов патологической плотности вещества мозга выявлено не было.","question":"Какова наиболее оправданная, патогенетическая терапия в данной клинической ситуации?","correct":"Антикоагулянтная","distractors":["Антибактериальная","Противоотечная"]},{"id":242,"scenario":"В отделение нейрореанимации многопрофильного стационара поступила девушка 32 лет. Доставлена в связи с развитием тонико-клонических судорог с кратковременной потерей сознания. При осмотре пациентка в сознании. События связанные с поступлением в реанимацию амнезирует. Жалобы на тошноту, головокружение, сильную головную боль усиливающуюся в горизонтальном положении, боль возникла внезапно и была интенсивной с тенденцией к нарастанию за последние четыре дня. Прием анальгетиков боль практически не купировал. Хронические и наследственные заболевания отрицает. При беседе удалось выяснить, что пациентка около недели назад сделала пирсинг языка, а так же длительное время принимает оральные контрацептивы. При неврологическом осмотре менингеальной и очаговой неврологической симптоматики выявлено не было. Артериальное давление составляло 150/90 мм рт. ст. ЭКГ - синусовый ритм. Температура тела 36,7 градусов.  Клинический и биохимический анализы крови – без особенностей. Коагулограмма в норме, за исключением D-димера - 3500 нг/мл. Пациентке была выполнена нативная компьютерная томография головного мозга на которой были выявлены признаки отека головного мозга и дефект наполнения в области слияния синусов ((дельта-признак)). Очагов патологической плотности вещества мозга выявлено не было.","question":"Какая терапия будет наиболее показана в качестве патогенетической?","correct":"Антикоагулянтная","distractors":["Антибактериальная","Противоотечная"]},{"id":243,"scenario":"Пациент 30 лет, 82 кг, 176 см,  ASA  II . Операция -  кератопластика в условиях общей анестезии. Индукция: пропофол  120 мг, фентанил 0.2 мг; установлен надгортанный воздуховод. Поддержание анестезии - ксенон  Fi
